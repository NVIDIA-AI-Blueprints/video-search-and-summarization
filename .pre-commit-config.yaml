# Install both git-hook types when contributors run `pre-commit install`,
# so the `commit-msg`-stage DCO check (below) is wired up automatically
# without a second `--hook-type commit-msg` flag.
default_install_hook_types: [pre-commit, commit-msg]

repos:
- repo: https://github.com/trufflesecurity/trufflehog
  rev: v3.94.2
  hooks:
  - id: trufflehog
    name: TruffleHog secret scan
    entry: trufflehog git file://. --since-commit HEAD --results=verified,unknown --fail
    language: golang
    stages: [pre-commit]

- repo: local
  hooks:

  # Mirrors CI job "Lint (Python)" step: uv run ruff check .
  - id: ruff-check
    name: ruff check (agent)
    entry: bash -c 'cd services/agent && uv run ruff check .'
    language: system
    types: [python]
    files: ^services/agent/
    pass_filenames: false
    require_serial: true

  # Mirrors CI job "Lint (Python)" step: uv run ruff format --check .
  - id: ruff-format
    name: ruff format --check (agent)
    entry: bash -c 'cd services/agent && uv run ruff format --check .'
    language: system
    types: [python]
    files: ^services/agent/
    pass_filenames: false
    require_serial: true

  # Mirrors CI job "Type Check (mypy)" step: uv run mypy src/vss_agents/
  - id: mypy
    name: mypy (agent)
    entry: bash -c 'cd services/agent && uv run mypy src/vss_agents/'
    language: system
    types: [python]
    files: ^services/agent/src/vss_agents/
    pass_filenames: false
    require_serial: true

  # DCO sign-off check — mirrors CI job "DCO Sign-off".
  # Runs at `commit-msg` stage so we read the *new* commit's message
  # (passed in as $1) instead of `git log -1` on the parent — which
  # was happily inheriting a Signed-off-by from the previous HEAD and
  # letting unsigned commits through.
  - id: dco-signoff
    name: DCO sign-off check
    entry: bash -c 'grep -q "^Signed-off-by" "$1" || { echo "ERROR - Commit missing DCO sign-off. Use git commit -s"; exit 1; }' --
    language: system
    stages: [commit-msg]

  # Mirrors CI Job 7 — SPDX copyright headers on source files
  - id: copyright-headers
    name: SPDX copyright headers
    entry: python3 .github/scripts/check_copyright_headers.py
    language: system
    pass_filenames: false
    stages: [pre-commit]

  # Mirrors CI Job 9 — Python dep license denylist (GPL/AGPL/SSPL/BUSL, LGPL allowed)
  # Triggers on pyproject.toml or uv.lock changes so lockfile-only edits still gate.
  - id: license-check-python
    name: License Check (Python deps)
    entry: bash .github/scripts/check_python_licenses.sh
    language: system
    files: ^services/agent/(pyproject\.toml|uv\.lock)$
    pass_filenames: false
    stages: [pre-commit]

  # Mirrors CI Job 10 — UI dep license allowlist
  - id: license-check-ui
    name: License Check (UI deps)
    entry: bash .github/scripts/check_ui_licenses.sh
    language: system
    files: ^services/ui/(package\.json|package-lock\.json)$
    pass_filenames: false
    stages: [pre-commit]
