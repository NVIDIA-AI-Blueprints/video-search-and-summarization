{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rtvi-vlm.fullname" . }}
  labels:
    app.kubernetes.io/name: rtvi-vlm
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: rtvi-vlm
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rtvi-vlm
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: rtvi-vlm
          image: {{ include "rtvi-vlm.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafkaBootstrapServers | default (printf "%s-kafka:9092" .Release.Name) | quote }}
            - name: REDIS_HOST
              value: {{ .Values.redisHost | default (printf "%s-redis" .Release.Name) | quote }}
            - name: REDIS_PORT
              value: {{ .Values.redisPort | quote }}
            - name: REDIS_DB
              value: {{ .Values.redisDb | quote }}
            {{- if .Values.redisPassword }}
            - name: REDIS_PASSWORD
              value: {{ .Values.redisPassword | quote }}
            {{- end }}
            {{- if .Values.useSharedNim }}
            - name: MODEL_PATH
              value: "none"
            - name: VIA_VLM_ENDPOINT
              value: {{ printf "http://%s:%s/v1" (.Values.sharedNimService | default (printf "%s-cosmos-reason2-8b" .Release.Name)) .Values.sharedNimPort | quote }}
            - name: VIA_VLM_OPENAI_MODEL_DEPLOYMENT_NAME
              value: {{ .Values.viaVlmOpenAiModelDeploymentName | default "nvidia/cosmos-reason2-8b" | quote }}
            {{- else }}
            - name: MODEL_PATH
              value: {{ .Values.modelPath | default "ngc:nim/nvidia/cosmos-reason2-8b:hf-1208" | quote }}
            {{- end }}
            {{- $ngcSecret := .Values.ngcApiSecret.name | default (index (index .Values.global "ngcApiSecret") "name") | default "ngc-api" }}
            {{- $ngcKey := .Values.ngcApiSecret.key | default (index (index .Values.global "ngcApiSecret") "key") | default "NGC_API_KEY" }}
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $ngcSecret }}
                  key: {{ $ngcKey }}
            - name: VIA_VLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $ngcSecret }}
                  key: {{ $ngcKey }}
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          volumeMounts:
            - name: clip-storage
              mountPath: /home/vst/vst_release/streamer_videos
            - name: shm
              mountPath: /dev/shm
          livenessProbe:
            httpGet:
              path: /v1/health/ready
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: clip-storage
          emptyDir: {}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.shmSize }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
