{{- if .Values.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "elasticsearch-init-container.fullname" . }}
  labels:
    app.kubernetes.io/name: elasticsearch-init-container
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    helm.sh/hook-weight: "2"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 10
  template:
    metadata:
      labels:
        app.kubernetes.io/name: elasticsearch-init-container
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: elasticsearch-init
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              apk add --no-cache bash curl
              export ES_URL="${ELASTICSEARCH_URL}"
              export ELASTICSEARCH_ILM_MIN_AGE="${ELASTICSEARCH_ILM_MIN_AGE}"
              export ELASTICSEARCH_RTVI_CV_EMBEDDINGS_DIM="${ELASTICSEARCH_RTVI_CV_EMBEDDINGS_DIM}"
              export ELASTICSEARCH_VISION_LLM_EMBEDDINGS_DIM="${ELASTICSEARCH_VISION_LLM_EMBEDDINGS_DIM}"
              export BP_PROFILE="${BP_PROFILE}"
              bash /opt/mdx/init-scripts/elasticsearch-ilm-policy-creation.sh && \
              bash /opt/mdx/init-scripts/elasticsearch-template-creation.sh && \
              bash /opt/mdx/init-scripts/elasticsearch-ingest-pipeline-creation.sh
          env:
            - name: ELASTICSEARCH_URL
              value: {{ .Values.elasticsearchUrl | default (printf "http://%s-elasticsearch:9200" .Release.Name) | quote }}
            - name: ELASTICSEARCH_ILM_MIN_AGE
              value: {{ .Values.env.ELASTICSEARCH_ILM_MIN_AGE | quote }}
            - name: ELASTICSEARCH_RTVI_CV_EMBEDDINGS_DIM
              value: {{ .Values.env.ELASTICSEARCH_RTVI_CV_EMBEDDINGS_DIM | quote }}
            - name: ELASTICSEARCH_VISION_LLM_EMBEDDINGS_DIM
              value: {{ .Values.env.ELASTICSEARCH_VISION_LLM_EMBEDDINGS_DIM | quote }}
            - name: BP_PROFILE
              value: {{ .Values.env.BP_PROFILE | quote }}
          volumeMounts:
            - name: scripts
              mountPath: /opt/mdx/init-scripts
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: {{ include "elasticsearch-init-container.fullname" . }}-scripts
            defaultMode: 0755
{{- end }}
