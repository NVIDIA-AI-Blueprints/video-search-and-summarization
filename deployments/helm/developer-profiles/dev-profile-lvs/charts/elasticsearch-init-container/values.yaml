enabled: false
global: {}

# Elasticsearch URL (set by parent for K8s service)
elasticsearchUrl: ""   # default: http://<release>-elasticsearch:9200

# From Compose env
env:
  ELASTICSEARCH_ILM_MIN_AGE: "4h"
  ELASTICSEARCH_RTVI_CV_EMBEDDINGS_DIM: "1536"
  ELASTICSEARCH_VISION_LLM_EMBEDDINGS_DIM: "768"
  BP_PROFILE: "bp_developer_lvs"

# Use image with bash + curl (alpine or same as foundational elastic-init build)
image:
  repository: alpine
  tag: "3.23.2"
  pullPolicy: IfNotPresent
