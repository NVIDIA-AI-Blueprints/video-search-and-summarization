enabled: false

image:
  repository: nvcr.io/nvidia/vss-core/sdr
  tag: "3.1.0"
  pullPolicy: IfNotPresent

replicas: 1

# clusterType: kubernetes (default) | docker. Use kubernetes so SDR uses K8s API; docker only if mounting host docker.sock.
clusterType: kubernetes

service:
  type: ClusterIP
  port: 4003

# For clusterType kubernetes: streamprocessing-ms-dev service port (WDM_TARGET_PORT_MAPPING, provisioning_address).
streamprocessingPort: "30001"

# Override when using external Redis or different release name.
redisServer: ""
redisPort: "6379"
wdmMsgKey: "vst.event"

# VST sensor endpoints (SDR talks to sensor for streams/status). Defaults use Release.Name.
vstStreamsEndpoint: ""
vstStatusEndpoint: ""

resources: {}
nodeSelector: {}
tolerations: {}
global: {}
