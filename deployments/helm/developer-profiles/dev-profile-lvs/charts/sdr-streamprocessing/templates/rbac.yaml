{{- if and .Values.enabled (eq .Values.clusterType "kubernetes") }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sdr-streamprocessing.fullname" . }}
  labels:
    app.kubernetes.io/name: sdr-streamprocessing
    app.kubernetes.io/instance: {{ .Release.Name }}
---
# ClusterRole so SDR can list pods/deployments/statefulsets in any namespace (app may query "default" or release namespace).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "sdr-streamprocessing.fullname" . }}
  labels:
    app.kubernetes.io/name: sdr-streamprocessing
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sdr-streamprocessing.fullname" . }}
  labels:
    app.kubernetes.io/name: sdr-streamprocessing
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "sdr-streamprocessing.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "sdr-streamprocessing.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
