{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lvs-server.fullname" . }}
  labels:
    app.kubernetes.io/name: lvs-server
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: lvs-server
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lvs-server
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: lvs-server
          image: {{ include "lvs-server.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: backend
              containerPort: {{ .Values.service.backendPort }}
            - name: mcp
              containerPort: {{ .Values.service.mcpPort }}
            - name: frontend
              containerPort: {{ .Values.service.frontendPort }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            {{- if .Values.modelCache.enabled }}
            - name: model-cache
              mountPath: /tmp/model_cache
            {{- end }}
          env:
            {{- $release := .Release.Name }}
            {{- $esHost := .Values.elasticsearchHost | default (printf "%s-elasticsearch" $release) }}
            {{- $esPort := .Values.elasticsearchPort | default "9200" }}
            {{- $esTransportPort := .Values.elasticsearchTransportPort | default "9300" }}
            {{- $llmSvc := .Values.llmService | default "nvidia-nemotron-nano-9b-v2" }}
            {{- $vlmSvc := .Values.vlmService | default "cosmos-reason2-8b" }}
            {{- $llmBaseUrl := printf "http://%s-%s:8000/v1" $release $llmSvc }}
            {{- $vlmBaseUrl := printf "http://%s-%s:8000/v1" $release $vlmSvc }}
            {{- $vstInternalUrl := .Values.vstInternalUrl | default (printf "http://%s-vst-ingress-dev:30888" $release) }}
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            - name: ES_HOST
              value: {{ $esHost | quote }}
            - name: ES_PORT
              value: {{ $esPort | quote }}
            - name: ES_TRANSPORT_PORT
              value: {{ $esTransportPort | quote }}
            - name: LVS_LLM_BASE_URL
              value: {{ $llmBaseUrl | quote }}
            - name: VIA_VLM_ENDPOINT
              value: {{ $vlmBaseUrl | quote }}
            - name: VIA_VLM_OPENAI_MODEL_DEPLOYMENT_NAME
              value: "nvidia/cosmos-reason2-8b"
            - name: VST_INTERNAL_URL
              value: {{ $vstInternalUrl | quote }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "lvs-server.fullname" . }}-config
        {{- if .Values.modelCache.enabled }}
        - name: model-cache
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
