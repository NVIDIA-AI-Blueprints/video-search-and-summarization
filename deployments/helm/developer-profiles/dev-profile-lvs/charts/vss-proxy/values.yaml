# Optional: nginx reverse proxy for base (release PROXY_MODE=proxy, Brev). deployments/proxy/compose.yml
enabled: false
global: {}

image:
  repository: nginx
  tag: "1.27-alpine"
  pullPolicy: IfNotPresent
replicas: 1

# Upstreams (K8s service names; default to same release)
agentService: ""   # default: <release>-vss-agent:8000
vstService: ""     # default: <release>-vst-ingress-dev:30888
uiService: ""     # default: <release>-vss-ui:3000

service:
  port: 80
  type: ClusterIP
