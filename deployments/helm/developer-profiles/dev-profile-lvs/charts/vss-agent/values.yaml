enabled: false
global: {}
image:
  repository: nvcr.io/nvidia/vss-core/vss-agent
  tag: "3.1.0"
  pullPolicy: IfNotPresent
replicas: 1
service:
  port: 8000
  type: ClusterIP
# Profile selects config: configs/<profile>/config.yml (base | lvs | search | alerts). Set from parent per values-base/lvs/search/alerts.yaml.
profile: base
# Path to config file inside the container (must match mount path)
configFilePath: /etc/vss-agent/config.yml
livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3
# Long startup: use startupProbe so liveness/readiness don't kill during 4m init
startupProbe:
  httpGet:
    path: /health
    port: 8000
  periodSeconds: 30
  failureThreshold: 8
  timeoutSeconds: 10
phoenixEndpoint: ""
llmBaseUrl: ""
vlmBaseUrl: ""
# When true (base profile with rtvi-vlm subchart enabled), VLM_BASE_URL and RTVI_VLM_BASE_URL point to <release>-rtvi-vlm:8000
rtviVlmEnabled: false
vstExternalUrl: ""
vstInternalUrl: ""   # default: http://<Release>-vst-ingress-dev:30888 (match Compose: full URL with scheme). Same agent works in Compose with full URL; use same here.
vstMcpUrl: ""
# Optional: VST_BASE_URL (Compose parity; default from vstExternalUrl when set)
vstBaseUrl: ""
# Optional: VIDEO_ANALYSIS_MCP_URL when using vss-va-mcp (e.g. http://<release>-vss-va-mcp:9901)
videoAnalysisMcpUrl: ""
# NIM model names (config substitutes ${LLM_NAME}, ${VLM_NAME}, etc.). Must be set for config validation.
llmName: "nvidia/nvidia-nemotron-nano-9b-v2"
vlmName: "nvidia/cosmos-reason2-8b"
evalLlmJudgeName: ""   # default: same as llmName
evalLlmJudgeBaseUrl: "" # default: same as llmBaseUrl
# Reports base URL for generated report links (config: video_report_gen.base_url). Internal service URL if empty.
reportsBaseUrl: ""
# When set (e.g. for external access), overrides EXTERNAL_IP env (hostname or IP the browser uses).
externalIp: ""
# INTERNAL_IP: default <Release>-vst-ingress-dev:30888 so url_translation (video_understanding) produces http://vss-vst-ingress-dev:30888/vst/... reachable from the agent pod. Override via internalIp if needed.
vstInternalIp: ""
# External URL for video_upload_url.agent_base_url (release dev-profile-lvs .env: VSS_AGENT_EXTERNAL_URL).
vssAgentExternalUrl: ""
# Optional: VSS_AGENT_VERSION env (telemetry project id). Release 3.1.0 dev-profile-lvs: 3.1.0. Leave empty to omit.
vssAgentVersion: "3.1.0"
# LVS profile: set to "lvs-server" so LVS_BACKEND_URL becomes http://<release>-lvs-server:38111
lvsBackendService: ""
env:
  - name: EXTERNAL_IP
    value: "127.0.0.1"
  - name: INTERNAL_IP
    value: "127.0.0.1"
  - name: LLM_MODE
    value: local_shared
  - name: VLM_MODE
    value: local_shared
  - name: LLM_MODEL_TYPE
    value: nim
  - name: VLM_MODEL_TYPE
    value: nim
  - name: HOST_IP
    value: "127.0.0.1"
  - name: VSS_AGENT_HOST
    value: "0.0.0.0"
  - name: VSS_AGENT_PORT
    value: "8000"
  - name: LVS_BACKEND_URL
    value: ""
  - name: RTVI_EMBED_PORT
    value: ""
  - name: RTVI_CV_PORT
    value: ""
  - name: VSS_ES_PORT
    value: ""
  - name: VST_BASE_URL
    value: ""
  - name: VIDEO_ANALYSIS_MCP_URL
    value: ""
  - name: RTVI_VLM_BASE_URL
    value: ""
  - name: NVIDIA_API_KEY
    value: ""
  - name: OPENAI_API_KEY
    value: ""
  - name: VSS_AGENT_OBJECT_STORE_TYPE
    value: local_object_store
  - name: VSS_AGENT_TEMPLATE_PATH
    value: ""
  - name: VSS_AGENT_TEMPLATE_NAME
    value: ""
  - name: COSMOS_EMBED_ENDPOINT
    value: ""
  - name: ELASTIC_SEARCH_ENDPOINT
    value: ""
  - name: ELASTIC_SEARCH_INDEX
    value: ""
  - name: STREAM_MODE
    value: other
  - name: EVAL_DIR
    value: ""
  - name: DATASET_DIR
    value: ""
  - name: DATASET_FILE_NAME
    value: ""
  - name: EVAL_OUTPUT_DIR
    value: ""
resources: {}
nodeSelector: {}
tolerations: []
