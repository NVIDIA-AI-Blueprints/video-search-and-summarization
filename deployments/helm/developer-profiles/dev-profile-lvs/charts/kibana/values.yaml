enabled: false
global: {}

image:
  repository: docker.elastic.co/kibana/kibana
  tag: "9.3.0"
  pullPolicy: IfNotPresent
replicas: 1

elasticsearchHosts: ""   # default: http://<release>-elasticsearch:9200

# Public Kibana URL for embedding / SERVER_PUBLICBASEURL. When empty, uses parent global.kibanaPublicUrl, then in-cluster default.
kibanaPublicUrl: ""
serverPublicBaseUrl: ""

service:
  port: 5601
  type: ClusterIP

resources: {}
nodeSelector: {}
tolerations: []
