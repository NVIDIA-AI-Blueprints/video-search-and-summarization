{{- if .Values.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kibana-init-container-lvs.fullname" . }}
  labels:
    app.kubernetes.io/name: kibana-init-container-lvs
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    helm.sh/hook-weight: "6"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 10
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kibana-init-container-lvs
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: kibana-import
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c", "apk add --no-cache curl bash && bash /opt/mdx/kibana-import-dashboard.sh"]
          env:
            - name: KIBANA_URL
              value: {{ .Values.kibanaUrl | default (printf "http://%s-kibana:5601" .Release.Name) | quote }}
            - name: ELASTICSEARCH_URL
              value: {{ .Values.elasticsearchUrl | default (printf "http://%s-elasticsearch:9200" .Release.Name) | quote }}
          volumeMounts:
            - name: import-data
              mountPath: /opt/mdx
              readOnly: true
      volumes:
        - name: import-data
          configMap:
            name: {{ include "kibana-init-container-lvs.fullname" . }}-import
            defaultMode: 0755
{{- end }}
