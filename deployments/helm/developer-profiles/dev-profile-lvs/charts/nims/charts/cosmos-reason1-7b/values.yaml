# NIM VLM: NIMCache + NIMService CRDs. Mirrors deployments/nim/cosmos-reason1-7b
enabled: false
global: {}

image:
  repository: nvcr.io/nim/nvidia/cosmos-reason1-7b
  tag: "1.4.1"
  pullPolicy: IfNotPresent

model:
  engine: tensorrt_llm
  profiles:
    - all

replicas: 1

storage:
  pvc:
    create: true
    size: "120Gi"
    volumeAccessMode: ReadWriteOnce
    storageClass: ""
  sharedMemorySizeLimit: "32Gi"

hardwareProfile: ""

# env: default when hardwareProfile is "" or no envByHardware key (either/or with envByHardware in template).
# envByHardware: only variables from met-blueprint-release deployments/nim/cosmos-reason1-7b/hw-*.env (${VLM_NIM_KVCACHE_PERCENT} -> 0.7).
env:
  - name: NIM_HTTP_API_PORT
    value: "8000"
  - name: NIM_TRITON_LOG_VERBOSE
    value: "1"
  - name: NIM_SERVED_MODEL_NAME
    value: "nvidia/cosmos-reason1-7b"
  - name: NIM_KVCACHE_PERCENT
    value: "0.8"
  - name: NIM_MAX_MODEL_LEN
    value: "16000"
  - name: NIM_MAX_NUM_SEQS
    value: "16"
  - name: NIM_MODEL_NAME
    value: ""

envByHardware:
  H100:
    - name: NIM_KVCACHE_PERCENT
      value: "0.7"
  RTXPRO6000BW:
    - name: NIM_KVCACHE_PERCENT
      value: "0.7"
  H100-shared:
    - name: NIM_KVCACHE_PERCENT
      value: "0.8"
    - name: NIM_MAX_MODEL_LEN
      value: "16000"
    - name: NIM_MAX_NUM_SEQS
      value: "16"
  L40S:
    - name: NIM_KVCACHE_PERCENT
      value: "0.8"
    - name: NIM_MAX_MODEL_LEN
      value: "32768"
    - name: NIM_MAX_NUM_SEQS
      value: "4"
    - name: MAX_JOBS
      value: "4"
  RTXPRO6000BW-shared:
    - name: NIM_KVCACHE_PERCENT
      value: "0.4"
    - name: NIM_MAX_MODEL_LEN
      value: "16384"
    - name: NIM_MAX_NUM_SEQS
      value: "4"
    - name: MAX_JOBS
      value: "4"

resources:
  limits:
    nvidia.com/gpu: 1
  requests:
    nvidia.com/gpu: 1

nodeSelector: {}
tolerations: []

expose:
  service:
    name: http
    type: ClusterIP
    port: 8000
    grpcPort: 8001

imagePullSecret:
  name: "ngc-secret"
ngcApiSecret:
  name: "ngc-api"
