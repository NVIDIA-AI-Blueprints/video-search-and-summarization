# NIM LLM: NIMCache + NIMService CRDs. Mirrors deployments/nim/nvidia-nemotron-nano-9b-v2
enabled: false
global: {}

image:
  repository: nvcr.io/nim/nvidia/nvidia-nemotron-nano-9b-v2
  tag: "1"
  pullPolicy: IfNotPresent

model:
  engine: tensorrt_llm
  profiles:
    - all

replicas: 1

storage:
  pvc:
    create: true
    size: "120Gi"
    volumeAccessMode: ReadWriteOnce
    storageClass: ""
  sharedMemorySizeLimit: "16Gi"

hardwareProfile: ""

# env: default when hardwareProfile is "" or no envByHardware key (either/or with envByHardware in template).
# envByHardware: only variables from met-blueprint-release deployments/nim/nvidia-nemotron-nano-9b-v2/hw-*.env (empty hw files have no key).
env:
  - name: NIM_HTTP_API_PORT
    value: "8000"
  - name: NIM_TRITON_LOG_VERBOSE
    value: "1"
  - name: NIM_SERVED_MODEL_NAME
    value: "nvidia/nvidia-nemotron-nano-9b-v2"
  - name: PYTORCH_CUDA_ALLOC_CONF
    value: "expandable_segments:True"
  - name: NIM_KVCACHE_PERCENT
    value: "0.4"
  - name: NIM_MAX_MODEL_LEN
    value: "128000"
  - name: NIM_MAX_NUM_SEQS
    value: "4"
  - name: NIM_LOW_MEMORY_MODE
    value: "1"
  - name: NIM_MODEL_NAME
    value: ""

envByHardware:
  H100-shared:
    - name: NIM_KVCACHE_PERCENT
      value: "0.4"
    - name: NIM_MAX_NUM_SEQS
      value: "4"
    - name: NIM_MAX_MODEL_LEN
      value: "128000"
    - name: NIM_LOW_MEMORY_MODE
      value: "1"
  L40S:
    - name: NIM_KVCACHE_PERCENT
      value: "0.8"
    - name: NIM_MAX_NUM_SEQS
      value: "4"
    - name: NIM_MAX_MODEL_LEN
      value: "128000"
    - name: NIM_LOW_MEMORY_MODE
      value: "1"
  RTXPRO6000BW-shared:
    - name: NIM_KVCACHE_PERCENT
      value: "0.4"
    - name: NIM_MAX_NUM_SEQS
      value: "4"
    - name: NIM_MAX_MODEL_LEN
      value: "128000"
    - name: MAX_JOBS
      value: "4"
    - name: NIM_LOW_MEMORY_MODE
      value: "1"

resources:
  limits:
    nvidia.com/gpu: 1
  requests:
    nvidia.com/gpu: 1

nodeSelector: {}
tolerations: []

expose:
  service:
    name: http
    type: ClusterIP
    port: 8000
    grpcPort: 8001

imagePullSecret:
  name: "ngc-secret"
ngcApiSecret:
  name: "ngc-api"
