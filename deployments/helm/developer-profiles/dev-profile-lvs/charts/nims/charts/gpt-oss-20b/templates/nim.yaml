{{- if and (.Capabilities.APIVersions.Has "apps.nvidia.com/v1alpha1") .Values.enabled }}
{{- $name := include "gpt-oss-20b.fullname" . }}
{{- $imgPullSecret := .Values.imagePullSecret.name | default "ngc-secret" }}
{{- $ngcSecret := .Values.ngcApiSecret.name | default (index (index .Values.global "ngcApiSecret") "name") | default "ngc-api" }}
---
apiVersion: apps.nvidia.com/v1alpha1
kind: NIMCache
metadata:
  name: {{ $name }}-cache
  annotations:
    helm.sh/resource-policy: keep
spec:
  source:
    ngc:
      modelPuller: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
      pullSecret: {{ $imgPullSecret }}
      authSecret: {{ $ngcSecret }}
      model:
{{ toYaml .Values.model | nindent 8 }}
  storage:
    pvc:
      create: {{ .Values.storage.pvc.create | default true }}
      storageClass: {{ .Values.storage.pvc.storageClass | default (index .Values.global "storageClass") | default "" }}
      size: {{ .Values.storage.pvc.size | default "120Gi" }}
      volumeAccessMode: {{ .Values.storage.pvc.volumeAccessMode | default "ReadWriteOnce" }}
  resources: {}
---
apiVersion: apps.nvidia.com/v1alpha1
kind: NIMService
metadata:
  name: {{ $name }}
spec:
  image:
    repository: {{ .Values.image.repository }}
    tag: {{ .Values.image.tag | toString | quote }}
    pullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
    pullSecrets:
      - {{ $imgPullSecret }}
  authSecret: {{ $ngcSecret }}
  storage:
    nimCache:
      name: {{ $name }}-cache
    sharedMemorySizeLimit: {{ .Values.storage.sharedMemorySizeLimit | default "16Gi" }}
  env:
{{- $profile := .Values.hardwareProfile | default "" }}
{{- if and $profile (index .Values.envByHardware $profile) }}
{{ toYaml (index .Values.envByHardware $profile) | nindent 4 }}
{{- else }}
{{ toYaml .Values.env | nindent 4 }}
{{- end }}
    - name: NGC_API_KEY
      valueFrom:
        secretKeyRef:
          name: {{ $ngcSecret }}
          key: {{ .Values.ngcApiSecret.key | default (index (index .Values.global "ngcApiSecret") "key") | default "NGC_API_KEY" }}
  replicas: {{ .Values.replicas | default 1 }}
  {{- with .Values.nodeSelector }}
  nodeSelector:
{{ toYaml . | nindent 4 }}
  {{- end }}
  resources:
{{ toYaml .Values.resources | nindent 4 }}
  {{- with .Values.tolerations }}
  tolerations:
{{ toYaml . | nindent 4 }}
  {{- end }}
  expose:
{{ toYaml .Values.expose | nindent 4 }}
{{- end }}
