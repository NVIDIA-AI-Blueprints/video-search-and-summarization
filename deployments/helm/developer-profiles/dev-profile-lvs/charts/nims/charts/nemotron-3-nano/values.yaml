# NIM LLM: NIMCache + NIMService CRDs. Mirrors deployments/nim/nemotron-3-nano
enabled: false
global: {}

image:
  repository: nvcr.io/nim/nvidia/nemotron-3-nano
  tag: "1"
  pullPolicy: IfNotPresent

model:
  engine: tensorrt_llm
  profiles:
    - all

replicas: 1

storage:
  pvc:
    create: true
    size: "120Gi"
    volumeAccessMode: ReadWriteOnce
    storageClass: ""
  sharedMemorySizeLimit: "16Gi"

hardwareProfile: ""

# env: default when hardwareProfile is "" or no envByHardware key (either/or with envByHardware in template).
# envByHardware: only variables from met-blueprint-release deployments/nim/nemotron-3-nano/hw-*.env (non-shared hw files are empty — no key).
env:
  - name: NIM_HTTP_API_PORT
    value: "8000"
  - name: NIM_TRITON_LOG_VERBOSE
    value: "1"
  - name: NIM_SERVED_MODEL_NAME
    value: "nvidia/nemotron-3-nano"
  - name: NIM_KVCACHE_PERCENT
    value: "0.5"
  - name: NIM_MAX_NUM_SEQS
    value: "2"
  - name: NIM_MAX_MODEL_LEN
    value: "32000"
  - name: MAX_JOBS
    value: "4"
  - name: NIM_MODEL_PROFILE
    value: "vllm-fp8-tp1-pp1-27ac2ff073b4ce11dd17e47d0526609589e76091f36cc5fc32b567b18e57ef27"

envByHardware:
  H100-shared:
    - name: NIM_KVCACHE_PERCENT
      value: "0.5"
    - name: NIM_MAX_NUM_SEQS
      value: "2"
    - name: NIM_MAX_MODEL_LEN
      value: "32000"
    - name: MAX_JOBS
      value: "4"
    - name: NIM_MODEL_PROFILE
      value: "vllm-fp8-tp1-pp1-27ac2ff073b4ce11dd17e47d0526609589e76091f36cc5fc32b567b18e57ef27"
  RTXPRO6000BW-shared:
    - name: NIM_KVCACHE_PERCENT
      value: "0.5"
    - name: NIM_MAX_NUM_SEQS
      value: "2"
    - name: NIM_MAX_MODEL_LEN
      value: "32000"
    - name: MAX_JOBS
      value: "4"
    - name: NIM_MODEL_PROFILE
      value: "vllm-fp8-tp1-pp1-27ac2ff073b4ce11dd17e47d0526609589e76091f36cc5fc32b567b18e57ef27"

resources:
  limits:
    nvidia.com/gpu: 1
  requests:
    nvidia.com/gpu: 1

nodeSelector: {}
tolerations: []

expose:
  service:
    name: http
    type: ClusterIP
    port: 8000
    grpcPort: 8001

imagePullSecret:
  name: "ngc-secret"
ngcApiSecret:
  name: "ngc-api"
