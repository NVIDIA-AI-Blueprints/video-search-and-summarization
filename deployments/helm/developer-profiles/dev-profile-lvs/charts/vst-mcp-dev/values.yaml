enabled: false
global: {}
image:
  repository: nvcr.io/nvidia/vss-core/vss-vios-mcp
  tag: "3.1.0"
  pullPolicy: IfNotPresent
replicas: 1
service:
  port: 8001
  type: ClusterIP
# Compose parity: environment block
vstIngressUrl: ""   # e.g. http://vss-vst-ingress-dev:30888/vst
# MCP_GATEWAY_CPP_API_BASE_URL is set by the template from vstIngressUrl
env:
  - name: MCP_GATEWAY_CPP_API_TIMEOUT
    value: "30"
  - name: MCP_GATEWAY_SERVER_NAME
    value: vst-mcp-server
  - name: MCP_GATEWAY_SERVER_VERSION
    value: 1.0.0
  - name: MCP_GATEWAY_LOG_LEVEL
    value: INFO
  - name: MCP_GATEWAY_ENABLE_JSONRPC_LOGGING
    value: "true"
  - name: MCP_GATEWAY_SERVER_HOST
    value: "0.0.0.0"
  - name: MCP_GATEWAY_SERVER_PORT
    value: "8001"
resources: {}
nodeSelector: {}
tolerations: []
