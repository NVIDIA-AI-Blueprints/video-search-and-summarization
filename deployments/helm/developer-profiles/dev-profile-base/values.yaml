# VSS parent chart — default values. End users install with: helm install vss . -f values-base.yaml -n vss --create-namespace

profile: base
mode: ""
llmNameSlug: ""
vlmNameSlug: ""

# NGC: when using nvcr.io images, set ngc.createSecrets and ngc.apiKey (or use -f values-ngc-secrets.yaml).
# Chart creates ngc-api + ngc-secret when createSecrets is true; you must still set global.imagePullSecrets.
ngc:
  createSecrets: true
  apiKey: ""
  # apiKeySecretName: "ngc-api"
  # dockerSecretName: "ngc-secret"

# Set global.imagePullSecrets when using a private registry (e.g. nvcr.io). Set global.storageClass for PVCs.
# When using NGC (or copy from values-ngc-secrets.example.yaml):
global:
  imagePullSecrets:
    - name: ngc-secret
  ngcApiSecret:
    name: ngc-api
    key: NGC_API_KEY
  # When subchart URL/host fields are empty, vss-ui / vss-agent / vst-ingress-dev use these to build URLs (scheme defaults to http if unset).
  # For default http/https ports (80/443), keep externalPort "" so URLs omit :port; set a port only when not using the default.
  externalScheme: ""
  externalHost: ""
  externalPort: ""
# global.storageClass set in values-base.yaml

# Shared VST storage (sensor + streamprocessing). Optional. When false (default), pods use emptyDir — no PVCs, pods start immediately.
# Set createSharedPvcs: true only when you need persistent vst_data/vst_video/streamer_videos; ensure StorageClass exists (e.g. oci-bv-high on OKE).
# When true, also set sensor-ms-dev.persistence and streamprocessing-ms-dev.persistence below to use the created claims.
vstStorage:
  createSharedPvcs: true
  accessMode: ReadWriteOnce
  vstData:
    size: 10Gi
    storageClass: ""
  vstVideo:
    size: 20Gi
    storageClass: ""
  streamerVideos:
    size: 20Gi
    storageClass: ""

# External access: set global.externalScheme / externalHost / externalPort in values-base.yaml (no separate baseUrl key — templates build URLs from global).

# Core VSS stack subcharts enabled by default (base profile). Disable selectively, or set rtvi-vlm / vss-proxy as needed.
# Image repository/tag/pullPolicy and default replicas live in each subchart: charts/<name>/values.yaml (override from your values file only when needed).
phoenix:
  enabled: true

redis:
  enabled: true

centralizedb-dev:
  enabled: true
  # storage.data.size / storageClass: see subchart or override

envoy-streamprocessing:
  enabled: true

sdr-streamprocessing:
  enabled: true
  # clusterType: kubernetes (default) uses K8s API; no Docker socket. Set to "docker" only if mounting host docker.sock.

sensor-ms-dev:
  enabled: true
  # Persistence: when existingClaim is "", subchart defaults to <release>-vst-data, <release>-vst-video (same as parent shared PVCs).
  # When vstStorage.createSharedPvcs is true, parent creates these PVCs; subchart uses them by default.
  persistence:
    vstData: { enabled: true, create: false, existingClaim: "" }
    vstVideo: { enabled: true, create: false, existingClaim: "" }

streamprocessing-ms-dev:
  enabled: true
  # Video upload media info (duration/codec) needs libav/ffmpeg in the image. Subchart sets VST_INSTALL_ADDITIONAL_PACKAGES=true so user_additional_install.sh runs at startup if present in image; override env if needed.
  # Persistence: when existingClaim is "", subchart defaults to <release>-vst-data, <release>-vst-video, <release>-vst-streamer-videos (same as parent shared PVCs).
  # When vstStorage.createSharedPvcs is true, parent creates these PVCs; subchart uses them by default.
  persistence:
    vstData: { enabled: true, create: false, existingClaim: "" }
    vstVideo: { enabled: true, create: false, existingClaim: "" }
    streamerVideos: { enabled: true, create: false, existingClaim: "" }

vst-ingress-dev:
  enabled: true
  # Empty: uses global.externalHost, then 127.0.0.1
  externallyAccessibleIp: ""

vst-mcp-dev:
  enabled: true

# Optional: nginx reverse proxy (release: bp_developer_base_2d_proxy, PROXY_MODE=proxy). deployments/proxy/compose.yml. Use for single-entrypoint parity with Brev; otherwise use Ingress.
vss-proxy:
  enabled: false

# Optional: RTVI VLM for base profile (edge / IGX-THOR, AGX-THOR local VLM). Release: deployments/rtvi/rtvi-vlm (profiles bp_developer_base_2d_IGX-THOR, bp_developer_base_2d_AGX-THOR).
# When enabled, set vss-agent.rtviVlmEnabled true so agent gets RTVI_VLM_BASE_URL and VLM_BASE_URL pointing to rtvi-vlm service.
rtvi-vlm:
  enabled: false

vss-agent:
  enabled: true
  # When rtvi-vlm subchart is enabled (base edge / local VLM), set to true so agent gets RTVI_VLM_BASE_URL and VLM_BASE_URL pointing to rtvi-vlm service.
  rtviVlmEnabled: false
  # profile: base | lvs | search | alerts — selects configs/<profile>/config.yml. Set per profile in values-base/lvs/search/alerts.yaml.
  profile: base
  # NIM model names for config env (LLM_NAME, VLM_NAME, etc.). Override in profile values if using different LLM/VLM.
  llmName: "nvidia/nvidia-nemotron-nano-9b-v2"
  vlmName: "nvidia/cosmos-reason2-8b"
  evalLlmJudgeName: ""   # default in subchart: same as llmName
  evalLlmJudgeBaseUrl: "" # default in subchart: same as llmBaseUrl
  # Empty: vss-agent deployment uses global.external* then in-cluster defaults (see global.externalScheme / externalHost / externalPort).
  reportsBaseUrl: ""
  vstExternalUrl: ""
  externalIp: ""

vss-ui:
  enabled: true
  # Empty: vss-ui deployment uses global.external* then in-cluster defaults.
  agentApiUrlBase: ""
  vstApiUrl: ""
  chatCompletionUrl: ""
  websocketChatUrl: ""

# NIM models (umbrella subchart nims). Set nims.enabled false to skip all NIM CRDs.
# Default base profile enables nemotron + cosmos-reason2; override or disable per model as needed.
nims:
  enabled: true
  cosmos-reason1-7b:
    enabled: false
    hardwareProfile: H100
  cosmos-reason2-8b:
    enabled: true
    hardwareProfile: H100
  gpt-oss-20b:
    enabled: false
    hardwareProfile: H100
  llama-3.3-nemotron-super-49b-v1.5:
    enabled: false
    hardwareProfile: H100
  nemotron-3-nano:
    enabled: false
    hardwareProfile: H100
  nvidia-nemotron-nano-9b-v2:
    enabled: true
    hardwareProfile: H100
    #hardwareProfile: RTXPRO6000BW-shared
    #hardwareProfile: L40S
  nvidia-nemotron-nano-9b-v2-fp8:
    enabled: false
    hardwareProfile: H100
  qwen3-vl-8b-instruct:
    enabled: false
    hardwareProfile: H100
