{{- /* Shared VST storage PVCs. Single-node: ReadWriteOnce is enough (both pods on same node). Use ReadWriteMany only if sensor/streamprocessing can run on different nodes. */}}
{{- if and (index .Values "vstStorage") .Values.vstStorage.createSharedPvcs }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-vst-data
  labels:
    app.kubernetes.io/name: vss
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: vst-storage
spec:
  accessModes:
    - {{ .Values.vstStorage.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.vstStorage.vstData.size | default "10Gi" }}
  {{- $sc := .Values.vstStorage.vstData.storageClass | default (index .Values.global "storageClass") }}
  {{- if $sc }}
  storageClassName: {{ $sc }}
  {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-vst-video
  labels:
    app.kubernetes.io/name: vss
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: vst-storage
spec:
  accessModes:
    - {{ .Values.vstStorage.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.vstStorage.vstVideo.size | default "20Gi" }}
  {{- $sc := .Values.vstStorage.vstVideo.storageClass | default (index .Values.global "storageClass") }}
  {{- if $sc }}
  storageClassName: {{ $sc }}
  {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-vst-streamer-videos
  labels:
    app.kubernetes.io/name: vss
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: vst-storage
spec:
  accessModes:
    - {{ .Values.vstStorage.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.vstStorage.streamerVideos.size | default "20Gi" }}
  {{- $sc := .Values.vstStorage.streamerVideos.storageClass | default (index .Values.global "storageClass") }}
  {{- if $sc }}
  storageClassName: {{ $sc }}
  {{- end }}
{{- end }}
