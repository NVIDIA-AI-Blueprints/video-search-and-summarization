{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "envoy-streamprocessing.fullname" . }}
  labels:
    app.kubernetes.io/name: envoy-streamprocessing
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: envoy-streamprocessing
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: envoy-streamprocessing
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: envoy-streamprocessing
          image: {{ include "envoy-streamprocessing.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            {{- toYaml .Values.env | nindent 12 }}
            - name: WDM_WL_REDIS_SERVER
              value: {{ .Values.redisServer | default (printf "%s-redis" .Release.Name) | quote }}
            - name: WDM_WL_REDIS_PORT
              value: {{ .Values.redisPort | default "6379" | quote }}
            - name: WDM_KFK_BOOTSTRAP_URL
              value: {{ .Values.kafkaBootstrapUrl | quote }}
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
              readOnly: true
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: envoy-config
          configMap:
            name: {{ include "envoy-streamprocessing.fullname" . }}-envoy
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
