enabled: false
global: {}
image:
  repository: nvcr.io/nvidia/vss-core/vss-vios-ingress
  tag: "3.1.0"
  pullPolicy: IfNotPresent
replicas: 1
service:
  port: 30888
  type: ClusterIP
# Compose parity: healthcheck, env and volumes (nginx config, logs)
# Compose healthcheck: tcp ${VST_INGRESS_HTTP_PORT:-30888}
livenessProbe:
  tcpSocket:
    port: 30888
  initialDelaySeconds: 2
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30
readinessProbe:
  tcpSocket:
    port: 30888
  initialDelaySeconds: 2
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30
hostIp: ""
# Empty: deployment uses global.externalHost, then 127.0.0.1 (subchart default was 127.0.0.1 before global fallback).
externallyAccessibleIp: ""
vstIngressHttpPort: "30888"
sensorUpstream: ""
# Agent backend for /static/ (report files). Empty = use Release.Name-vss-agent:8000. Required so url_validator can reach report URLs when internal_ip points at this ingress.
agentUpstream: ""
envoyUpstream: ""
env:
  - name: HOST_IP
    value: ""
  - name: EXTERNALLY_ACCESSIBLE_IP
    value: "127.0.0.1"
  - name: VST_INGRESS_HTTP_PORT
    value: "30888"
resources: {}
nodeSelector: {}
tolerations: []
