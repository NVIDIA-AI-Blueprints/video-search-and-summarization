{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sensor-ms-dev.fullname" . }}
  labels:
    app.kubernetes.io/name: sensor-ms-dev
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: sensor-ms-dev
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sensor-ms-dev
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/config: {{ list (.Files.Get "configs/vst_config.json") (.Files.Get "configs/adaptor_config.json") (.Files.Get "configs/vst_storage.json") (.Files.Get "configs/rtsp_streams.json") | join "" | sha256sum }}
    spec:
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: sensor-ms-dev
          image: {{ include "sensor-ms-dev.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            {{- toYaml .Values.env | nindent 12 }}
            - name: CENTRALIZE_DB_HOSTADDR
              value: {{ (.Values.centralizedDbHost | default (printf "%s-centralizedb-dev" .Release.Name)) | quote }}
            - name: CENTRALIZE_DB_PORT
              value: {{ (.Values.centralizedDbPort | default "5432") | quote }}
            - name: STREAM_PROCESSOR_MODULE_ENDPOINT
              value: {{ .Values.streamProcessorEndpoint | default (printf "http://%s-envoy-streamprocessing:10000" .Release.Name) | quote }}
            - name: VST_INGRESS_ENDPOINT
              value: {{ .Values.vstIngressEndpoint | default (printf "http://%s-vst-ingress-dev:30888/vst" .Release.Name) | quote }}
          volumeMounts:
            - name: configs
              mountPath: /home/vst/vst_release/configs
              readOnly: true
            - name: vst-data
              mountPath: /home/vst/vst_release/vst_data
            - name: vst-video
              mountPath: /home/vst/vst_release/vst_video
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: configs
          configMap:
            name: {{ include "sensor-ms-dev.fullname" . }}-configs
        - name: vst-data
          {{- if and (index .Values "persistence") .Values.persistence.vstData.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.vstData.existingClaim | default (printf "%s-vst-data" .Release.Name) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: vst-video
          {{- if and (index .Values "persistence") .Values.persistence.vstVideo.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.vstVideo.existingClaim | default (printf "%s-vst-video" .Release.Name) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
