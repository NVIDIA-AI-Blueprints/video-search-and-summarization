{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sensor-ms-dev.fullname" . }}-configs
  labels:
    app.kubernetes.io/name: sensor-ms-dev
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  vst_config.json: |
{{ .Files.Get "configs/vst_config.json" | replace "__REDIS_ADDRESS__" (.Values.redisServerAddress | default (printf "%s-redis:6379" .Release.Name)) | indent 4 }}
  adaptor_config.json: |
{{ .Files.Get "configs/adaptor_config.json" | indent 4 }}
  vst_storage.json: |
{{ .Files.Get "configs/vst_storage.json" | indent 4 }}
  rtsp_streams.json: |
{{ .Files.Get "configs/rtsp_streams.json" | indent 4 }}
{{- end }}
