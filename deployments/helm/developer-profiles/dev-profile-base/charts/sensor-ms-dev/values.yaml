enabled: false
global: {}
image:
  repository: nvcr.io/nvidia/vss-core/vss-vios-sensor
  tag: "3.1.0"
  pullPolicy: IfNotPresent
replicas: 1
service:
  port: 30000
  type: ClusterIP
# Compose parity: entrypoint, healthcheck, env and volumes (configs, vst_data, vst_video)
command: ["/bin/bash", "-c"]
args: ["exec /home/vst/vst_release/launch_vst"]
# Compose healthcheck: CMD-SHELL bash -ec 'exec 3<>/dev/tcp/127.0.0.1/30000' → tcpSocket on service port
livenessProbe:
  tcpSocket:
    port: 30000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 20
readinessProbe:
  tcpSocket:
    port: 30000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 20
streamProcessorEndpoint: ""   # override if needed; else derived as http://<Release.Name>-envoy-streamprocessing:10000
vstIngressEndpoint: ""        # override if needed; else http://<Release.Name>-vst-ingress-dev:30888/vst (fixes "Default ingress endpoint: :30888/vst" in logs)
# Redis: used in vst_config.json notifications.redis_server_env_var. Default "" means <Release.Name>-redis:6379.
redisServerAddress: ""
# Centralized DB host/port are derived in the template as <Release.Name>-centralizedb-dev and 5432. Override only if using external DB:
# centralizedDbHost: "my-postgres.example"
# centralizedDbPort: "5432"
env:
  - name: HOST_IP
    value: "0.0.0.0"
  - name: ADAPTOR
    value: vst_rtsp
  - name: NEED_RECORDING
    value: "false"
  - name: NEED_RTSPSERVER
    value: "false"
  - name: NEED_STORAGE
    value: "false"
  - name: NEED_STREAM_MONITORING
    value: "true"
  - name: HTTP_PORT
    value: "30000"
  - name: CENTRALIZE_DB_NAME
    value: nvcentralizedb
  - name: CENTRALIZE_DB_USERNAME
    value: vst
  # STREAM_PROCESSOR_MODULE_ENDPOINT is set by the template from streamProcessorEndpoint

# Persistence: compose mounts VST_DATA_PATH, VST_VIDEO_STORAGE_PATH. Optional PVCs for vst-data, vst-video.
# To share with streamprocessing-ms-dev, set existingClaim to the same claim name (e.g. vss-vst-data). Single-node: ReadWriteOnce is enough.
persistence:
  vstData:
    enabled: false
    create: true
    existingClaim: ""
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  vstVideo:
    enabled: false
    create: true
    existingClaim: ""
    size: 20Gi
    storageClass: ""
    accessMode: ReadWriteOnce
# Run as root (match compose user: "0:0") so the app can write to vst_data/vst_video (SQLite, recordings). Override if your image expects non-root.
securityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0

# Request 1 GPU for HW encode/decode (NVIDIA device plugin). Set to {} to run without GPU (software path).
# resources:
#   limits:
#     nvidia.com/gpu: 1
#   requests:
#     nvidia.com/gpu: 1
nodeSelector: {}
tolerations: []
