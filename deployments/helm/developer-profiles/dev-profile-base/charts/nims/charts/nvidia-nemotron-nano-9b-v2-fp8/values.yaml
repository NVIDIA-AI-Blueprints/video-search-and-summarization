# NIM LLM (FP8): NIMCache + NIMService CRDs. Mirrors deployments/nim/nvidia-nemotron-nano-9b-v2-fp8
enabled: false
global: {}

image:
  repository: nvcr.io/nim/nvidia/nvidia-nemotron-nano-9b-v2-fp8
  tag: "1"   # NIM catalog tag; release_3.1.0 fp8 stack uses vLLM image instead
  pullPolicy: IfNotPresent

model:
  engine: tensorrt_llm
  profiles:
    - all

replicas: 1

storage:
  pvc:
    create: true
    size: "120Gi"
    volumeAccessMode: ReadWriteOnce
    storageClass: ""
  sharedMemorySizeLimit: "16Gi"

hardwareProfile: ""

# env: default when hardwareProfile is "" or no envByHardware key (either/or with envByHardware in template).
# envByHardware: only variables from met-blueprint-release deployments/nim/nvidia-nemotron-nano-9b-v2-fp8/hw-*.env (3.1.0 files are header-only — {}).
env:
  - name: NIM_HTTP_API_PORT
    value: "8000"
  - name: NIM_SERVED_MODEL_NAME
    value: "nvidia/NVIDIA-Nemotron-Nano-9B-v2-FP8"

envByHardware: {}

resources:
  limits:
    nvidia.com/gpu: 1
  requests:
    nvidia.com/gpu: 1

nodeSelector: {}
tolerations: []

expose:
  service:
    name: http
    type: ClusterIP
    port: 8000
    grpcPort: 8001

imagePullSecret:
  name: "ngc-secret"
ngcApiSecret:
  name: "ngc-api"
