# Umbrella chart: all alerts-profile NIMs in one dependency group.
# Service names stay <Release.Name>-<nim-chart-name> (see each subchart _helpers.tpl).
apiVersion: v2
name: nims
description: NVIDIA NIM models (NIMCache + NIMService) for dev-profile-base
type: application
version: 0.1.0
appVersion: "1.0"
dependencies:
  - name: cosmos-reason1-7b
    version: "0.1.0"
    repository: "file://./charts/cosmos-reason1-7b"
    condition: cosmos-reason1-7b.enabled
  - name: cosmos-reason2-8b
    version: "0.1.0"
    repository: "file://./charts/cosmos-reason2-8b"
    condition: cosmos-reason2-8b.enabled
  - name: gpt-oss-20b
    version: "0.1.0"
    repository: "file://./charts/gpt-oss-20b"
    condition: gpt-oss-20b.enabled
  - name: llama-3.3-nemotron-super-49b-v1.5
    version: "0.1.0"
    repository: "file://./charts/llama-3.3-nemotron-super-49b-v1.5"
    condition: llama-3.3-nemotron-super-49b-v1.5.enabled
  - name: nemotron-3-nano
    version: "0.1.0"
    repository: "file://./charts/nemotron-3-nano"
    condition: nemotron-3-nano.enabled
  - name: nvidia-nemotron-nano-9b-v2
    version: "0.1.0"
    repository: "file://./charts/nvidia-nemotron-nano-9b-v2"
    condition: nvidia-nemotron-nano-9b-v2.enabled
  - name: nvidia-nemotron-nano-9b-v2-fp8
    version: "0.1.0"
    repository: "file://./charts/nvidia-nemotron-nano-9b-v2-fp8"
    condition: nvidia-nemotron-nano-9b-v2-fp8.enabled
  - name: qwen3-vl-8b-instruct
    version: "0.1.0"
    repository: "file://./charts/qwen3-vl-8b-instruct"
    condition: qwen3-vl-8b-instruct.enabled
maintainers: []
