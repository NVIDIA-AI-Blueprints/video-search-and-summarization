enabled: false
global: {}
image:
  repository: nvcr.io/nvidia/vss-core/vss-agent-ui
  tag: "3.1.0"
  pullPolicy: IfNotPresent
replicas: 1
service:
  port: 3000
  type: ClusterIP
# Compose parity: NEXT_PUBLIC_* env (parameterized). These are sent to the browser (__ENV.js);
# the browser fetches agent and VST APIs from these URLs. Use in-cluster URLs (default) when
# the UI is reached via Ingress/LoadBalancer that proxies to the same cluster. For local
# port-forward, set to 127.0.0.1 and run three port-forwards (UI 3000, agent 8000, vst-ingress 30888);
# HTTP chat defaults to http://<release>-vss-agent:8000/chat/stream when chatCompletionUrl is empty.
# websocketChatUrl still required for WS chat when not using ingress proxy; see values-local-portforward.example.yaml.
agentApiUrlBase: ""
vstApiUrl: ""
chatCompletionUrl: ""
websocketChatUrl: ""
env:
  # Bind to all interfaces so port-forward and K8s probes can reach the server (Next.js otherwise binds to pod hostname only).
  - name: HOSTNAME
    value: "0.0.0.0"
  - name: RUN_APP_NAME
    value: nv-metropolis-bp-vss-ui
  - name: NEXT_PUBLIC_APP_TITLE
    value: VSS BLUEPRINT
  - name: NEXT_PUBLIC_APP_SUBTITLE
    value: Vision (Base)
  - name: NEXT_PUBLIC_ENABLE_CHAT_TAB
    value: "true"
  - name: NEXT_PUBLIC_ENABLE_ALERTS_TAB
    value: "false"
  - name: NEXT_PUBLIC_ALERTS_TAB_MAX_RESULT_SIZE
    value: "100"
  - name: NEXT_PUBLIC_ALERTS_TAB_DEFAULT_TIME_WINDOW_IN_MINUTES
    value: "10"
  - name: NEXT_PUBLIC_ALERTS_TAB_DEFAULT_AUTO_REFRESH_IN_MILLISECONDS
    value: "1000"
  - name: NEXT_PUBLIC_ALERTS_TAB_VERIFIED_FLAG_DEFAULT
    value: "false"
  - name: NEXT_PUBLIC_ALERTS_TAB_ALERT_REPORT_PROMPT_TEMPLATE
    value: "Generate a report for incident {incidentId} with sensor id {sensorId}."
  - name: NEXT_PUBLIC_ALERTS_TAB_MAX_SEARCH_TIME_LIMIT
    value: "0"
  - name: NEXT_PUBLIC_ENABLE_DASHBOARD_TAB
    value: "false"
  - name: NEXT_PUBLIC_ENABLE_VIDEO_MANAGEMENT_TAB
    value: "true"
  - name: NEXT_PUBLIC_VIDEO_MANAGEMENT_TAB_ADD_RTSP_ENABLE
    value: "false"
  - name: NEXT_PUBLIC_VIDEO_MANAGEMENT_VIDEO_UPLOAD_ENABLE
    value: "true"
  - name: NEXT_PUBLIC_WEB_SOCKET_DEFAULT_ON
    value: "true"
  - name: NEXT_PUBLIC_WORKFLOW
    value: "VSS Agent"
  - name: NEXT_PUBLIC_CHAT_API_CUSTOM_AGENT_PARAMS_JSON
    value: '{"params":[{"name":"llm_reasoning","label":"LLM Reasoning","type":"boolean","default-value":false,"changeable":true,"tooltip-info":""},{"name":"vlm_reasoning","label":"VLM Reasoning","type":"boolean","default-value":false,"changeable":true,"tooltip-info":""}]}'
  - name: NEXT_PUBLIC_ENABLE_MAP_TAB
    value: "false"
  - name: NEXT_PUBLIC_ENABLE_SEARCH_TAB
    value: "false"
  - name: NEXT_PUBLIC_ALERTS_TAB_MEDIA_WITH_OBJECTS_BBOX
    value: "true"
  # Optional: set when tabs are enabled (override from parent or leave empty)
  - name: NEXT_PUBLIC_DASHBOARD_TAB_KIBANA_BASE_URL
    value: ""
  - name: NEXT_PUBLIC_MAP_URL
    value: ""
  - name: NEXT_PUBLIC_MDX_WEB_API_URL
    value: ""
  # Search tab chat sidebar (align with compose 3.1.0)
  - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_SIDEBAR_ENABLE
    value: "false"
  - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_SIDEBAR_OPEN_DEFAULT
    value: "false"
  - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_WORKFLOW
    value: "Vision Agent"
  - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_HISTORY_DEFAULT_ON
    value: "true"
  - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_ENABLE_INTERMEDIATE_STEPS
    value: "true"
  - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_DARK_THEME_DEFAULT
    value: "true"
  - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_SIDE_CHATBAR_COLLAPSED
    value: "true"
  - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_UPLOAD_FILE_ENABLE
    value: "true"
  - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_WEB_SOCKET_DEFAULT_ON
    value: "false"
  - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_API_CUSTOM_AGENT_PARAMS_JSON
    value: '{}'
  - name: NEXT_PUBLIC_SEARCH_TAB_MEDIA_WITH_OBJECTS_BBOX
    value: "true"
  - name: NEXT_PUBLIC_CHAT_UPLOAD_FILE_METADATA_ENABLED
    value: "false"
  - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_MESSAGE_COPY_ENABLED
    value: "false"
  - name: NEXT_PUBLIC_CHAT_MESSAGE_EDIT_ENABLED
    value: "false"
  - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_UPLOAD_FILE_METADATA_ENABLED
    value: "false"
  - name: NEXT_PUBLIC_RIGHT_MENU_OPEN
    value: "false"
  - name: NEXT_PUBLIC_SHOW_THEME_TOGGLE_BUTTON
    value: "false"
  - name: NEXT_PUBLIC_INTERACTION_MODAL_CANCEL_ENABLED
    value: "false"
  - name: NEXT_PUBLIC_DARK_THEME_DEFAULT
    value: "true"
  - name: NEXT_PUBLIC_CHAT_HISTORY_DEFAULT_ON
    value: "true"
  - name: NEXT_PUBLIC_CHAT_INPUT_MIC_ENABLED
    value: "false"
  - name: NEXT_PUBLIC_ENABLE_INTERMEDIATE_STEPS
    value: "true"
  - name: NEXT_PUBLIC_CHAT_MESSAGE_SPEAKER_ENABLED
    value: "false"
  - name: NEXT_PUBLIC_CHAT_UPLOAD_FILE_HIDDEN_MESSAGE_TEMPLATE
    value: "Let's show the videos just uploaded {filenames}?"
  - name: NEXT_PUBLIC_CHAT_UPLOAD_FILE_CONFIG_TEMPLATE_JSON
    value: '{}'
  - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_MESSAGE_SPEAKER_ENABLED
    value: "false"
  - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_MESSAGE_EDIT_ENABLED
    value: "false"
  - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_INPUT_MIC_ENABLED
    value: "false"
  - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_UPLOAD_FILE_HIDDEN_MESSAGE_TEMPLATE
    value: ""
  - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_INTERACTION_MODAL_CANCEL_ENABLED
    value: "false"
  - name: NEXT_PUBLIC_CHAT_UPLOAD_FILE_ENABLE
    value: "true"
  - name: NEXT_PUBLIC_SIDE_CHATBAR_COLLAPSED
    value: "true"
  - name: NEXT_PUBLIC_CHAT_MESSAGE_COPY_ENABLED
    value: "false"
  # NEXT_PUBLIC_AGENT_API_URL_BASE, NEXT_PUBLIC_VST_API_URL, chat URLs set by template from agentApiUrlBase / vstApiUrl / chatCompletionUrl / websocketChatUrl
resources: {}
nodeSelector: {}
tolerations: []
