{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vss-proxy.fullname" . }}-config
  labels:
    app.kubernetes.io/name: vss-proxy
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr info;
    pid /tmp/nginx.pid;
    events { worker_connections 1024; }
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      client_max_body_size 0;
      map $http_upgrade $connection_upgrade { default upgrade; '' close; }
      server {
        listen {{ .Values.service.port }};
        location = /websocket {
          proxy_pass http://{{ .Values.agentService | default (printf "%s-vss-agent:8000" .Release.Name) }};
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_read_timeout 86400s;
          proxy_send_timeout 86400s;
        }
        location /api/v1/ {
          proxy_pass http://{{ .Values.agentService | default (printf "%s-vss-agent:8000" .Release.Name) }};
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_http_version 1.1;
          proxy_read_timeout 300s;
          proxy_buffering off;
          proxy_request_buffering off;
        }
        location /chat/ {
          proxy_pass http://{{ .Values.agentService | default (printf "%s-vss-agent:8000" .Release.Name) }};
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_http_version 1.1;
          proxy_read_timeout 300s;
          proxy_buffering off;
        }
        location /static/ {
          proxy_pass http://{{ .Values.agentService | default (printf "%s-vss-agent:8000" .Release.Name) }};
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_http_version 1.1;
        }
        location = /health {
          proxy_pass http://{{ .Values.agentService | default (printf "%s-vss-agent:8000" .Release.Name) }};
          proxy_http_version 1.1;
        }
        location /vst/ {
          proxy_pass http://{{ .Values.vstService | default (printf "%s-vst-ingress-dev:30888" .Release.Name) }};
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;
          proxy_buffering off;
          proxy_request_buffering off;
        }
        location / {
          proxy_pass http://{{ .Values.uiService | default (printf "%s-vss-ui:3000" .Release.Name) }};
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
        }
      }
    }
{{- end }}
