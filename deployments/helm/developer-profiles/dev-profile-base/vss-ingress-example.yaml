apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
  name: <RELEASE_NAME>-vss-ingress
  namespace: <NAMESPACE>
spec:
  ingressClassName: haproxy
  rules:
  - host: vss.<EXTERNAL_HOST>.nip.io # e.g. vss.10.57.209.221.nip.io, Value of global.externalHost in values-base.yaml
    http:
      paths:
      - backend:
          service:
            name: <RELEASE_NAME>-vss-ui
            port:
              number: 3000
        path: /api/chat
        pathType: Prefix
      - backend:
          service:
            name: <RELEASE_NAME>-vss-agent
            port:
              number: 8000
        path: /api
        pathType: Prefix
      - backend:
          service:
            name: <RELEASE_NAME>-vss-agent
            port:
              number: 8000
        path: /chat
        pathType: Prefix
      - backend:
          service:
            name: <RELEASE_NAME>-vss-agent
            port:
              number: 8000
        path: /websocket
        pathType: Prefix
      - backend:
          service:
            name: <RELEASE_NAME>-vss-agent
            port:
              number: 8000
        path: /static
        pathType: Prefix
      - backend:
          service:
            name:<RELEASE_NAME>-vst-ingress-dev
            port:
              number: 30888
        path: /vst
        pathType: Prefix
      - backend:
          service:
            name: <RELEASE_NAME>-vss-ui
            port:
              number: 3000
        path: /
        pathType: Prefix
      - backend:
          service:
            name: <RELEASE_NAME>-vss-behavior-analytics-alerts
            port:
              number: 8080
        path: /behavior-analytics
        pathType: Prefix
      - backend:
          service:
            name: <RELEASE_NAME>-perception-sdr-alerts
            port:
              number: 4001
        path: /perception-sdr
        pathType: Prefix
      - backend:
          service:
            name: <RELEASE_NAME>-vss-va-mcp
            port:
              number: 9901
        path: /va-mcp
        pathType: Prefix
