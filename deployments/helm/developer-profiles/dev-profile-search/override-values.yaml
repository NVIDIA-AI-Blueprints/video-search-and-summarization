# =============================================================================
# dev-profile-search Override Values - Example
# =============================================================================
# Copy and edit this file to install:
#
#   helm install vss-search helm/dev-profiles/dev-profile-search \
#     -f helm/dev-profiles/dev-profile-search/override-values.yaml \
#     -n metropolis --create-namespace
#
# =============================================================================

global:
  externalHost: "<EXTERNAL_HOST>"   # <- Set your node IP
  ngcApiKey: "nvapi-xxxxx"        # <- Set your NGC API key

# ── Agent config: search blueprint wired to in-cluster services ───────────────
agents:
  vssAgent:
    llm:
      baseUrl: "http://nemotron-nim-nim-llm:8000"
    vlm:
      baseUrl: "http://cosmos-reason2-8b:8000"
    evalLlmJudge:
      baseUrl: "http://nemotron-nim-nim-llm:8000"
    # Cosmos embed endpoint = rtvi-embed service in this release
    # Pattern: http://<release-name>-rtvi-embed:8000
    cosmosEmbed:
      endpoint: "http://vss-search-rtvi-embed:8000"
    elasticsearch:
      url: "http://vss-search-elasticsearch:9200"
    phoenix:
      endpoint: "http://vss-search-phoenix:6006"
    vst:
      baseUrl: "http://vss-search-vst-ingress:8000"
      mcpUrl: "http://vss-search-vst-mcp:8001"
      internalUrl: "http://vss-search-vst-ingress:8000"

# ── Kafka: override advertised host for external broker access (optional) ─────
# kafka:
#   advertisedHost: "192.168.1.100"

# ── rtvi-embed: GPU device assignment ─────────────────────────────────────────
rtvi-embed:
  gpuDeviceId: "1"
  ngcApiKey: "nvapi-xxxxx"

# ── Perception: GPU device assignment ────────────────────────────────────────
perception:
  gpu:
    deviceId: "0"

# ── nvstreamer: GPU device assignment ────────────────────────────────────────
nvstreamer:
  gpu:
    deviceId: "0"
