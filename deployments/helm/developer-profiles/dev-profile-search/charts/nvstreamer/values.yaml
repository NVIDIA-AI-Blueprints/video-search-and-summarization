replicas: 1
image:
  repository: nvcr.io/nvidia/vss-core/vss-vios-nvstreamer
  tag: "3.1.0"
  pullPolicy: IfNotPresent
port: 9100
rtspPort: 31554
installAdditionalPackages: "true"
serverDomainName: ""  # Auto-wires to global.externalHost for external RTSP access
service:
  type: ClusterIP
  port: 9100
  # When service.rtsp is set, RTSP ports get a separate NodePort service.
  # When unset, RTSP ports are included in the main service (legacy behavior).
  rtsp:
    type: NodePort
    nodePort: 31554
gpu:
  enabled: true
  count: 1
  deviceId: "0"
persistence:
  storageClass: ""
  vstData:
    size: 20Gi
resources:
  requests:
    memory: "2Gi"
    cpu: "1"
  limits:
    memory: "4Gi"
    cpu: "2"
imagePullSecrets:
  - name: ngc-docker-reg-secret
nodeSelector: {}
tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"
