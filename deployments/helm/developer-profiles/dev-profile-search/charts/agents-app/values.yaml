global:
  # External host/IP for browser-accessible URLs (NodePort or Ingress)
  # This should be the node IP or ingress domain for external access
  externalHost: ""  # Required: Set to node IP or domain (e.g., "192.168.1.100" or "k8s.example.com")

  # DEPRECATED: Use externalHost instead. Kept for backward compatibility.
  hostIP: "localhost"

  # Ingress awareness: when enabled, external URL helpers construct
  # Ingress-style URLs (port 80, hostname routing) instead of NodePort URLs.
  ingress:
    enabled: false
    mainHost: ""       # Auto-constructed as vss-search.<externalHost>.nip.io if empty
    streamerHost: ""   # Auto-constructed as streamer.<externalHost>.nip.io if empty

  # Default image pull policy for all workloads
  imagePullPolicy: IfNotPresent

# Blueprint selection - determines which config files and settings to use
# Options: smartcities, warehouse, public-safety
blueprint: smartcities

# Blueprint-specific configurations
# Edit the config for your selected blueprint directly - no separate overrides needed
# Templates will use: index .Values.blueprintConfigs .Values.blueprint
blueprintConfigs:
  smartcities:
    ui:
      appTitle: "SMART CITIES BLUEPRINT"
      workflow: "Smart Cities Agent"
      map:
        enabled: true
    vaMcp:
      vlmVerified: false
      embeddingModelName: "sentence-transformers/all-MiniLM-L6-v2"
      llmModelName: "meta/llama-3.1-70b-instruct"
      llmTemperature: 0.0
      llmMaxTokens: 1024
      videoAnalyticsIncludes:
        - get_incident
        - get_incidents
        - get_sensor_ids
        - get_places
        - get_fov_histogram
        - get_average_speeds
        - analyze
  warehouse:
    ui:
      appTitle: "WAREHOUSE BLUEPRINT"
      workflow: "Warehouse Agent"
      map:
        enabled: false
    vaMcp:
      vlmVerified: false
      embeddingModelName: "sentence-transformers/all-MiniLM-L6-v2"
      llmModelName: "meta/llama-3.1-70b-instruct"
      llmTemperature: 0.0
      llmMaxTokens: 1024
      videoAnalyticsIncludes:
        - get_incident
        - get_incidents
        - get_sensor_ids
        - get_places
        - get_fov_histogram
        - get_average_speeds
        - analyze
  public-safety:
    ui:
      appTitle: "PUBLIC SAFETY BLUEPRINT"
      workflow: "Public Safety Agent"
      map:
        enabled: false
    vaMcp:
      vlmVerified: true
      embeddingModelName: "sentence-transformers/all-MiniLM-L6-v2"
      llmModelName: "meta/llama-3.1-70b-instruct"
      llmTemperature: 0.0
      llmMaxTokens: 1024
      videoAnalyticsIncludes:
        - get_incident
        - get_incidents
        - get_sensor_ids
        - get_places
        - get_fov_histogram
        - get_average_speeds
        - analyze
  base:
    ui:
      appTitle: "VSS BLUEPRINT"
      appSubtitle: "Vision (Base)"
      workflow: "Developer Agent"
      map:
        enabled: false
    vaMcp:
      vlmVerified: false
      embeddingModelName: ""
      llmModelName: ""
      llmTemperature: 0.0
      llmMaxTokens: 1024
      videoAnalyticsIncludes: []
  search:
    ui:
      appTitle: "VSS BLUEPRINT"
      appSubtitle: "Vision (Search)"
      workflow: "Developer Agent"
      map:
        enabled: false
    vaMcp:
      vlmVerified: false
      embeddingModelName: "sentence-transformers/all-MiniLM-L6-v2"
      llmModelName: "nvidia/nvidia-nemotron-nano-9b-v2"
      llmTemperature: 0.0
      llmMaxTokens: 1024
      videoAnalyticsIncludes: []

# VSS VA MCP (Video Analysis MCP Server)
# Note: Blueprint-specific config (vlmVerified, embeddingModelName, etc.) is in blueprintConfigs above
vssVaMcp:
  enabled: true
  replicas: 1
  image:
    repository: nvcr.io/nvidia/vss-core/vss-agent
    tag: "3.1.0"  # VSS_AGENT_VERSION from env
    pullPolicy: ""  # Empty to use global.imagePullPolicy
  port: 8002
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  healthcheck:
    enabled: true
    # Startup probe settings - runs first during long initialization
    # Allows up to 10+ minutes for embedding model loading + batch processing
    startupInitialDelaySeconds: 30     # Wait before first startup probe
    startupPeriodSeconds: 10           # Check every 10 seconds during startup
    startupFailureThreshold: 60        # Allow 60 failures = ~10 minutes total startup time
    # Liveness/Readiness probe settings - run after startup probe passes
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 5
  # Pod Security Context
  podSecurityContext: {}
  # Container Security Context
  securityContext: {}
  # Extra environment variables
  extraEnvs: []
  # Node selector specific to this workload
  nodeSelector: {}
  # Affinity specific to this workload
  affinity: {}
  # Tolerations specific to this workload
  tolerations: []

# VSS Agent (Main Vision Safety System Agent)
vssAgent:
  enabled: true
  replicas: 1
  image:
    repository: nvcr.io/nvidia/vss-core/vss-agent
    tag: "3.1.0"  # VSS_AGENT_VERSION from env
    pullPolicy: ""  # Empty to use global.imagePullPolicy
  version: "3.1.0"  # VSS_AGENT_VERSION from env
  port: 8000
  # Service configuration - use NodePort to expose for browser access
  service:
    type: NodePort  # ClusterIP or NodePort (NodePort required for UI access)
    nodePort: 30800  # NodePort for external browser access
  # Resources: Agent loads embedding models and runs Dask workers requiring more memory
  resources:
    requests:
      memory: "4Gi"
      cpu: "1"
    limits:
      memory: "8Gi"
      cpu: "2"

  # LLM Configuration
  llm:
    name: "nvidia/nvidia-nemotron-nano-9b-v2"  # LLM model name (from docker-compose LLM_NAME)
    baseUrl: ""   # LLM model base URL (REQUIRED - e.g., "http://nemotron-nim:8000")

  # VLM (Vision Language Model) Configuration
  vlm:
    name: "nvidia/cosmos-reason2-8b"  # VLM model name (from docker-compose VLM_NAME)
    baseUrl: ""   # VLM model base URL (REQUIRED - e.g., "http://cosmos-nim:8001")

  # Evaluation LLM Judge Configuration
  evalLlmJudge:
    name: "nvidia/nvidia-nemotron-nano-9b-v2"  # Evaluation LLM judge model name
    baseUrl: ""   # Evaluation LLM judge base URL (optional, uses llm.baseUrl if not set)

  # LVS (Live Video Search) Configuration
  lvs:
    backendUrl: ""  # LVS backend URL

  # RTVI (Real-Time Video Intelligence) Configuration
  rtvi:
    embedPort: ""  # RTVI embed port
    vlmBaseUrl: ""  # RTVI VLM base URL

  # Phoenix Telemetry
  phoenix:
    endpoint: ""  # Optional Phoenix telemetry endpoint

  # VST Integration
  vst:
    baseUrl: ""       # VST base URL (REQUIRED - e.g., "http://vst-ingress/vst/api" for ingress access)
    mcpUrl: ""        # VST MCP service URL (REQUIRED for smartcities - e.g., "http://vst-mcp-smc:8001")
    internalUrl: ""   # VST internal URL for cluster-internal API calls (defaults to baseUrl)
    externalUrl: ""   # VST external URL for browser-accessible links (defaults to http://<externalHost>:30888)

  # Object Store Configuration
  objectStore:
    type: "local_object_store"  # local_object_store, s3, etc.

  # Template Configuration
  template:
    name: "incident_report_template.md"

  # Evaluation Configuration (optional, for agent evaluation)
  eval:
    workflowAlias: ""      # Workflow alias for evaluation
    outputDir: ""          # Output directory (EVAL_OUTPUT_DIR)
    datasetPath: "/eval/dataset.json"  # Path to evaluation dataset
    dir: ""                # Eval directory (EVAL_DIR)
    datasetDir: ""         # Dataset directory (DATASET_DIR)
    datasetFileName: ""    # Dataset file name (DATASET_FILE_NAME)

  # agent-eval persistent volume (for /vss-agent/agent_eval)
  agentEval:
    enabled: false
    storageClass: ""
    size: 10Gi

  # Cosmos Embedding Configuration (for search/embedding features)
  cosmosEmbed:
    endpoint: ""  # Cosmos embed endpoint URL

  # API Keys
  apiKeys:
    nvidia: ""  # NVIDIA API Key for remote NIM access
    huggingface: ""  # HuggingFace token for authenticated downloads (higher rate limits)

  # Pod Security Context
  podSecurityContext: {}
  # Container Security Context
  securityContext: {}
  # Extra environment variables
  extraEnvs: []
  # Node selector specific to this workload
  nodeSelector: {}
  # Affinity specific to this workload
  affinity: {}
  # Tolerations specific to this workload
  tolerations: []

# VSS UI (User Interface)
vssUi:
  enabled: true
  replicas: 1
  image:
    repository: nvcr.io/nvidia/vss-core/vss-agent-ui
    tag: "3.1.0"
    pullPolicy: ""  # Empty to use global.imagePullPolicy
  port: 3000
  service:
    type: NodePort
    nodePort: 32300
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  # Chat Tab Configuration
  # Note: appTitle and workflow are set per blueprint in blueprintConfigs above
  chat:
    enabled: false
    websocketDefaultOn: false
    rightMenuOpen: false
    enableIntermediateSteps: true
    darkThemeDefault: true
    sideChatbarCollapsed: true
    chatHistoryDefaultOn: true
    micEnabled: false
    showThemeToggleButton: false
    messageCopyEnabled: false
    messageEditEnabled: false
    messageSpeakerEnabled: false
    interactionModalCancelEnabled: false
    # Upload file feature
    uploadFileEnable: false
    uploadFileConfigTemplateJson: '{"fields":[{"field-name":"embedding","field-type":"boolean","field-default-value":true,"changeable":false,"tooltip-info":""}]}'
    uploadFileHiddenMessageTemplate: "Let's show the videos just uploaded {filenames}?"
    uploadFileMetadataEnabled: false
    # Custom agent parameters JSON (optional)
    customAgentParamsJson: ""
    # Chat API Custom agent parameters JSON
    chatApiCustomAgentParamsJson: '{"params":[{"name":"llm_reasoning","label":"LLM Reasoning","type":"boolean","default-value":false,"changeable":true,"tooltip-info":""},{"name":"vlm_reasoning","label":"VLM Reasoning","type":"boolean","default-value":false,"changeable":true,"tooltip-info":""}]}'

  # Alerts Tab Configuration
  alerts:
    enabled: false
    maxResultSize: 100
    defaultTimeWindowMinutes: 10
    defaultAutoRefreshMs: 1000
    verifiedFlagDefault: false
    alertReportPromptTemplate: "Generate a report for incident {incidentId} with sensor id {sensorId}."
    maxSearchTimeLimit: "0"
    mediaWithObjectsBbox: true

  # Dashboard Tab Configuration
  dashboard:
    enabled: true
    kibanaPort: 5601

  # Map Tab Configuration
  # Note: enabled is set per blueprint in blueprintConfigs above
  map:
    port: 3002

  # Video Management Tab Configuration
  videoManagement:
    enabled: true
    addRtspEnable: true
    videoUploadEnable: true

  # Search Tab Configuration
  search:
    enabled: true
    workflow: "Vision Agent"
    websocketDefaultOn: false
    enableIntermediateSteps: true
    darkThemeDefault: true
    sideChatbarCollapsed: true
    chatHistoryDefaultOn: true
    uploadFileEnable: false
    uploadFileHiddenMessageTemplate: ""
    uploadFileMetadataEnabled: false
    micEnabled: false
    messageCopyEnabled: false
    messageEditEnabled: false
    messageSpeakerEnabled: false
    interactionModalCancelEnabled: false
    sidebarEnable: true
    sidebarOpenDefault: true
    mediaWithObjectsBbox: false
    chatApiCustomAgentParamsJson: '{"params":[{"name":"search_source_type","label":"Search media source type","type":"select","default-value":"video_file","options":["video_file","rtsp"],"changeable":true,"tooltip-info":"Media Source type for Search Agent Query"}]}'

  # External Service Ports (NodePort values for browser access)
  externalPorts:
    vst: 30888         # NodePort for VST ingress
    mdx: 30080         # NodePort for MDX web API (via ingress)
    kibana: 31560      # NodePort for Kibana
    vssAgent: 30800    # NodePort for VSS Agent (if exposed via NodePort)

  # API Path Prefixes (for ingress routing)
  # In k8s, APIs are often behind ingress with path-based routing
  apiPathPrefixes:
    mdx: "/api/v3.0/analytics"  # MDX Web API ingress path prefix (rewrites to / on backend)

  # External URLs Configuration (for browser-accessible services)
  # These override the auto-generated URLs using global.externalHost
  # Set these if using Ingress or custom external access
  externalUrls:
    # VSS Agent URLs for chat functionality
    vssAgentWebsocket: ""  # e.g., "ws://agent.example.com/websocket" or leave empty to auto-generate
    vssAgentHttp: ""       # e.g., "http://agent.example.com/chat/stream" or leave empty to auto-generate
    vssAgentApi: ""        # e.g., "http://agent.example.com/api/v1" or leave empty to auto-generate
    # VST API URL
    vstApi: ""             # e.g., "http://vst.example.com/vst/api" or leave empty to auto-generate
    # MDX Web API URL
    mdxWebApi: ""          # e.g., "http://mdx.example.com" or leave empty to auto-generate
    # Kibana Dashboard URL
    kibana: ""             # e.g., "http://kibana.example.com/app/dashboards" or leave empty to auto-generate
    # Map URL
    map: ""                # e.g., "http://map.example.com" or leave empty to auto-generate

  # Pod Security Context
  podSecurityContext: {}
  # Container Security Context
  securityContext: {}
  # Extra environment variables
  extraEnvs: []
  # Node selector specific to this workload
  nodeSelector: {}
  # Affinity specific to this workload
  affinity: {}
  # Tolerations specific to this workload
  tolerations: []

# Elasticsearch Configuration (for video analytics queries)
elasticsearch:
  url: ""  # Elasticsearch URL (REQUIRED - e.g., "http://elasticsearch:9200")
  index: ""  # Elasticsearch index name (optional, for search functionality)

# Service Accounts and RBAC
serviceAccount:
  create: true
  name: "agents-sa"
  annotations: {}

# Image Pull Secrets
imagePullSecrets:
  - name: ngc-docker-reg-secret

# Global Node Selectors (overridden by workload-specific)
nodeSelector: {}

# Global Tolerations (overridden by workload-specific)
tolerations: []

# Global Affinity (overridden by workload-specific)
affinity: {}

# Global Pod Security Context (overridden by workload-specific)
podSecurityContext: {}

# Global Security Context (overridden by workload-specific)
securityContext: {}

