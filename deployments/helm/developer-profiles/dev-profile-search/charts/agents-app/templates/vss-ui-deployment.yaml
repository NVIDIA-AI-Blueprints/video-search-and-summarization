{{ if .Values.vssUi.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agents.fullname" . }}-vss-ui
  labels:
    {{- include "agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: vss-ui
spec:
  type: {{ .Values.vssUi.service.type | default "NodePort" }}
  ports:
    - name: http
      port: {{ .Values.vssUi.port }}
      targetPort: {{ .Values.vssUi.port }}
      {{- if eq (default "NodePort" .Values.vssUi.service.type) "NodePort" }}
      nodePort: {{ .Values.vssUi.service.nodePort | default 33000 }}
      {{- end }}
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "agents.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: vss-ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agents.fullname" . }}-vss-ui
  labels:
    {{- include "agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: vss-ui
spec:
  replicas: {{ .Values.vssUi.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agents.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: vss-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "agents.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: vss-ui
    spec:
      serviceAccountName: {{ include "agents.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vssUi.podSecurityContext | default .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vss-ui
          image: "{{ .Values.vssUi.image.repository }}:{{ .Values.vssUi.image.tag }}"
          imagePullPolicy: {{ .Values.vssUi.image.pullPolicy | default .Values.global.imagePullPolicy }}
          {{- with .Values.vssUi.securityContext | default .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.vssUi.port }}
              protocol: TCP
          env:
            # Application Name
            - name: RUN_APP_NAME
              value: "nv-metropolis-bp-vss-ui"
            - name: NEXT_PUBLIC_APP_TITLE
              value: {{ include "agents.bpValue" (dict "root" . "keys" (list "ui" "appTitle")) | quote }}
            - name: NEXT_PUBLIC_APP_SUBTITLE
              value: {{ include "agents.bpValue" (dict "root" . "keys" (list "ui" "appSubtitle")) | quote }}
            # Chat Tab Configuration
            - name: NEXT_PUBLIC_ENABLE_CHAT_TAB
              value: {{ .Values.vssUi.chat.enabled | quote }}
            - name: NEXT_PUBLIC_WORKFLOW
              value: {{ include "agents.bpValue" (dict "root" . "keys" (list "ui" "workflow")) | quote }}
            - name: NEXT_PUBLIC_WEBSOCKET_CHAT_COMPLETION_URL
              value: {{ include "agents.external.vssAgentWebsocketUrl" . | quote }}
            - name: NEXT_PUBLIC_HTTP_CHAT_COMPLETION_URL
              value: {{ include "agents.external.vssAgentHttpUrl" . | quote }}
            - name: NEXT_PUBLIC_WEB_SOCKET_DEFAULT_ON
              value: {{ .Values.vssUi.chat.websocketDefaultOn | quote }}
            - name: NEXT_PUBLIC_RIGHT_MENU_OPEN
              value: {{ .Values.vssUi.chat.rightMenuOpen | quote }}
            - name: NEXT_PUBLIC_ENABLE_INTERMEDIATE_STEPS
              value: {{ .Values.vssUi.chat.enableIntermediateSteps | quote }}
            - name: NEXT_PUBLIC_DARK_THEME_DEFAULT
              value: {{ .Values.vssUi.chat.darkThemeDefault | quote }}
            - name: NEXT_PUBLIC_SIDE_CHATBAR_COLLAPSED
              value: {{ .Values.vssUi.chat.sideChatbarCollapsed | quote }}
            - name: NEXT_PUBLIC_CHAT_HISTORY_DEFAULT_ON
              value: {{ .Values.vssUi.chat.chatHistoryDefaultOn | quote }}
            - name: NEXT_PUBLIC_CHAT_INPUT_MIC_ENABLED
              value: {{ .Values.vssUi.chat.micEnabled | quote }}
            - name: NEXT_PUBLIC_SHOW_THEME_TOGGLE_BUTTON
              value: {{ .Values.vssUi.chat.showThemeToggleButton | quote }}
            - name: NEXT_PUBLIC_AGENT_API_URL_BASE
              value: {{ include "agents.external.vssAgentApiUrl" . | quote }}
            - name: NEXT_PUBLIC_CHAT_UPLOAD_FILE_ENABLE
              value: {{ .Values.vssUi.chat.uploadFileEnable | quote }}
            - name: NEXT_PUBLIC_CHAT_MESSAGE_COPY_ENABLED
              value: {{ .Values.vssUi.chat.messageCopyEnabled | quote }}
            - name: NEXT_PUBLIC_CHAT_MESSAGE_EDIT_ENABLED
              value: {{ .Values.vssUi.chat.messageEditEnabled | quote }}
            - name: NEXT_PUBLIC_CHAT_MESSAGE_SPEAKER_ENABLED
              value: {{ .Values.vssUi.chat.messageSpeakerEnabled | quote }}
            - name: NEXT_PUBLIC_INTERACTION_MODAL_CANCEL_ENABLED
              value: {{ .Values.vssUi.chat.interactionModalCancelEnabled | quote }}
            {{- if .Values.vssUi.chat.uploadFileConfigTemplateJson }}
            - name: NEXT_PUBLIC_CHAT_UPLOAD_FILE_CONFIG_TEMPLATE_JSON
              value: {{ .Values.vssUi.chat.uploadFileConfigTemplateJson | quote }}
            {{- end }}
            - name: NEXT_PUBLIC_CHAT_UPLOAD_FILE_HIDDEN_MESSAGE_TEMPLATE
              value: {{ .Values.vssUi.chat.uploadFileHiddenMessageTemplate | quote }}
            - name: NEXT_PUBLIC_CHAT_UPLOAD_FILE_METADATA_ENABLED
              value: {{ .Values.vssUi.chat.uploadFileMetadataEnabled | quote }}
            {{- if .Values.vssUi.chat.customAgentParamsJson }}
            - name: NEXT_PUBLIC_CUSTOM_AGENT_PARAMS_JSON
              value: {{ .Values.vssUi.chat.customAgentParamsJson | quote }}
            {{- end }}
            {{- if .Values.vssUi.chat.chatApiCustomAgentParamsJson }}
            - name: NEXT_PUBLIC_CHAT_API_CUSTOM_AGENT_PARAMS_JSON
              value: {{ .Values.vssUi.chat.chatApiCustomAgentParamsJson | quote }}
            {{- end }}

            # Alerts Tab Configuration
            - name: NEXT_PUBLIC_ENABLE_ALERTS_TAB
              value: {{ .Values.vssUi.alerts.enabled | quote }}
            - name: NEXT_PUBLIC_VST_API_URL
              value: {{ include "agents.external.vstApiUrl" . | quote }}
            - name: NEXT_PUBLIC_MDX_WEB_API_URL
              value: {{ include "agents.external.mdxWebApiUrl" . | quote }}
            - name: NEXT_PUBLIC_ALERTS_TAB_MAX_RESULT_SIZE
              value: {{ .Values.vssUi.alerts.maxResultSize | quote }}
            - name: NEXT_PUBLIC_ALERTS_TAB_DEFAULT_TIME_WINDOW_IN_MINUTES
              value: {{ .Values.vssUi.alerts.defaultTimeWindowMinutes | quote }}
            - name: NEXT_PUBLIC_ALERTS_TAB_DEFAULT_AUTO_REFRESH_IN_MILLISECONDS
              value: {{ .Values.vssUi.alerts.defaultAutoRefreshMs | quote }}
            - name: NEXT_PUBLIC_ALERTS_TAB_VERIFIED_FLAG_DEFAULT
              value: {{ .Values.vssUi.alerts.verifiedFlagDefault | quote }}
            - name: NEXT_PUBLIC_ALERTS_TAB_ALERT_REPORT_PROMPT_TEMPLATE
              value: {{ .Values.vssUi.alerts.alertReportPromptTemplate | quote }}
            - name: NEXT_PUBLIC_ALERTS_TAB_MAX_SEARCH_TIME_LIMIT
              value: {{ .Values.vssUi.alerts.maxSearchTimeLimit | quote }}
            - name: NEXT_PUBLIC_ALERTS_TAB_MEDIA_WITH_OBJECTS_BBOX
              value: {{ .Values.vssUi.alerts.mediaWithObjectsBbox | quote }}

            # Dashboard Tab Configuration
            - name: NEXT_PUBLIC_ENABLE_DASHBOARD_TAB
              value: {{ .Values.vssUi.dashboard.enabled | quote }}
            - name: NEXT_PUBLIC_DASHBOARD_TAB_KIBANA_BASE_URL
              value: {{ include "agents.external.kibanaUrl" . | quote }}

            # Map Tab Configuration
            - name: NEXT_PUBLIC_ENABLE_MAP_TAB
              value: {{ include "agents.bpBool" (dict "root" . "keys" (list "ui" "map" "enabled")) | quote }}
            - name: NEXT_PUBLIC_MAP_URL
              value: {{ include "agents.external.mapUrl" . | quote }}

            # Video Management Tab Configuration
            - name: NEXT_PUBLIC_ENABLE_VIDEO_MANAGEMENT_TAB
              value: {{ .Values.vssUi.videoManagement.enabled | quote }}
            - name: NEXT_PUBLIC_VIDEO_MANAGEMENT_TAB_ADD_RTSP_ENABLE
              value: {{ .Values.vssUi.videoManagement.addRtspEnable | quote }}
            - name: NEXT_PUBLIC_VIDEO_MANAGEMENT_VIDEO_UPLOAD_ENABLE
              value: {{ .Values.vssUi.videoManagement.videoUploadEnable | quote }}

            # Search Tab Configuration
            - name: NEXT_PUBLIC_ENABLE_SEARCH_TAB
              value: {{ .Values.vssUi.search.enabled | quote }}
            - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_WORKFLOW
              value: {{ .Values.vssUi.search.workflow | quote }}
            - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_HTTP_CHAT_COMPLETION_URL
              value: {{ include "agents.external.vssAgentHttpUrl" . | quote }}
            - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_WEBSOCKET_CHAT_COMPLETION_URL
              value: {{ include "agents.external.vssAgentWebsocketUrl" . | quote }}
            - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_WEB_SOCKET_DEFAULT_ON
              value: {{ .Values.vssUi.search.websocketDefaultOn | quote }}
            - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_ENABLE_INTERMEDIATE_STEPS
              value: {{ .Values.vssUi.search.enableIntermediateSteps | quote }}
            - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_DARK_THEME_DEFAULT
              value: {{ .Values.vssUi.search.darkThemeDefault | quote }}
            - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_SIDE_CHATBAR_COLLAPSED
              value: {{ .Values.vssUi.search.sideChatbarCollapsed | quote }}
            - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_HISTORY_DEFAULT_ON
              value: {{ .Values.vssUi.search.chatHistoryDefaultOn | quote }}
            - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_UPLOAD_FILE_ENABLE
              value: {{ .Values.vssUi.search.uploadFileEnable | quote }}
            - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_UPLOAD_FILE_HIDDEN_MESSAGE_TEMPLATE
              value: {{ .Values.vssUi.search.uploadFileHiddenMessageTemplate | quote }}
            - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_UPLOAD_FILE_METADATA_ENABLED
              value: {{ .Values.vssUi.search.uploadFileMetadataEnabled | quote }}
            - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_SIDEBAR_ENABLE
              value: {{ .Values.vssUi.search.sidebarEnable | quote }}
            - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_SIDEBAR_OPEN_DEFAULT
              value: {{ .Values.vssUi.search.sidebarOpenDefault | quote }}
            - name: NEXT_PUBLIC_SEARCH_TAB_MEDIA_WITH_OBJECTS_BBOX
              value: {{ .Values.vssUi.search.mediaWithObjectsBbox | quote }}
            - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_INPUT_MIC_ENABLED
              value: {{ .Values.vssUi.search.micEnabled | quote }}
            - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_MESSAGE_COPY_ENABLED
              value: {{ .Values.vssUi.search.messageCopyEnabled | quote }}
            - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_MESSAGE_EDIT_ENABLED
              value: {{ .Values.vssUi.search.messageEditEnabled | quote }}
            - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_MESSAGE_SPEAKER_ENABLED
              value: {{ .Values.vssUi.search.messageSpeakerEnabled | quote }}
            - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_INTERACTION_MODAL_CANCEL_ENABLED
              value: {{ .Values.vssUi.search.interactionModalCancelEnabled | quote }}
            {{- if .Values.vssUi.search.chatApiCustomAgentParamsJson }}
            - name: NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_API_CUSTOM_AGENT_PARAMS_JSON
              value: {{ .Values.vssUi.search.chatApiCustomAgentParamsJson | quote }}
            {{- end }}
            {{- with .Values.vssUi.extraEnvs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.vssUi.resources | nindent 12 }}
      {{- with .Values.vssUi.nodeSelector | default .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vssUi.affinity | default .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vssUi.tolerations | default .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

