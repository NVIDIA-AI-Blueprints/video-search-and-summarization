{{ if .Values.vssAgent.enabled }}
{{- $blueprint := .Values.blueprint }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agents.fullname" . }}-vss-agent-config
  labels:
    {{- include "agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: vss-agent
data:
  config.yml: |
{{- tpl (.Files.Get (printf "configs/%s/config.yml" $blueprint)) . | nindent 4 }}

  {{- if .Values.vssAgent.template.name }}
  {{ .Values.vssAgent.template.name }}: |
{{ .Files.Get (printf "configs/%s/%s" $blueprint .Values.vssAgent.template.name) | indent 4 }}
  {{- end }}
{{- end }}

