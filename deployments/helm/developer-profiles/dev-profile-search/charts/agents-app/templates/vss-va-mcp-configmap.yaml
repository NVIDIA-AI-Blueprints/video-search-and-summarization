{{ if .Values.vssVaMcp.enabled }}
{{- $blueprint := .Values.blueprint }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agents.fullname" . }}-vss-va-mcp-config
  labels:
    {{- include "agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: vss-va-mcp
data:
  va_mcp_server_config.yml: |
{{- tpl (.Files.Get (printf "configs/%s/va_mcp_server_config.yml" $blueprint)) . | nindent 4 }}
{{- end }}

