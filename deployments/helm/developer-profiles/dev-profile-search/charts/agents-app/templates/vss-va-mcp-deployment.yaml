{{ if .Values.vssVaMcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agents.fullname" . }}-vss-va-mcp
  labels:
    {{- include "agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: vss-va-mcp
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.vssVaMcp.port }}
      targetPort: {{ .Values.vssVaMcp.port }}
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "agents.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: vss-va-mcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agents.fullname" . }}-vss-va-mcp
  labels:
    {{- include "agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: vss-va-mcp
spec:
  replicas: {{ .Values.vssVaMcp.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agents.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: vss-va-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "agents.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: vss-va-mcp
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/vss-va-mcp-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "agents.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vssVaMcp.podSecurityContext | default .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vss-va-mcp
          image: "{{ .Values.vssVaMcp.image.repository }}:{{ .Values.vssVaMcp.image.tag }}"
          imagePullPolicy: {{ .Values.vssVaMcp.image.pullPolicy | default .Values.global.imagePullPolicy }}
          {{- with .Values.vssVaMcp.securityContext | default .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - mcp
            - serve
            - --config_file
            - "/config/va_mcp_server_config.yml"
            - --host
            - "0.0.0.0"
            - --port
            - "{{ .Values.vssVaMcp.port }}"
          ports:
            - name: http
              containerPort: {{ .Values.vssVaMcp.port }}
              protocol: TCP
          env:
            - name: VST_MCP_URL
              value: {{ include "agents.vstMcpUrl" . | quote }}
            - name: VSS_AGENT_HOST
              value: "0.0.0.0"
            - name: VSS_VA_MCP_PORT
              value: {{ .Values.vssVaMcp.port | quote }}
            # HuggingFace token for authenticated downloads (higher rate limits)
            {{- if .Values.vssAgent.apiKeys.huggingface }}
            - name: HF_TOKEN
              value: {{ .Values.vssAgent.apiKeys.huggingface | quote }}
            {{- end }}
            {{- with .Values.vssVaMcp.extraEnvs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.vssVaMcp.healthcheck.enabled }}
          # Startup probe: runs first, allows long initialization (embedding model + batch processing)
          # Once startup probe passes, liveness/readiness probes take over
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.vssVaMcp.port }}
            initialDelaySeconds: {{ .Values.vssVaMcp.healthcheck.startupInitialDelaySeconds | default 30 }}
            periodSeconds: {{ .Values.vssVaMcp.healthcheck.startupPeriodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.vssVaMcp.healthcheck.timeoutSeconds }}
            failureThreshold: {{ .Values.vssVaMcp.healthcheck.startupFailureThreshold | default 60 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.vssVaMcp.port }}
            periodSeconds: {{ .Values.vssVaMcp.healthcheck.periodSeconds }}
            timeoutSeconds: {{ .Values.vssVaMcp.healthcheck.timeoutSeconds }}
            failureThreshold: {{ .Values.vssVaMcp.healthcheck.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.vssVaMcp.port }}
            periodSeconds: {{ .Values.vssVaMcp.healthcheck.periodSeconds }}
            timeoutSeconds: {{ .Values.vssVaMcp.healthcheck.timeoutSeconds }}
            failureThreshold: {{ .Values.vssVaMcp.healthcheck.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.vssVaMcp.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "agents.fullname" . }}-vss-va-mcp-config
      {{- with .Values.vssVaMcp.nodeSelector | default .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vssVaMcp.affinity | default .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vssVaMcp.tolerations | default .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

