functions:
  vst_sensor_list:
    _type: mcp_tool_wrapper
    url: {{ include "agents.vstMcpUrl" . }}/mcp
    mcp_tool_name: sensor_list

function_groups:
  video_analytics:
    _type: video_analytics
    es_url: {{ include "agents.elasticsearchUrl" . | quote }}
    index_prefix: "mdx-"
    vlm_verified: {{ include "agents.bpValue" (dict "root" . "keys" (list "vaMcp" "vlmVerified")) }}
    vst_sensor_list_tool: vst_sensor_list
    embedding_model_name: {{ include "agents.bpValue" (dict "root" . "keys" (list "vaMcp" "embeddingModelName")) | quote }}
    include:
{{ include "agents.bpList" (dict "root" . "keys" (list "vaMcp" "videoAnalyticsIncludes")) | indent 6 }}

llms:
  nim_llm:
    _type: nim
    model_name: {{ include "agents.bpValue" (dict "root" . "keys" (list "vaMcp" "llmModelName")) }}
    temperature: {{ include "agents.bpValue" (dict "root" . "keys" (list "vaMcp" "llmTemperature")) }}
    max_tokens: {{ include "agents.bpValue" (dict "root" . "keys" (list "vaMcp" "llmMaxTokens")) }}

# dummy workflow required to start MCP server
workflow:
  _type: react_agent
  tool_names: [video_analytics]
  llm_name: nim_llm
  verbose: true
  parse_agent_response_max_retries: 3

