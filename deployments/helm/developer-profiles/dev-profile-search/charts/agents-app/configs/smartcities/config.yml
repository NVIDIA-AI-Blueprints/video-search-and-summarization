general:
  use_uvloop: true
  front_end:
    _type: fastapi
    runner_class: vss_agents.api.custom_fastapi_worker.CustomFastApiFrontEndWorker
    object_store: {{ .Values.vssAgent.objectStore.type }}
    cors:
      allow_origins: ['*']
  telemetry:
    tracing:
      phoenix:
        _type: phoenix
        endpoint: {{ .Values.vssAgent.phoenix.endpoint | default "http://localhost:6006" }}/v1/traces
        project: SC-vss-agent-{{ .Values.vssAgent.version }}

object_stores:
  local_object_store:
    _type: in_memory

function_groups:
{{- if .Values.vssVaMcp.enabled }}
  video_analytics_mcp:
    _type: mcp_client
    server:
      transport: streamable-http
      url: {{ include "agents.vaMcpUrl" . }}/mcp
    include:
    - video_analytics.get_incidents
    - video_analytics.get_incident
    - video_analytics.get_fov_histogram
    - video_analytics.get_sensor_ids
    - video_analytics.get_places
{{- end }}

  vst_mcp:
    _type: mcp_client
    server:
      transport: streamable-http
      url: {{ include "agents.vstMcpUrl" . }}/mcp
    include:
      - sensor_list
      - get_video_storage_url
      - get_replay_picture_url
      - get_live_picture_url

functions:
  video_understanding:
    _type: video_understanding
    vlm_name: nim_vlm
    max_frames: 30
    num_frames: 16
    min_pixels: 3136
    max_pixels: 12845056
    reasoning: false
    video_url_tool: vst_video_url

  vst_video_url:
    _type: vst_video_url
    get_video_storage_url_tool: vst_mcp.get_video_storage_url
    get_sensor_list_tool: vst_mcp.sensor_list
    vst_base_url: {{ include "agents.vstBaseUrl" . }}
    overlay_config: true

  vst_picture_url:
    _type: vst_picture_url
    get_sensor_list_tool: vst_mcp.sensor_list
    get_replay_picture_url_tool: vst_mcp.get_replay_picture_url
    get_live_picture_url_tool: vst_mcp.get_live_picture_url
    vst_base_url: {{ include "agents.vstBaseUrl" . }}
    max_retries: 5
    retry_delay_seconds: 2

  chart_generator:
    _type: chart_generator
    object_store_name: {{ .Values.vssAgent.objectStore.type }}
    object_store_base_url: {{ include "agents.reportsBaseUrl" . }}

{{- if .Values.vssVaMcp.enabled }}
  multi_incident_formatter:
    _type: multi_incident_formatter
    video_url_tool: vst_video_url
    picture_url_tool: vst_picture_url
    incidents_tool: video_analytics_mcp.video_analytics.get_incidents
    chart_generator_tool: chart_generator
    generate_chart: true
    chart_base_url: {{ include "agents.reportsBaseUrl" . }}
    display_limit: 20
{{- end }}

  geolocation:
    _type: geolocation
    timeout: 10

  template_report_gen:
    _type: template_report_gen
    object_store: {{ .Values.vssAgent.objectStore.type }}
    output_dir: /tmp/its_reports
    save_local_copy: true
    base_url: {{ include "agents.reportsBaseUrl" . }}
    template_path: /config/templates
    template_name: {{ .Values.vssAgent.template.name }}
    agent_version: {{ .Values.vssAgent.version }}
    llm_name: nim_llm
    video_understanding_tool: video_understanding
    picture_url_tool: vst_picture_url
    video_url_tool: vst_video_url
    geolocation_tool: geolocation
    vlm_prompts:
      - "Describe the type of road (e.g., residential street, highway, rural road, intersection)."
      - "Describe road and environmental conditions for the incident. Include road condition (e.g., Dry / Wet / Ice / Snow / Sand / Unknown), light condition (e.g., Daylight / Dusk / Dawn / Darkness with street lighting / Darkness without lighting / Unknown), weather (e.g., Clear / Rain / Fog / Snow / Storm / Windy / Unknown), traffic control devices (e.g., Traffic lights / Stop signs / Yield signs / None / Unknown), and road geometry (e.g., Straight / Curve / Hillcrest / Intersection / Roundabout / Bridge / Unknown)."
      - "Describe vehicles involved in the video. Focus only on the following object ids: {object_ids}. Include vehicle type (e.g., Car / Bus / Truck / Motorcycle / Bicycle / Other) and vehicle color for each vehicle with the object id."
      - "Identify whether the police attended the scene."
      - "Extract the speed limit at the location if it is visible."
    report_prompt: |
      Template to populate:
      {template}

      Instructions:
      1. Extract incident details from tool results (incident ID, sensor ID, timestamp, location,
         collision objects, etc.)
      2. Extract video analysis details from video_understanding tool results (lighting, road and
         environmental conditions, vehicle details, etc.)
      3. Fill in all template fields with extracted information
      4. Use "Unknown" or "N/A" for fields where information is not available
      5. Ensure the report is complete and well-structured
      6. For Report Indentifier, generate a unique identifier for the report
      7. AI Agent version: {agent_version}

      Return only the populated markdown template without any additional text or code blocks.

{{- if .Values.vssVaMcp.enabled }}
  get_fov_counts_with_chart:
    _type: get_fov_counts_with_chart
    get_fov_histogram_tool: video_analytics_mcp.video_analytics.get_fov_histogram
    chart_generator_tool: chart_generator
    chart_base_url: {{ include "agents.reportsBaseUrl" . }}

  report_agent:
    _type: report_agent
    get_incidents_tool: video_analytics_mcp.video_analytics.get_incidents
    get_incident_tool: video_analytics_mcp.video_analytics.get_incident
    template_report_tool: template_report_gen

  multi_report_agent:
    _type: multi_report_agent
    multi_incident_tool: multi_incident_formatter
    max_incidents: 9999
{{- end }}

llms:
  nim_llm:
    _type: nim
    model_name: {{ .Values.vssAgent.llm.name }}
    base_url: {{ .Values.vssAgent.llm.baseUrl }}/v1
    max_tokens: 4096
    temperature: 0.0

  nim_vlm:
    _type: nim
    model_name: {{ .Values.vssAgent.vlm.name }}
    base_url: {{ .Values.vssAgent.vlm.baseUrl }}/v1
    temperature: 0.0
    max_tokens: 1024

  eval_llm_judge:
    _type: nim
    model_name: {{ .Values.vssAgent.evalLlmJudge.name }}
    base_url: {{ .Values.vssAgent.evalLlmJudge.baseUrl }}/v1
    max_tokens: 4096
    temperature: 0.0

workflow:
  _type: top_agent
  llm_name: nim_llm
  llm_reasoning: false
  log_level: INFO
  max_retries: 3
  max_iterations: 15
  tool_names:
{{- if .Values.vssVaMcp.enabled }}
  - get_fov_counts_with_chart
  - video_analytics_mcp.video_analytics.get_sensor_ids
  - video_analytics_mcp.video_analytics.get_places
{{- end }}
  - vst_picture_url
{{- if .Values.vssVaMcp.enabled }}
  subagent_names:
    - report_agent
    - multi_report_agent
{{- end }}
  prompt: |
{{ .Files.Get (printf "configs/%s/workflow-prompt.txt" .Values.blueprint) | indent 4 }}

eval:
  general:
    workflow_alias: {{ .Values.vssAgent.eval.workflowAlias | default "" | quote }}
    output_dir: {{ .Values.vssAgent.eval.outputDir | default "/eval/results" }}
    dataset:
      _type: json
      file_path: {{ .Values.vssAgent.eval.datasetPath | default "/eval/dataset.json" }}
      structure:
        id_key: "id"
        question_key: "query"

  evaluators:
    trajectory_evaluator:
      _type: customized_trajectory_evaluator
      llm_name: eval_llm_judge
      track_agent_selected_tools_only: true
      max_retries: 2
      llm_judge_reasoning: true
      custom_prompt_template: |
        You are an expert evaluator assessing an AI agent's performance on tool calling.

        Question: {question}

        Available Tools and Their Schemas:
        {tool_schemas}

        Agent's Actions and Tool Calls:
        {agent_trajectory}

        Agent's Final Answer:
        {answer}

        Reference/Expected Output:
        {reference}

        Evaluation Criteria:
        1. **Tool Selection**: Did the agent select the appropriate tools for the task?
        2. **Parameter Accuracy**: Were tool parameters correct according to the tool schemas above?
        Check that all parameters match the expected types, required fields, and descriptions.
        3. **Data Retrieval**: Did the agent successfully retrieve the necessary data? Sometimes the
        data is not available, that should not be considered as a failure. As long as the tools are
        called correctly, it should be considered as a success.
        4. **Completeness**: Did the agent gather all required information to answer the question?
        5. **Efficiency**: Did the agent avoid unnecessary or redundant tool calls?

        IMPORTANT NOTES:

        1. VLM Failure: The report_agent always will fail on VLM analysis. This is EXPECTED and
           should NOT be considered a failure. As long as the correct tools are called, it should
           be considered as a success and should be scored 1.0.

        2. LLM Model Names in Trajectory: Some trajectory steps have tool names equal to LLM model names. These are NOT
           actual tool calls. They are INTERNAL REASONING STEPS showing which LLM is thinking.

           **CRITICAL: When evaluating tool selection, COMPLETELY IGNORE any steps where the tool
           name is an LLM model name. Only evaluate steps where actual function tools are called.**

        Scoring Guidelines:
        - 1.0: Perfect execution - all criteria met, accurate answer
        - 0.8-0.9: Excellent - minor issues but correct answer
        - 0.6-0.7: Good - some issues but mostly correct
        - 0.4-0.5: Fair - significant issues, partially correct
        - 0.0-0.3: Poor - major issues, incorrect or incomplete answer

        Think through your evaluation carefully, then output only a single number (your score from
        0.0 to 1.0).
