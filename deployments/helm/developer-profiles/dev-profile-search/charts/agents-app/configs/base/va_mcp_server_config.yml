functions:
  vst_sensor_list:
    _type: vst.sensor_list
    vst_base_url: {{ include "agents.vstInternalUrl" . }}
    vst_internal_url: {{ include "agents.vstInternalUrl" . }}

  vst_video_list:
    _type: vst.video_list
    vst_base_url: {{ include "agents.vstInternalUrl" . }}
    vst_internal_url: {{ include "agents.vstInternalUrl" . }}

llms:
  nim_llm:
    _type: nim
    model_name: {{ .Values.vssAgent.llm.name }}
    temperature: 0.0
    max_tokens: {{ include "agents.bpValue" (dict "root" . "keys" (list "vaMcp" "llmMaxTokens")) }}

workflow:
  _type: react_agent
  tool_names: [vst_sensor_list, vst_video_list]
  llm_name: nim_llm
  verbose: true
  parse_agent_response_max_retries: 3
