{{ if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vst-ingress.fullname" . }}
  labels:
    {{- include "vst-ingress.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "vst-ingress.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vst-ingress.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-sensor
          image: docker.io/alpine/curl:8.12.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until curl --connect-timeout 2 --silent --head {{ include "vst-ingress.sensorSvc" . }}:{{ .Values.upstreams.sensorPort }}/api/v1/sensor/version >/dev/null 2>&1; do
                echo "Waiting for sensor..."
                sleep 1
              done
      containers:
        - name: vst-ingress
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          command:
            - sh
            - -c
            - cat /opt/configs/nginx.conf && exec nginx -c /opt/configs/nginx.conf -g 'daemon off;'
          env:
            - name: VST_INGRESS_HTTP_PORT
              value: {{ .Values.service.nodePort | default .Values.port | quote }}
            - name: HOST_IP
              value: {{ .Values.global.externalHost | default "127.0.0.1" | quote }}
            - name: EXTERNAL_IP
              value: {{ .Values.global.externalHost | default "127.0.0.1" | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /opt/configs/nginx.conf
              subPath: nginx.conf
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "vst-ingress.fullname" . }}-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
