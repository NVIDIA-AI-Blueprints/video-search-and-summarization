{{ if .Values.enabled }}
{{- $sensorSvc := include "vst-ingress.sensorSvc" . }}
{{- $sdrEnvoySvc := include "vst-ingress.sdrEnvoySvc" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vst-ingress.fullname" . }}-config
  labels:
    {{- include "vst-ingress.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log  stderr info;
    pid        /tmp/nginx/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        client_body_temp_path /tmp/nginx/client-body;
        proxy_temp_path       /tmp/nginx/proxy;
        fastcgi_temp_path     /tmp/nginx/fastcgi;
        uwsgi_temp_path       /tmp/nginx/uwsgi;
        scgi_temp_path        /tmp/nginx/scgi;

        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        log_format detailed '$remote_addr [$time_local] "$request" '
                          '$status $body_bytes_sent '
                          'rt:$request_time ut:$upstream_response_time '
                          'up:$upstream_addr';

        log_format proxy_debug '$remote_addr [$time_local] "$request" '
                              '$status rt:$request_time ut:$upstream_response_time '
                              'up:$upstream_addr us:$upstream_status';

        access_log /dev/stdout detailed;

        client_max_body_size 500M;

        map $http_upgrade $connection_upgrade {
            default upgrade;
            '' close;
        }

        server {
            listen {{ .Values.port }};

            location /health {
                return 200 'ok';
                add_header Content-Type text/plain;
            }

            # 404 for any /vst/api/ path NOT under /vst/api/v1/
            # ^~ has lower priority than longer prefix matches, so
            # /vst/api/v1/* routes below still take effect.
            location ^~ /vst/api/ {
                return 404;
            }

            location = /vst {
                return 301 /vst/;
            }

            location /vst/assets/ {
                alias /vst-ui/assets/;
            }

            location /vst/favicon/ {
                alias /vst-ui/favicon/;
            }

            location /vst/ {
                alias /vst-ui/;
                index index.html;
                try_files $uri $uri/ /vst/index.html;
            }

            # Sensor APIs → sensor-ms
            location /vst/api/v1/sensor/ {
                access_log /dev/stdout proxy_debug;
                rewrite ^/vst/api/v1/sensor/(.*) /api/v1/sensor/$1 break;
                proxy_pass http://{{ $sensorSvc }}:{{ .Values.upstreams.sensorPort }};
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_http_version 1.1;
            }

            # Storage file URL endpoint - fix double http:// scheme from backend
            # and replace k8s service name with external IP (RTVI-embed requires IP-based URLs)
            location ~ ^/vst/api/v1/storage/file/[^/]+/url {
                rewrite ^/vst/api/v1/(.*) /api/v1/$1 break;
                proxy_pass http://{{ $sdrEnvoySvc }}:{{ .Values.upstreams.sdrEnvoyPort }};
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_http_version 1.1;
                proxy_read_timeout 3600s;
                proxy_send_timeout 3600s;

                proxy_set_header Accept-Encoding "";
                sub_filter 'http://http://' 'http://';
                {{- $gIngress := index (.Values.global | default dict) "ingress" | default dict }}
                {{- if (index $gIngress "enabled") }}
                {{- $gExHost := .Values.global.externalHost | default "127.0.0.1" }}
                {{- $mainHost := index $gIngress "mainHost" | default (printf "vss-search.%s.nip.io" $gExHost) }}
                sub_filter '{{ include "vst-ingress.fullname" . }}:{{ .Values.port }}' '{{ $mainHost }}';
                {{- else }}
                sub_filter '{{ include "vst-ingress.fullname" . }}:{{ .Values.port }}' '{{ .Values.global.externalHost }}:{{ .Values.service.nodePort | default .Values.port }}';
                {{- end }}
                sub_filter_types application/json text/json text/plain application/octet-stream;
                sub_filter_once off;
            }

            # All other v1 APIs (storage, replay, live, record, proxy, etc.)
            # → sdr-envoy which proxies to streamprocessing-ms
            location /vst/api/v1/ {
                rewrite ^/vst/api/v1/(.*) /api/v1/$1 break;
                proxy_pass http://{{ $sdrEnvoySvc }}:{{ .Values.upstreams.sdrEnvoyPort }};
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
                proxy_read_timeout 3600s;
                proxy_send_timeout 3600s;
                proxy_buffering off;
                proxy_request_buffering off;
            }

            # Storage file downloads → sdr-envoy → streamprocessing-ms
            location /vst/storage/ {
                rewrite ^/vst/storage/(.*) /storage/$1 break;
                proxy_pass http://{{ $sdrEnvoySvc }}:{{ .Values.upstreams.sdrEnvoyPort }};
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_http_version 1.1;
                proxy_read_timeout 3600s;
                proxy_send_timeout 3600s;
                proxy_buffering off;
                proxy_request_buffering off;
            }
        }
    }
{{- end }}
