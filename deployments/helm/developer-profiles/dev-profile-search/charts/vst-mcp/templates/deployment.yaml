{{ if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vst-mcp.fullname" . }}
  labels:
    {{- include "vst-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "vst-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vst-mcp.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-vst-ingress
          image: docker.io/alpine/curl:8.12.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until curl --connect-timeout 2 --silent {{ include "vst-mcp.vstIngressSvc" . }}:{{ .Values.gateway.vstIngressPort }}/health >/dev/null 2>&1; do
                echo "Waiting for vst-ingress..."
                sleep 1
              done
      containers:
        - name: vst-mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          env:
            - name: MCP_GATEWAY_CPP_API_BASE_URL
              value: {{ include "vst-mcp.cppApiBaseUrl" . | quote }}
            - name: MCP_GATEWAY_CPP_API_TIMEOUT
              value: {{ .Values.gateway.cppApiTimeout | quote }}
            - name: MCP_GATEWAY_SERVER_NAME
              value: {{ .Values.gateway.serverName | quote }}
            - name: MCP_GATEWAY_SERVER_VERSION
              value: {{ .Values.gateway.serverVersion | quote }}
            - name: MCP_GATEWAY_SERVER_HOST
              value: "0.0.0.0"
            - name: MCP_GATEWAY_SERVER_PORT
              value: {{ .Values.port | quote }}
            - name: MCP_GATEWAY_LOG_LEVEL
              value: {{ .Values.gateway.logLevel | quote }}
            - name: MCP_GATEWAY_ENABLE_JSONRPC_LOGGING
              value: {{ .Values.gateway.enableJsonrpcLogging | quote }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
