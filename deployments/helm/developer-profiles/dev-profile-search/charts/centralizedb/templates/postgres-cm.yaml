{{- if .Values.enabled }}
# postgres-cm: CENTRALIZE_DB_* connection params (align with vst-postgres). Env in StatefulSet uses valueFrom.configMapKeyRef to this.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "centralizedb.fullname" . }}-postgres-cm
  labels:
    app.kubernetes.io/name: centralizedb
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  CENTRALIZE_DB_HOSTADDR: {{ .Values.postgresCm.data.CENTRALIZE_DB_HOSTADDR | default (include "centralizedb.fullname" .) | quote }}
  CENTRALIZE_DB_NAME: {{ .Values.postgresCm.data.CENTRALIZE_DB_NAME | quote }}
  CENTRALIZE_DB_PASSWORD: {{ .Values.postgresCm.data.CENTRALIZE_DB_PASSWORD | quote }}
  CENTRALIZE_DB_PORT: {{ .Values.postgresCm.data.CENTRALIZE_DB_PORT | quote }}
  CENTRALIZE_DB_USERNAME: {{ .Values.postgresCm.data.CENTRALIZE_DB_USERNAME | quote }}
{{- end }}
