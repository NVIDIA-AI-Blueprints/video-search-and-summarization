# Aligned with helm/vst-app/charts/vst-postgres and dev-profile-base centralizedb-dev: StatefulSet, postgres-cm (CENTRALIZE_DB_*), env from ConfigMap, volume subPaths.
enabled: true
global: {}
image:
  repository: postgres
  tag: "17.6-alpine"
  pullPolicy: IfNotPresent
replicas: 1
# Args for postgres process (config file and socket dir)
args:
  - "postgres"
  - "-c"
  - "config_file=/etc/postgresql/postgresql.conf"
  - "-c"
  - "unix_socket_directories=/var/run/postgresql"
# postgres-cm: single source of truth for DB connection (matches vst-postgres). Other charts can reference this ConfigMap or use same values.
postgresCm:
  name: postgres-cm
  data:
    CENTRALIZE_DB_HOSTADDR: ""   # default in template: Service name (<Release>-centralizedb)
    CENTRALIZE_DB_NAME: nvcentralizedb
    CENTRALIZE_DB_PASSWORD: nvidia123
    CENTRALIZE_DB_PORT: "5432"
    CENTRALIZE_DB_USERNAME: vst
# Init container: create postgresql/db and postgresql/log subPaths and chown for runAsUser (reference uses subPaths).
initContainer:
  fixPermissions:
    enabled: true
    image: busybox:1.37.0
    runAsUser: 0
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
service:
  port: 5432
  type: ClusterIP
storage:
  data:
    size: 10Gi
    storageClass: ""
  configMap:
    useDefault: true
resources: {}
nodeSelector: {}
tolerations: []
# Use shell so POSTGRES_USER/POSTGRES_DB are expanded (Kubernetes exec does not expand env vars).
livenessProbe:
  exec:
    command: ["/bin/sh", "-c", "pg_isready -h localhost -U \"$POSTGRES_USER\""]
  failureThreshold: 3
  initialDelaySeconds: 30
  periodSeconds: 20
  successThreshold: 1
  timeoutSeconds: 2
readinessProbe:
  exec:
    command: ["/bin/sh", "-c", "pg_isready -h localhost -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
  failureThreshold: 5
  initialDelaySeconds: 5
  periodSeconds: 5
  successThreshold: 1
  timeoutSeconds: 2
