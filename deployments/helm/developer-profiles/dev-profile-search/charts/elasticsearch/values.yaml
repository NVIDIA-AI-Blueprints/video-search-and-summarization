replicas: 1
image:
  repository: docker.elastic.co/elasticsearch/elasticsearch
  tag: "9.3.0"
  pullPolicy: IfNotPresent
port: 9200
javaOpts: "-Xmx1024m -Xms256m"
ilmMinAge: "48h"
rtviCvEmbeddingsDim: "1536"
visionLlmEmbeddingsDim: "768"
init:
  enabled: true
  image:
    repository: docker.io/alpine/curl
    tag: "8.12.1"
    pullPolicy: IfNotPresent
  backoffLimit: 5
service:
  type: ClusterIP
  port: 9200
persistence:
  storageClass: ""
  data:
    size: 100Gi
  logs:
    size: 20Gi
resources:
  requests:
    memory: "2Gi"
    cpu: "1"
  limits:
    memory: "4Gi"
    cpu: "2"
gpu:
  enabled: true
  count: 1
  deviceId: "0"
# Prometheus elasticsearch-exporter sidecar deployment
exporter:
  enabled: false
  image: quay.io/prometheuscommunity/elasticsearch-exporter:latest
  port: 9114
  nodeSelector: {}
  resources: {}

nodeSelector: {}
tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"
