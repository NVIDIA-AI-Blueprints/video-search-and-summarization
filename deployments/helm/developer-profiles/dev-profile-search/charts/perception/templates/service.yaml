{{ if .Values.httpPort }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "perception.fullname" . }}-perception
  labels:
    {{- include "perception.labels" . | nindent 4 }}
    app.kubernetes.io/component: perception
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.httpPort }}
      targetPort: {{ .Values.httpPort }}
      protocol: TCP
  selector:
    {{- include "perception.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: perception
{{- end }}
