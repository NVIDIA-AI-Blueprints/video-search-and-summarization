apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kibana.fullname" . }}-kibana-config
  labels:
    {{- include "kibana.labels" . | nindent 4 }}
data:
  kibana.yml: |
    server.host: "0.0.0.0"
    server.shutdownTimeout: "5s"
    elasticsearch.hosts: ["{{ include "kibana.elasticsearchUrl" . }}"]
    monitoring.ui.container.elasticsearch.enabled: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kibana.fullname" . }}-kibana-init-data
  labels:
    {{- include "kibana.labels" . | nindent 4 }}
data:
  kibana-import-dashboard.sh: |
{{ .Files.Get "configs/kibana-import-dashboard.sh" | indent 4 }}
  search-kibana-objects.ndjson: |
{{ .Files.Get "configs/search-kibana-objects.ndjson" | indent 4 }}
