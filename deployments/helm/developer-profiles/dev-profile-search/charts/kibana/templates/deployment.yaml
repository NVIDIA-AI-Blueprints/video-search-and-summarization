apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kibana.fullname" . }}-kibana
  labels:
    {{- include "kibana.labels" . | nindent 4 }}
    app.kubernetes.io/component: kibana
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "kibana.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: kibana
  template:
    metadata:
      labels:
        {{- include "kibana.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: kibana
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: kibana
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: ELASTICSEARCH_HOSTS
              value: {{ include "kibana.elasticsearchUrl" . | quote }}
            - name: CSP_STRICT
              value: "false"
            {{- $gExHost := index (.Values.global | default dict) "externalHost" | default "" }}
            {{- $gKibUrl := index (.Values.global | default dict) "kibanaPublicUrl" | default "" }}
            {{- $kibPub := $gKibUrl | default (ternary (printf "http://kibana.%s.nip.io" $gExHost) (printf "http://localhost:%d" (int .Values.port)) (ne $gExHost "")) }}
            - name: SERVER_PUBLICBASEURL
              value: {{ $kibPub | quote }}
            - name: SERVER_SECURITYRESPONSEHEADERS_DISABLEEMBEDDING
              value: "false"
            - name: CSP_WASM_EVAL
              value: "false"
          ports:
            - name: http
              containerPort: 5601
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: kibana-config
              mountPath: /usr/share/kibana/config/kibana.yml
              subPath: kibana.yml
              readOnly: true
      volumes:
        - name: kibana-config
          configMap:
            name: {{ include "kibana.fullname" . }}-kibana-config
