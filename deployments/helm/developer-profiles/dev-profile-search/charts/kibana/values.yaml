replicas: 1
image:
  repository: docker.elastic.co/kibana/kibana
  tag: "9.3.0"
  pullPolicy: IfNotPresent
port: 5601
service:
  type: NodePort
  nodePort: 31560
init:
  enabled: true
  image:
    repository: docker.io/alpine/curl
    tag: "8.12.1"
    pullPolicy: IfNotPresent
  backoffLimit: 5
elasticsearch:
  host: ""
  port: "9200"
resources:
  requests:
    memory: "1Gi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "1"
nodeSelector: {}
tolerations: []
