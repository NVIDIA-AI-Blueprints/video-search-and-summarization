{{ if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "streamprocessing-ms.headlessName" . }}
  labels:
    {{- include "streamprocessing-ms.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - name: http-api
      port: {{ .Values.httpPort }}
      targetPort: http-api
      protocol: TCP
    {{- $rtspBase := int .Values.rtspServerPort }}
    {{- $rtspInstances := int (.Values.rtspServerInstances | default 10) }}
    {{- range $i := until $rtspInstances }}
    - name: rtsp-{{ $i }}
      port: {{ add $rtspBase $i }}
      targetPort: rtsp-{{ $i }}
      protocol: TCP
    {{- end }}
  selector:
    {{- include "streamprocessing-ms.selectorLabels" . | nindent 4 }}
{{- end }}
