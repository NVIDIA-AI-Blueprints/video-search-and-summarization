{{ if .Values.rbac.create }}
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "sdr-envoy.fullname" . }}-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sdr-envoy.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "update", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["services", "services/proxy"]
    verbs: ["get", "proxy"]
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "sdr-envoy.fullname" . }}-cluster-role
  labels:
    {{- include "sdr-envoy.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sdr-envoy.fullname" . }}-role-binding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sdr-envoy.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "sdr-envoy.fullname" . }}-role
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccountName | default "default" }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sdr-envoy.fullname" . }}-cluster-role-binding
  labels:
    {{- include "sdr-envoy.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "sdr-envoy.fullname" . }}-cluster-role
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccountName | default "default" }}
    namespace: {{ .Release.Namespace }}
{{- end }}
