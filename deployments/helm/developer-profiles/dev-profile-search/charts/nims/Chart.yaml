apiVersion: v2
name: nims
description: >
  NVIDIA NIM deployments for the MDX search blueprint.
  Includes Nemotron Nano 9B v2 (LLM) and Cosmos Reason2 8B (VLM)
  deployed via the NVIDIA NIM Operator CRDs (NIMCache + NIMService).
type: application
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: nemotron-nano-9b-v2
    version: 1.0.0
    repository: ""
    alias: nemotron
    condition: nemotron.enabled

  - name: cosmos-reason2-8b
    version: 1.0.0
    repository: ""
    alias: cosmos
    condition: global.enableCritic
