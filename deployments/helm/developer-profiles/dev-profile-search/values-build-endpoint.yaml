# values-build-endpoint.yaml
# Override file for deploying with NVIDIA Build Endpoint (hosted NIMs).
# LLM and VLM inference runs at https://integrate.api.nvidia.com -- no local
# GPU required for those models. Perception and RTVI Embed still run locally.
#
# Usage:
#   helm upgrade --install vss-search ./dev-profile-search \
#     -f dev-profile-search/values-build-endpoint.yaml \
#     -n default \
#     --set global.externalHost=$NODE_EXTERNAL_IP \
#     --set global.ngcApiKey=$NGC_CLI_API_KEY \
#     --set nims.global.ngcApiKey=$NGC_CLI_API_KEY \
#     --set agents.vssAgent.apiKeys.nvidia=$NGC_CLI_API_KEY \
#     --wait=false

# Disable local NIM deployments
nims:
  nemotron:
    enabled: false
  cosmos:
    enabled: false

# Point agent LLM / VLM / eval to hosted endpoint
agents:
  vssAgent:
    llm:
      name: "nvidia/nvidia-nemotron-nano-9b-v2"
      baseUrl: "https://integrate.api.nvidia.com"
    vlm:
      name: "nvidia/cosmos-reason2-8b"
      baseUrl: "https://integrate.api.nvidia.com"
    evalLlmJudge:
      name: "nvidia/nvidia-nemotron-nano-9b-v2"
      baseUrl: "https://integrate.api.nvidia.com"
