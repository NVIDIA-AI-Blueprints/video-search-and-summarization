# =============================================================================
# nims - NVIDIA NIM models (LLM + VLM) via NIM Operator CRDs
# Requires: NVIDIA NIM Operator (apps.nvidia.com/v1alpha1) installed in cluster.
# GPU-specific tuning: use override-values-H100/L40S/RTXPRO6000BW.yaml files
# from charts/nims/ or pass --set nims.nemotron.env.* / nims.cosmos.env.*
# =============================================================================
nims:
  enabled: true

  # GPU selection: H100 | L40S | RTXPRO6000BW
  # The nims subchart renders nim-env ConfigMaps from the gpuProfiles lookup
  # table using this single value.  Override at install time:
  #   --set nims.gpuType=L40S
  gpuType: "H100"

  # --- Nemotron Nano 9B v2 (LLM) ---
  nemotron:
    enabled: true
    image:
      repository: nvcr.io/nim/nvidia/nvidia-nemotron-nano-9b-v2
      tag: "1"
      pullPolicy: IfNotPresent
    replicas: 1
    resources:
      limits:
        nvidia.com/gpu: "1"
      requests:
        nvidia.com/gpu: "1"
    storage:
      pvc:
        storageClass: ""
        size: "50Gi"
    service:
      type: ClusterIP
      port: 8000
    nodeSelector: {}
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
    env:
      CUDA_VISIBLE_DEVICES: "0"

  # --- Cosmos Reason2 8B (VLM) ---
  # Requires 1 full GPU. If using GPU time-slicing, increase nvidia.com/gpu
  # to match the number of time-sliced replicas per physical GPU.
  # See: https://docs.nvidia.com/datacenter/cloud-native/gpu-operator/latest/gpu-sharing.html
  cosmos:
    enabled: true # ignored, and controlled by global.enableCritic
    image:
      repository: nvcr.io/nim/nvidia/cosmos-reason2-8b
      tag: "1.6.0"
      pullPolicy: IfNotPresent
    replicas: 1
    resources:
      limits:
        nvidia.com/gpu: "1"
      requests:
        nvidia.com/gpu: "1"
    storage:
      pvc:
        storageClass: ""
        size: "200Gi"
    service:
      type: ClusterIP
      port: 8000
    nodeSelector: {}
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
    env:
      CUDA_VISIBLE_DEVICES: "1"
      NIM_KVCACHE_PERCENT: "0.75"
      NIM_MAX_MODEL_LEN: "16384"
      NIM_LOW_MEMORY_MODE: "true"