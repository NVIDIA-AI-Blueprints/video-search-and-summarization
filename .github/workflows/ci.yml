name: CI

on:
  push:
    branches:
      - main
      - develop
      - "pull-request/[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Python lint (ruff check + ruff format + yamllint)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.2"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dev dependencies
        run: uv sync --group dev --frozen

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format
        run: uv run ruff format --check .

      - name: yamllint
        run: |
          uv run yamllint \
            -d '{extends: default, rules: {line-length: {max: 120}, document-start: disable, indentation: {spaces: 2, indent-sequences: false}}}' \
            $(git ls-files '*.yml' '*.yaml' | grep -v '\.gitlab-ci\.yml')

  # ---------------------------------------------------------------------------
  # Job 2: Python type checking (mypy)
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.2"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dev dependencies
        run: uv sync --group dev --frozen

      - name: mypy
        run: uv run mypy src/vss_agents/

  # ---------------------------------------------------------------------------
  # Job 3: Python tests (pytest + coverage)
  # ---------------------------------------------------------------------------
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.2"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dev dependencies
        run: uv sync --group dev --frozen

      - name: pytest
        timeout-minutes: 10
        run: |
          uv run pytest \
            --cov=src/vss_agents \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -m "not slow and not integration"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: agent/coverage.xml

  # ---------------------------------------------------------------------------
  # Job 4: Security scanning (detect-secrets)
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan (detect-secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.2"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install detect-secrets
        run: uv sync --group dev --frozen

      - name: detect-secrets
        run: |
          uv run detect-secrets scan \
            --baseline .secrets.baseline \
            --exclude-files 'gitleaks-baseline\.json'

  # ---------------------------------------------------------------------------
  # Job 5: Frontend lint + typecheck
  # ---------------------------------------------------------------------------
  frontend-lint:
    name: Lint & Typecheck (UI)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Job 6: Frontend build
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Build (UI)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Job 7: Trigger downstream pipeline on main
  # ---------------------------------------------------------------------------
  trigger-downstream-pipeline:
    name: Trigger Downstream Pipeline
    needs:
      - lint
      - typecheck
      - test
      - security
      - frontend-lint
      - frontend-build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/pull-request/')
    runs-on:
      - self-hosted
      - linux
    timeout-minutes: 10
    env:
      DOWNSTREAM_CI_URL: ${{ secrets.DOWNSTREAM_CI_URL }}
      DOWNSTREAM_CI_TOKEN: ${{ secrets.DOWNSTREAM_CI_TOKEN }}
      DOWNSTREAM_PROJECT_PATH: hverjus/ci-vss-oss
      DOWNSTREAM_REF: main
      DOWNSTREAM_SUBMODULE_HASH_VARIABLE: VSS_SUBMODULE_HASH
    steps:
      - uses: actions/checkout@v4

      - name: Trigger pipeline
        run: python3 .github/scripts/trigger-downstream-pipeline.sh
