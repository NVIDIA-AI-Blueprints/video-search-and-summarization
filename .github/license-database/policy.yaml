#
# License policy for `.github/scripts/check_licenses.py`.
#
# Pattern matching is case-insensitive and substring-based against the
# detected license string. Use SPDX identifiers where possible. Patterns
# in `denied` always win over patterns in `allowed`.

allowed:
  # Permissive licenses we accept by default for any new dependency.
  # Both SPDX identifiers and the human-readable variants returned by
  # PyPI classifiers / npm metadata are listed.
  - 0BSD
  - Apache-2.0
  - Apache 2.0
  - Apache License 2.0
  - Apache Software License
  - Artistic-2.0
  - BSD
  - BSD-2-Clause
  - BSD-3-Clause
  - BSD License
  - BlueOak-1.0.0
  - CC-BY-3.0
  - CC-BY-4.0
  - CC0-1.0
  - ISC
  - ISC License
  - ISC License ISCL
  - ISCL
  - MIT
  - MIT License
  - MIT-0
  - MPL-2.0  # Weak copyleft, file-level. Allowed for transitive use.
  - Mozilla Public License 2.0
  - PSF-2.0
  - Python-2.0
  - Python Software Foundation License
  - Public Domain
  - Public domain
  - Unicode-DFS-2016
  - Unlicense
  - WTFPL
  - Zlib

denied:
  # Strong / network copyleft. Always fail CI when detected.
  - GPL-1.0
  - GPL-2.0
  - GPL-3.0
  - GPLv1
  - GPLv2
  - GPLv3
  - GNU General Public License
  - AGPL-1.0
  - AGPL-3.0
  - AGPLv3
  - GNU Affero General Public License
  - SSPL-1.0
  - Server Side Public License
  - BUSL-1.1
  - Business Source License
  - CC-BY-NC  # Non-commercial restriction is incompatible with shipping.
  - CC-BY-SA  # ShareAlike has copyleft semantics for derivatives.
  - CC-BY-ND
  - CPAL-1.0
  - EPL-1.0
  - EPL-2.0
  - EUPL-1.1
  - EUPL-1.2
  - OSL-3.0
  - RPL-1.5

# Weak copyleft licenses (LGPL family) - always require an explicit OSRB
# entry in `non-permissive-licenses.csv` to be accepted, otherwise treated
# as denied. Patterns are matched after `denied` and before `allowed`.
review_required:
  - LGPL-2.0
  - LGPL-2.1
  - LGPL-3.0
  - LGPLv2
  - LGPLv3
  - GNU Library or Lesser General Public License
  - GNU Lesser General Public License

# Packages to skip entirely (workspace-internal, NVIDIA-published, or
# bundled forks where we own the license). Names are matched
# case-insensitively against the package name. Glob `*` is supported as
# a trailing wildcard.
ignored_packages:
  python:
    - vss-agents
    - vss_agents
    - vss-report-agent
    - vss_report_agent
    - deep-search
    - deep_search
    - nvidia-nat
    - nvidia-nat-*
    - nvidia_nat
    - nvidia_nat_*

  npm:
    # Workspace packages from services/ui/package.json `workspaces:`
    - "@aiqtoolkit-ui/*"
    - "@nemo-agent-toolkit/*"
    - "@nv-metropolis-bp-vss-ui/*"
    - nemo-agent-toolkit-ui
    - nemo-agent-toolkit-ui-monorepo
    - nv-metropolis-bp-vss-ui
