logging:
  level: "INFO"                                 # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL (applies to all components)
  format: "%(asctime)s - %(threadName)s - %(name)s - %(levelname)s - %(message)s"
  third_party_level: "WARNING"                  # Level for urllib3/httpcore/httpx/elasticsearch, etc.
  truncate_base64: true                         # Truncate base64 data URLs in logs to prevent long output (env: LOG_TRUNCATE_BASE64)