  perception-2d-init:
    image: debian:12-slim
    profiles: ["bp_developer_search_2d"]
    container_name: vss-rtvi-cv-init
    network_mode: "host"
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          cpus: '2.0'
          memory: 6g
        reservations:
          cpus: '0.5'
          memory: 1g
    volumes:
      - $MDX_DATA_DIR/models/:/opt/storage/
      - $MDX_SAMPLE_APPS_DIR/developer-profiles/dev-profile-search/video-analytics-2d-app/deepstream/scripts/download-vision-encoder.sh:/opt/scripts/download-vision-encoder.sh:ro
    environment:
      VISION_ENCODER_NGC_ORG: ${VISION_ENCODER_NGC_ORG:-nvstaging}
      VISION_ENCODER_NGC_TEAM: ${VISION_ENCODER_NGC_TEAM:-tao}
      VISION_ENCODER_MODEL: ${VISION_ENCODER_MODEL:-siglip_v2}
      VISION_ENCODER_VERSION: ${VISION_ENCODER_VERSION:-deployable_v1.1}
      VISION_ENCODER_ONNX_FILE: ${VISION_ENCODER_ONNX_FILE:-siglip2_v1.1.onnx}
      VISION_ENCODER_TOKENIZER_DIR: ${VISION_ENCODER_TOKENIZER_DIR:-siglip2_v1.1_tokenizer}
      NGC_CLI_API_KEY: ${NGC_CLI_API_KEY}
      STORAGE_UID: ${STORAGE_UID:-1001}
      STORAGE_GID: ${STORAGE_GID:-1001}
    command:
      - bash
      - /opt/scripts/download-vision-encoder.sh

  perception-2d-fusion:
    extends:
      file: $MDX_SAMPLE_APPS_DIR/services/rtvi/rtvi-cv/compose.yaml
      service: perception
    profiles: ["bp_developer_search_2d"]
    container_name: vss-rtvi-cv
    volumes:
        # Config file mounts (read-only staging; ds-search-start.sh copies to the writable app dir)
      - $MDX_SAMPLE_APPS_DIR/developer-profiles/dev-profile-search/video-analytics-2d-app/deepstream/configs/:/opt/ds-configs-ro:ro

      # Search-profile wrapper script (patches configs, then calls ds-start.sh)
      - $MDX_SAMPLE_APPS_DIR/developer-profiles/dev-profile-search/video-analytics-2d-app/deepstream/scripts/ds-search-start.sh:/opt/nvidia/deepstream/deepstream/sources/apps/sample_apps/metropolis_perception_app/ds-search-start.sh:ro

      # Models directory — RT-DETR + vision encoder models (downloaded by init container)
      - $MDX_DATA_DIR/models/:/opt/storage/
    command:
      - bash
      - -c
      - /opt/nvidia/deepstream/deepstream/sources/apps/sample_apps/metropolis_perception_app/ds-search-start.sh
    environment:
      GST_PLUGIN_PATH: /opt/nvidia/deepstream/deepstream/sources/gst-plugins/gst-nvdstextembedder
      TRANSFORMERS_OFFLINE: 0
      HF_HUB_OFFLINE: 0
      DS_MODE_FLAG: "1"
      DS_MODEL_FAMILY: rtdetr-warehouse
      DS_TRACKER_REID: "true"
      DS_SHOW_SENSOR_ID: "false"
      VISION_ENCODER_MODEL: ${VISION_ENCODER_MODEL:-siglip_v2}
      VISION_ENCODER_VERSION: ${VISION_ENCODER_VERSION:-deployable_v1.1}
      VISION_ENCODER_ONNX_FILE: ${VISION_ENCODER_ONNX_FILE:-siglip2_v1.1.onnx}
      VISION_ENCODER_TOKENIZER_DIR: ${VISION_ENCODER_TOKENIZER_DIR:-siglip2_v1.1_tokenizer}
      VISION_ENCODER_DS_MODEL_NAME: ${VISION_ENCODER_DS_MODEL_NAME:-siglip2-onnx}
    depends_on:
      perception-2d-init:
        condition: service_completed_successfully
      sensor-ms:
        condition: service_started
      broker-health-check:
        condition: service_completed_successfully


volumes:
  mdx-nvstreamer-data:        
  mdx-nvstreamer-videos:
