# ============================================================================
# config_frag.yml — opt-in profile config WITH knowledge retrieval enabled.
#
# This file is the full ./config.yml plus the knowledge layer additions:
#   * `embedders.nim_embedder`               (used only by `frag_lib` backend)
#   * `functions.knowledge_retrieval`        (the search tool registration)
#   * `workflow.tool_names` extended with    `knowledge_retrieval`
#   * `workflow.prompt` extended with        routing rules for the new tool
#
# Opt-in: set VSS_AGENT_CONFIG_FILE to point at this file instead of
# ./config.yml. See ./README.md for instructions.
#
# Drift policy: when ./config.yml is updated upstream, mirror the changes
# here. The knowledge layer additions are clearly localized to:
#   - the `embedders:` section
#   - the `knowledge_retrieval` entry under `functions:`
#   - the trailing `knowledge_retrieval` in `workflow.tool_names`
#   - the trailing block under `workflow.prompt` (after a blank line)
# ============================================================================

general:
  use_uvloop: true
  front_end:
    _type: vss_fastapi
    runner_class: vss_agents.api.custom_fastapi_worker.CustomFastApiFrontEndWorker
    object_store: ${VSS_AGENT_OBJECT_STORE_TYPE}
    streaming_ingest:
      vst_internal_url: ${VST_INTERNAL_URL}
      enable_video_delete: true
    endpoints:
    - path: /api/v1/videos
      method: POST
      description: Generate VST upload URL
      function_name: video_upload_url
    cors:
      allow_origins:
      - '*'
      allow_methods:
      - '*'
      allow_headers:
      - '*'
      allow_credentials: false
  telemetry:
    tracing:
      phoenix:
        _type: phoenix
        endpoint: ${PHOENIX_ENDPOINT}/v1/traces
        project: DEV-vss-agent-${VSS_AGENT_VERSION}
object_stores:
  local_object_store:
    _type: in_memory
functions:
  video_upload_url:
    _type: video_upload_url
    vst_external_url: ${VST_EXTERNAL_URL}
    agent_base_url: http://${EXTERNAL_IP}:${VSS_AGENT_PORT}
  video_understanding:
    _type: video_understanding
    vlm_name: ${VLM_MODEL_TYPE:-nim}_vlm
    max_frames: 30
    max_fps: 2
    min_pixels: 3136
    max_pixels: 8388608
    reasoning: false
    video_url_tool: vst_video_clip
    time_format: offset
    vlm_mode: ${VLM_MODE}
    internal_ip: ${HOST_IP}
    external_ip: ${EXTERNAL_IP}
    vst_internal_url: ${VST_INTERNAL_URL}
    system_prompt: "You are a monitoring system analyzing video footage.\nYour task is to describe the events in the video in detail or answer the user's question about the video.\n  IMPORTANT:\n  - You must respond only in English and in plain text.\n  - You must respond only in the format specified in the OUTPUT REQUIREMENTS section.\n  - Timestamp must be in pts format, seconds since the start of the video.\n  - Always provide a direct answer to the question asked.\n  - Never return an empty response. If you cannot find what the user is asking about, acknowledge it to the user.\n"
  vst_video_clip:
    _type: vst.video_clip
    vst_internal_url: ${VST_INTERNAL_URL}
    vst_external_url: ${VST_EXTERNAL_URL}
  vst_snapshot:
    _type: vst.snapshot
    vst_internal_url: ${VST_INTERNAL_URL}
    vst_external_url: ${VST_EXTERNAL_URL}
  vst_video_list:
    _type: vst.video_list
    vst_internal_url: ${VST_INTERNAL_URL}
  video_report_gen:
    _type: video_report_gen
    object_store: ${VSS_AGENT_OBJECT_STORE_TYPE}
    base_url: ${VSS_AGENT_REPORTS_BASE_URL}
    video_understanding_tool: video_understanding
    video_url_tool: vst_video_clip
    picture_url_tool: vst_snapshot
    vst_internal_url: ${VST_INTERNAL_URL}
    vst_external_url: ${VST_EXTERNAL_URL}
    vlm_prompt: 'Describe in detail what is happening in this video,

      including all visible people, vehicles, equipments, objects,

      actions, and environmental conditions.

      OUTPUT REQUIREMENTS:

      [timestamp-timestamp] Description of what is happening.

      EXAMPLE:

      [0.0s-4.0s] <description of the first event>

      [4.0s-12.0s] <description of the second event>

      '
    hitl_enabled: true
    hitl_prompt_llm: ${LLM_MODEL_TYPE:-nim}_llm
    hitl_vlm_prompt_template: "**VLM Prompt for Report Generation**\n\n**OPTIONS:**\n\n\u2022 Press Submit (empty) \u2192 Approve and generate report\n\n\u2022 Type a new prompt directly or paste current prompt and edit it manually\n\n\u2022 Type `/generate <description>` \u2192 AI creates a prompt based on your description\n\n\u2022 Type `/refine <instructions>` \u2192 AI modifies the current prompt\n\n\u2022 Type `/cancel` \u2192 Cancel report generation\n\nEnter your choice or press Submit to keep current value:\n"
    hitl_generate_system_prompt: 'You are a prompt engineer specializing in video analysis.

      Create a clear, detailed prompt for a Vision Language Model (VLM)

      that will analyze video footage and generate a report.


      Requirements:

      - Be specific about what to look for in the video

      - Include instructions to describe events with timestamps in chronological[Xs-Ys] format

      - Focus on the user''s described scenario/goals and create the prompt that will be understandable for the VLM

      - Keep the prompt concise but detailed


      Output ONLY the VLM prompt, no explanations.

      '
    hitl_refine_system_prompt: 'You are a prompt engineer specializing in video analysis.

      Modify the existing VLM prompt based on the user''s instructions.


      Requirements:

      - Preserve the timestamp format [Xs-Ys] requirement

      - Maintain the original prompt structure and content and add on to it the user''s requested changes


      Current prompt to modify:

      {current_prompt}


      Output ONLY the modified prompt, no explanations.

      # yamllint enable rule:line-length

      '
  report_agent:
    _type: report_agent
    log_level: INFO
    video_report_tool: video_report_gen
  knowledge_retrieval:
    _type: knowledge_retrieval
    backend: frag_api
    collection_name: ${KNOWLEDGE_COLLECTION:-default}
    top_k: 5
    generate_summary: false
    summary_model: ${LLM_MODEL_TYPE:-nim}_llm
    rag_url: ${RAG_SERVER_URL:-http://rag-server:8081/v1}
    ingest_url: ${RAG_INGEST_URL:-http://ingestor-server:8082/v1}
    api_key: ${RAG_API_KEY:-}
    verify_ssl: true
    timeout: 300
llms:
  nim_llm:
    _type: nim
    model_name: ${LLM_NAME}
    base_url: ${LLM_BASE_URL}/v1
    max_tokens: 4096
    temperature: 0.0
  openai_llm:
    _type: openai
    model_name: ${LLM_NAME}
    base_url: ${LLM_BASE_URL}/v1
    max_tokens: 4096
    temperature: 0.0
  vllm_llm:
    _type: openai
    model_name: ${LLM_NAME}
    base_url: ${LLM_BASE_URL}/v1
    max_tokens: 4096
    temperature: 0.0
    model_kwargs:
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
  nim_vlm:
    _type: nim
    model_name: ${VLM_NAME}
    base_url: ${VLM_BASE_URL}/v1
    temperature: 0.0
    max_tokens: 4096
  openai_vlm:
    _type: openai
    model_name: ${VLM_NAME}
    temperature: 0.0
    max_tokens: 4096
  vllm_vlm:
    _type: openai
    model_name: ${VLM_NAME}
    base_url: ${VLM_BASE_URL}/v1
    temperature: 0.0
    max_tokens: 4096
  rtvi_vlm:
    _type: openai
    model_name: nvidia/cosmos-reason2-8b
    base_url: ${RTVI_VLM_BASE_URL}/v1
    temperature: 0.0
    model_kwargs:
      extra_body:
        num_frames_per_second_or_fixed_frames_chunk: 20
        use_fps_for_chunking: false
        vlm_input_width: 1280
        vlm_input_height: 720
  eval_llm_judge:
    _type: nim
    model_name: ${EVAL_LLM_JUDGE_NAME}
    base_url: ${EVAL_LLM_JUDGE_BASE_URL}/v1
    max_tokens: 4096
    temperature: 0.0
workflow:
  _type: top_agent
  llm_name: ${LLM_MODEL_TYPE:-nim}_llm
  log_level: INFO
  max_iterations: 50
  llm_reasoning: false
  planning_enabled: true
  tool_names:
  - video_understanding
  - vst_video_clip
  - vst_snapshot
  - vst_video_list
  - knowledge_retrieval
  subagent_names:
  - report_agent
  prompt: "You are a routing agent for a video surveillance system. Your job is to route requests to the correct tool.\n## Routing Rules:\n  **vst_video_list**\n  - Videos can be added/removed from the backend system. dont rely on previous conversations for questions about available videos.\n  - If user ask to show a video not in the list from previous interactions, call this tool to verify if the video is available then call the appropriate tool to show the video or snapshot.\n  - Examples: \"What videos are available?\", \"List all available videos\" \"list sensors\"\n  **report_agent**\n  - Only call report_agent when user mentions \"report\" in the question.\n  - Don't use the report from previous interactions.\n  - CRITICAL: For multiple videos, pass them as a list in a SINGLE call (e.g., sensor_id=['video1', 'video2']). Do NOT make separate sequential calls.\n  - Examples: \"Generate a report for, \"Create an analysis report\", I need a safety report for this video\", \"Generate a report for video1 & video2\"\n  **video_understanding** - For any question about video content.\n  - CRITICAL: ALWAYS call video_understanding for question about video content of a video. You MUST NOT use conversation history to answer question about a video.\n  - Examples: \"what happens in the video?\", \"Was there any breach of safety protocol?\", \"Were there any vehicle collisions?\", \"Is the bridge in good condition?\"\n  **vst_video_clip** - For queries asking for showing videos (e.g., \"Let's show the videos just uploaded\"), call this tool in parallel with each video name as a separate input.\n  - CRITICAL: Always call vst_video_clip to get the URL even though the video clip for the same video has already been generated from previous interactions. DO NOT generate the URL yourself without calling vst_video_clip.\n  **vst_snapshot** - For queries asking for a snapshot of a video at a specific timestamp.\n  - CRITICAL: Always call vst_snapshot to get the URL even though the snapshot for the same video and at the same timestamp has already been generated from previous interactions. DO NOT generate the URL yourself without calling vst_snapshot.\n\n## Context: Use user's previous uploaded video if user doesn't specify the video name.\n\n\n**knowledge_retrieval** - For questions about ingested documents, SOPs,\nmanuals, written policies, or domain knowledge that is NOT video content.\n- Use when the user asks about company procedures, policies, named documents,\n  or any reference material that would have been ingested into the knowledge base.\n- Do NOT use for questions about video footage \u2014 use video_understanding instead.\n- Pass `filters` (e.g. {\"category\": \"safety\"}) to scope by document metadata\n  when the user constrains the search (\"only safety SOPs\", \"from policy docs\").\n- Examples: \"What does the safety SOP say about forklift operation?\",\n  \"Search the warehouse procedures for box stacking limits\",\n  \"Find the policy on visitor access\".\n"
  tool_call_prompt: 'TOOL CALL RULES:

    - ALWAYS include ALL required parameters when calling tools

    - If a tool call fails with a validation error, RETRY IMMEDIATELY: Fix the error and call the tool again with correct parameters.

    - Error Handling: if a tool fails more than 3 times, just return a summarized error message. Do not endlessly try again.

    - Video urls could contain suffix like _20250101_*, you should remove the suffix before matching to the video/sensor name.

    - Use video/sensor names instead of the url to call other tools.

    '
  response_format_prompt: "- Do not include phrases like \"I should\", \"Let me\", \"The user\".\n- Convert json to markdown format.\n  - EXCEPTION: For queries about listing sensors, output sensors as plain text, NOT as code blocks or markdown code.\n- Wrap urls in html tags. CRITICAL: ONLY do this when a url is EXACTLY the one returned from a tool call or the url is EXACTLY the same as one from the conversation history. NEVER generate urls yourself. NEVER modify an existing url to create a new url (e.g. changing timestamps, IDs, or any part of the url). If you need a url that wasn't returned by a tool call, you MUST call the appropriate tool to get it. Examples:\n  <video src=\"video_url\" alt=\"Video Name\">Video Name</video>\n  <image src=\"image_url\" alt=\"Image Name\">Image Name</image>\n"
  postprocessing:
    enabled: false
    validation_order:
    - - url_validator
    validators:
      url_validator:
        internal_ip: ${HOST_IP}
        timeout: 10.0
        feedback_template: 'The following URLs are not accessible: {issues}

          You have a hallucinated URL in the response, consider removing it or calling the appropriate tool to fetch the correct URL.

          '
eval:
  general:
    workflow_alias: ${WEAVE_WORKFLOW_ALIAS}
    output_dir: ${EVAL_OUTPUT_DIR:-${EVAL_DIR}/results}
    max_concurrency: 5
    dataset:
      _type: json
      file_path: ${DATASET_DIR:-${EVAL_DIR}}/${DATASET_FILE_NAME}
      structure:
        question_key: query
        answer_key: ground_truth
    profiler:
      compute_llm_metrics: true
  evaluators:
    trajectory_evaluator:
      _type: customized_trajectory_evaluator
      llm_name: eval_llm_judge
      evaluation_method_id: trajectory
      track_agent_selected_tools_only: true
      max_retries: 2
      llm_judge_reasoning: true
      custom_prompt_template_with_reference: "You are an expert evaluator comparing an AI agent's actual tool calls against the expected ground truth.\n\nQuestion: {question}\n\nExpected Tool Calls:\n{reference}\n\nActual Tool Calls:\n{agent_trajectory}\n\nAgent's Final Answer:\n{answer}\n\nEVALUATION CRITERIA:\n\n1. **Tool Selection** (most important):\n   - Compare the tool NAMES in actual vs expected.\n   - Each expected tool must appear in actual. Extra tools not in expected are unnecessary calls.\n\n2. **Parameter Accuracy**:\n   - For each matching tool, compare the parameter values.\n   - `user_prompt` (for `video_understanding`): If the ground truth contains a description like\n     \"<any question related to answering the user question>\", the agent's actual `user_prompt`\n     should be a reasonable question that is related to the user question.\n\n3. **Completeness, Order, and Efficiency** (use the `step` field to compare):\n   - Each tool call has a `step` number. Tools with the SAME step number are parallel calls\n     (order among them does not matter). Tools with DIFFERENT step numbers are sequential\n     (step 1 must happen before step 2, etc.).\n   - The agent must have called ALL expected tools in the correct order (tools called in a single step can be\n     called in different order). For each expected step, verify that all tools in that step appear in the\n     agent's actual calls at the same step.\n   - If actual tool calls are empty but expected is not empty, score 0.0.\n   - If the ground truth shows tools at the same step (i.e., parallel), but the agent called them at different\n     steps (i.e., sequentially), penalize for inefficiency.\n\nNOTE: If the ground truth contains a single call to video_understanding, and the agent calls an additional\nvst_video_list or vst_video_clip before the video_understanding or report_agent call and the\nvideo_understanding or report_agent call is correct, it should be considered as a success (1.0).\n\nNOTE: If step numbers in the actual tool calls have gaps (e.g., step 1 then step 3, skipping step 2),\nit means a tool call at the skipped step failed and the agent retried automatically (auto-recovery).\nPenalize only slightly for this (e.g., -0.1) since the agent did eventually recover and complete the task.\n\nSCORING GUIDELINES:\n- 1.0: All expected tools called with correct parameters\n- 0.8-0.9: All expected tools called, minor parameter differences\n- 0.6-0.7: Most expected tools called, or one missing/extra tool\n- 0.4-0.5: Some expected tools called but significant gaps\n- 0.0-0.3: Wrong tools called, or no tools called when expected\n\nThink through your evaluation carefully, then output only a single number (your score from\n0.0 to 1.0).\n"
      custom_prompt_template_without_reference: "You are an expert evaluator assessing an AI agent's performance on tool calling.\n\nConversation History (previous turns):\n{conversation_history}\n\nCurrent Question: {question}\n\nAvailable Tools and Their Schemas:\n{tool_schemas}\n\nAgent's Actions and Tool Calls:\n{agent_trajectory}\n\nAgent's Final Answer:\n{answer}\n\nIMPORTANT: If conversation history is provided, the current question may refer to context from\nprevious turns. Use the conversation history to understand what the agent should be acting on.\n\nEvaluation Criteria:\n1. **Tool Selection**: Did the agent select the appropriate tools for the task?\n2. **Parameter Accuracy**: Were tool parameters correct according to the tool schemas above?\nCheck that all parameters match the expected types, required fields, and descriptions.\n3. **Data Retrieval**: Did the agent successfully retrieve the necessary data? Sometimes the\ndata is not available, that should not be considered as a failure. As long as the tools are\ncalled correctly, it should be considered as a success.\n4. **Completeness**: Did the agent gather all required information to answer the question?\n5. **Efficiency**: Did the agent avoid unnecessary or redundant tool calls?\n\nUNDERSTANDING THE TRAJECTORY FORMAT:\n\nThe trajectory is a list of (action, result) pairs showing the agent's reasoning and tool usage:\n\n1. **Agent's Tool Selection Step**: When the tool name is an LLM model name\n   (e.g., \"nvidia/nvidia-nemotron-nano-9b-v2\"), this represents the agent deciding which tool to call.\n   The result shows which tools the agent chose.\n\n2. **Tool Execution Step**: When the tool name is an actual tool (e.g., \"video_understanding\",\n   \"vst_video_list\"), this shows the tool being executed and its result.\n\n3. **Final Answer**: The last entry in the trajectory contains the agent's final response to the user.\n\nNOTE: If the trajectory is empty, it means the agent answered directly without calling any tools.\nThis could happen if the agent used memory from previous conversation or the question was simple\nenough to answer directly.\n\nScoring Guidelines:\n- 1.0: Perfect execution - all criteria met, accurate answer\n- 0.8-0.9: Excellent - minor issues but correct answer\n- 0.6-0.7: Good - some issues but mostly correct\n- 0.4-0.5: Fair - significant issues, partially correct\n- 0.0-0.3: Poor - major issues, incorrect or incomplete answer\n\nThink through your evaluation carefully, then output only a single number (your score from\n0.0 to 1.0).\n"
    qa_evaluator:
      _type: customized_qa_evaluator
      llm_name: eval_llm_judge
      evaluation_method_id: qa
      max_retries: 2
      llm_judge_reasoning: true
      custom_prompt_template: "You are an expert evaluator assessing an AI Agent's response accuracy.\n\nQuestion Asked: {question}\n\nAgent's Answer: {answer}\n\nGround Truth Answer: {reference}\n\nEVALUATION TASK:\nCompare the agent's answer against the ground truth and determine if they are\nsemantically equivalent. Assign a nuanced score between 0.0 and 1.0.\n\nEVALUATION CRITERIA:\n\n1. **Factual Correctness**: Does the agent's answer convey the same factual information as the ground truth?\n   - For Yes/No questions: The boolean value must match exactly.\n   - For counting questions: The number must exactly match the ground truth.\n   - For temporal questions: Allow \xB15 seconds tolerance for timestamps.\n   - For descriptive questions: Key facts and details must align.\n\n2. **Completeness**: Does the agent's answer include all key information from the ground truth?\n   - Partial answers should receive partial credit.\n   - Additional correct details beyond ground truth are acceptable.\n\n3. **Semantic Equivalence**: Different phrasings of the same answer are acceptable.\n   - \"Yes\" and \"Yes, a worker dropped one box\" are equivalent for a Yes/No question.\n   - \"60 seconds\" and \"at the 1 minute mark\" are equivalent.\n   - \"No\" and \"The worker is not wearing a safety vest\" are equivalent.\n\nSCORING GUIDELINES:\n- 1.0: Perfect match - answer is factually correct and complete\n- 0.8-0.9: Essentially correct with minor omissions or slight imprecision\n- 0.6-0.7: Partially correct - captures main point but missing some details\n- 0.4-0.5: Mixed - some correct elements but significant errors or omissions\n- 0.2-0.3: Mostly incorrect but shows some understanding\n- 0.0-0.1: Completely wrong or irrelevant answer\n\nIMPORTANT NOTES:\n- Focus on SEMANTIC correctness, not exact text matching.\n\nOUTPUT:\nThink through your evaluation step by step, then output ONLY a single decimal number\n(your score from 0.0 to 1.0) on the final line.\n"
    report_evaluator:
      _type: report_evaluator
      eval_metrics_config_path: ${EVAL_DIR}/report_eval_metrics.yaml
      reference_base_dir: ${DATASET_DIR:-${EVAL_DIR}}/gt/
      evaluation_method_id: report
      object_store: local_object_store
      report_url_pattern: http://[^\s)]+/(vss_report_(?:[^/\s)]+_)?\d{8}_\d{6}\.md)
      include_vlm_output: false
      metric_configs:
        llm_judge:
          llm_name: eval_llm_judge
          max_retries: 2
          single_field_comparison_prompt: "You are an expert evaluator assessing semantic similarity between two responses.{field_context}\n\nReference: {reference}\n\nAgent-Generated Response: {actual}\n\nInstructions:\n- Compare the semantic meaning and content between Reference and Agent-Generated Response\n- For structured data (dicts/JSON): Compare field-by-field across the structure\n  * Account for missing fields (penalize incomplete responses)\n  * Account for extra fields (minor penalty for unexpected fields)\n  * Field names may differ, focus on matching content semantically\n\nGeneral Scoring Guidelines:\n- 1.0: Semantically identical or equivalent (same meaning, minor wording differences acceptable)\n- 0.8-0.9: Very similar with same key information, minor details may differ\n- 0.6-0.7: Mostly similar with same core meaning, but some details differ or are missing\n- 0.4-0.5: Partially similar, captures some aspects but missing important information\n- 0.2-0.3: Minimally similar, only tangentially related\n- 0.0-0.1: Completely different or contradictory\n\nConsider:\n- Semantic equivalence (e.g., \"03/10/2025\" vs \"March 10, 2025\")\n- Completeness of information (missing fields reduce score)\n- Factual accuracy\n- Extra fields in response (small penalty, unless completely wrong)\n- Ignore minor formatting or stylistic differences\n\nYou must respond ONLY with a single float number between 0.0 and 1.0.\n"
          multi_field_discovery_prompt: 'You are evaluating fields in a section of a generated report.


            Reference section:

            {reference_section}


            Actual fields to score:

            {actual_fields}


            INSTRUCTIONS:

            1. Score ONLY the TOP-LEVEL field names shown in "Actual fields to score"

            2. If a field contains nested content (dict/object), evaluate the ENTIRE structure as ONE score

            3. Compare each top-level field with the entire Reference section to find semantic matches


            Steps for each top-level field:

            - Compare the field name AND its content (including all nested data) with fields in the Reference section

            - If a match is found (even with different name), identify the matching reference field name

            - If no match exists in reference, set reference_field to null and score 0.0

            - For nested structures, compare the entire object holistically


            Scoring Guidelines:

            - 1.0: Perfect match with a reference field (all nested content matches)

            - 0.8-0.9: Very close match (minor differences in nested content)

            - 0.6-0.7: Good match (mostly correct, some nested fields differ)

            - 0.4-0.5: Partial match (some nested information correct)

            - 0.2-0.3: Poor match (major differences in nested structure)

            - 0.0: No corresponding field in reference or completely wrong

            '
embedders:
  nim_embedder:
    _type: nim
    model_name: ${EMBEDDER_NAME:-nvidia/llama-3.2-nv-embedqa-1b-v2}
    base_url: ${EMBEDDER_BASE_URL}/v1
