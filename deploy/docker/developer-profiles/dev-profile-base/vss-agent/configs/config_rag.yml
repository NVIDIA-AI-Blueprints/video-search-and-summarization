#
# Optional knowledge retrieval fragment for the base profile.
#
# When this file is composed alongside config.yml (e.g. by passing both to
# the NAT runner, or via a launcher that deep-merges the two), the base
# agent gains a `knowledge_retrieval` tool backed by the selected backend.
# With this fragment OMITTED, the profile deploys and behaves exactly as
# today — no knowledge retrieval, no extra dependencies pulled in.
#
# Two backends, pick one via `backend:`
#   frag_api  — HTTP to a deployed FRAG rag-server  (default)
#   frag_lib  — in-process via nvidia-rag>=2.4.0    (requires extra)

# Embedders section — declared here so frag_lib can reference it via
# EmbedderRef. Harmless when frag_api is used (NAT just registers the
# embedder; it isn't called unless the function asks for it).
embedders:
  nim_embedder:
    _type: nim
    model_name: ${EMBEDDER_NAME:-nvidia/llama-3.2-nv-embedqa-1b-v2}
    base_url: ${EMBEDDER_BASE_URL}/v1

functions:
  knowledge_retrieval:
    _type: knowledge_retrieval
    backend: frag_api
    collection_name: ${KNOWLEDGE_COLLECTION:-default}
    top_k: 5

    # Optional summarization pass over retrieved excerpts. Off by default;
    # when true, summary_model must reference an LLM in `llms:`.
    generate_summary: false
    summary_model: ${LLM_MODEL_TYPE:-nim}_llm

    # ---- frag_api fields (HTTP to deployed rag-server) ----------------------
    rag_url: ${RAG_SERVER_URL:-http://rag-server:8081/v1}
    ingest_url: ${RAG_INGEST_URL:-http://ingestor-server:8082/v1}
    api_key: ${RAG_API_KEY:-}
    verify_ssl: true
    timeout: 300

    # ---- frag_lib fields (uncomment to run nvidia-rag in-process) ----------
    # Switch backend above to `frag_lib`. Requires the optional dep:
    #   pip install vss_agents[nvidia_rag]
    # llm: ${LLM_MODEL_TYPE:-nim}_llm   # references llms.<name> in config.yml
    # embedder: nim_embedder            # references embedders.nim_embedder above
    # milvus_uri: ${MILVUS_URI:-http://milvus:19530}
    # reranker_top_k: 10
    # enable_citations: true
    # enable_guardrails: false

workflow:
  # The launcher deep-merges this list with config.yml's tool_names.
  tool_names:
  - knowledge_retrieval

  # Routing rules to append to the agent's `prompt`. The launcher must
  # concatenate this onto config.yml's prompt — naive YAML deep-merge
  # would replace the prompt string instead of extending it. See
  # top_agent's `prompt_extras` handling.
  prompt_extras: |
    **knowledge_retrieval** - For questions about ingested documents, SOPs,
    manuals, written policies, or domain knowledge that is NOT video content.
    - Use when the user asks about company procedures, policies, named documents,
      or any reference material that would have been ingested into the knowledge base.
    - Do NOT use for questions about video footage — use video_understanding instead.
    - Pass `filters` (e.g. {"category": "safety"}) to scope by document metadata
      when the user constrains the search ("only safety SOPs", "from policy docs").
    - Examples: "What does the safety SOP say about forklift operation?",
      "Search the warehouse procedures for box stacking limits",
      "Find the policy on visitor access".
