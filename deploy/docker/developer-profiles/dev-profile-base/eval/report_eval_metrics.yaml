Overall Report:
  method: average
  allow_dynamic_field_discovery: true
  fields:
    title:
      method: exact_match
    
    Basic Information:
      method: average
      allow_dynamic_field_discovery: false
      fields:
        Report Identifier:
          method: non_empty
        Date of Analysis:
          method: regex
        Time of Analysis:
          method: regex
        Reporting AI Agent:
          method: non_empty
        Video Source:
          method: exact_match
        Analysis Request:
          method: llm_judge
    
    Analysis Results:
      method: llm_judge
      allow_dynamic_field_discovery: false
