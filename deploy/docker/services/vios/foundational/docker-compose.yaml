services:
  centralizedb:
    image: ${POSTGRES_IMAGE}
    profiles: ["bp_wh_kafka_2d","bp_wh_redis_2d","bp_wh_2d","bp_wh_kafka_3d","bp_wh_redis_3d","bp_wh_kafka_mv3dt","bp_wh_redis_mv3dt","auto_calib_2d","auto_calib_3d","auto_calib_mv3dt","bp_developer_base_2d","bp_developer_search_2d","bp_developer_lvs_2d","bp_developer_alerts_2d_cv","bp_developer_alerts_2d_vlm"]
    user: "0:0"
    environment:
      - POSTGRES_USER=${CENTRALIZE_DB_USERNAME}
      - POSTGRES_DB=${CENTRALIZE_DB_NAME}
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - ${VST_VOLUME}/postgres/db:/var/lib/postgresql/data
      - ${VST_CONFIG_PATH:-${VSS_APPS_DIR}/services/vios/configs}/postgresql.conf:/etc/postgresql/postgresql.conf
      - ${VST_DATA_PATH}:/var/run/postgresql
    network_mode: host
    container_name: vss-vios-postgres
    restart: always
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "unix_socket_directories=/var/run/postgresql"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h /var/run/postgresql -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 2s

  vst-ingress:
    image: ${NGINX_IMAGE}
    profiles: ["bp_wh_kafka_2d","bp_wh_redis_2d","bp_wh_2d","bp_wh_kafka_3d","bp_wh_redis_3d","bp_wh_kafka_mv3dt","bp_wh_redis_mv3dt","auto_calib_2d","auto_calib_3d","auto_calib_mv3dt","bp_developer_base_2d","bp_developer_search_2d","bp_developer_lvs_2d","bp_developer_alerts_2d_cv","bp_developer_alerts_2d_vlm"]
    user: "0:0"
    environment:
      - VST_INGRESS_HTTP_PORT=${VST_INGRESS_HTTP_PORT}
    volumes:
      - ${VST_CONFIG_PATH:-${VSS_APPS_DIR}/services/vios/configs}/nginx-${VST_NGINX_MODE:-vst}.conf:/etc/nginx/nginx.conf:ro
      - ${VST_LOGS}/nginx_logs:/var/log/nginx
    network_mode: host
    container_name: vss-vios-ingress
    restart: always    # Nginx should always restart as it's critical for routing
    command: ["nginx", "-g", "daemon off;"]
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/$${VST_INGRESS_HTTP_PORT:-30888}'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 2s
    depends_on:
      sensor-ms:
        condition: service_healthy
        required: false
      sensor-ms-2d:
        condition: service_healthy
        required: false
      sensor-ms-3d:
        condition: service_healthy
        required: false
