include:
  - path: foundational/docker-compose.yaml
    env_file:
      - vst.env
  - path: initiator/docker-compose.yaml
    env_file:
      - vst.env
  - path: sdr/rtspserver/docker-compose.yaml
    env_file:
      - vst.env
  - path: sdr/recorder/docker-compose.yaml
    env_file:
      - vst.env
  - path: sdr/streamprocessing/docker-compose.yaml
    env_file:
      - vst.env

services:
  nvstreamer-2d:
    container_name: vss-vios-nvstreamer-2d
    image: nvcr.io/nvidia/vss-core/vss-vios-nvstreamer:${NVSTREAMER_IMAGE_TAG}
    user: "0:0"
    profiles:
      - bp_wh_2d
      - bp_wh_kafka_2d
      - bp_wh_redis_2d
      - bp_developer_search_2d
      - bp_developer_lvs_2d
      - bp_developer_alerts_2d_cv
      - bp_developer_alerts_2d_vlm
    entrypoint: ["/bin/bash", "-c", "if [ \"$$NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES\" = \"true\" ]; then /home/vst/vst_release/tools/user_additional_install.sh; fi && exec /home/vst/vst_release/launch_vst"]
    environment:
      - NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES=${NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES}
      - ADAPTOR=streamer
      - HTTP_PORT=${NVSTREAMER_HTTP_PORT}
    network_mode: "host"
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 2
      resources:
        reservations:
          devices:
          - capabilities: [gpu]
            device_ids: ["${RT_CV_DEVICE_ID:-0}"]
    volumes:
      - ${NVSTREAMER_2D_VST_CONFIG:-/dev/null}:/home/vst/vst_release/configs/vst_config.json
      - ${NVSTREAMER_2D_VST_STORAGE_CONFIG:-/dev/null}:/home/vst/vst_release/configs/vst_storage.json
      - $MDX_DATA_DIR/data_log/nvstreamer/vst_data:/home/vst/vst_release/vst_data
      - $MDX_SAMPLE_APPS_DIR/services/vios/scripts/user_additional_install.sh:/home/vst/vst_release/tools/user_additional_install.sh
    depends_on:
      broker-health-check:
        condition: service_completed_successfully
