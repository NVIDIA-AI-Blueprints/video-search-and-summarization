  dt-based-calibration:
    image: nvcr.io/nvidia/vss-core/vss-dt-based-calibration:3.1.0
    profiles: ["dt_based_calibration"]
    container_name: dt-based-calibration
    environment:
      - CARLA_HOST=carla-server
      - CARLA_PORT=2000
      - API_PORT=7865
      - ACCURACY_PORT=8000
      - GRADIO_DEMO_SERVER_PORT=7860
      - GRADIO_MANUAL_SERVER_PORT=7861
      - PYTHONUNBUFFERED=1
      - PGM_PATH=/opt/geoids/egm96-15.pgm
      - GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY
    ports:
      - "8080:8080"
      - "7865:7865"
      - "8000:8000"
      - "7860:7860"
      - "7861:7861"
    # depends_on:
    #   carla-server:
    #     condition: service_healthy
    networks:
      - carla-net
    restart: unless-stopped
networks:
  carla-net:
    driver: bridge
