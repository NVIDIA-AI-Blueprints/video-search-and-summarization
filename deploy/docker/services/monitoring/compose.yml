services:
  dcgm-exporter:
    image: nvidia/dcgm-exporter:3.3.6-3.4.2-ubuntu22.04
    container_name: dcgm-exporter
    profiles: ["dcgm-exporter"]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "9400:9400"
    restart: always

  prometheus:
    image: quay.io/prometheus/prometheus:v3.11.3
    container_name: prometheus
    profiles: ["prometheus"]
    volumes:
      - $MDX_SAMPLE_APPS_DIR/services/monitoring/config/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana:13.0.1-ubuntu
    container_name: grafana
    profiles: ["grafana"]
    ports:
      - "35000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - $MDX_SAMPLE_APPS_DIR/services/monitoring/config/grafana-dashboard:/etc/grafana/dashboards
      - $MDX_SAMPLE_APPS_DIR/services/monitoring/config/grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - $MDX_SAMPLE_APPS_DIR/services/monitoring/config/grafana-provisioning/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_USER=$GF_SECURITY_ADMIN_USER
      - GF_SECURITY_ADMIN_PASSWORD=$GF_SECURITY_ADMIN_PASSWORD
    restart: always

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1
    profiles: ["node-exporter"]
    ports:
      - "19100:9100"
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.0
    profiles: ["cadvisor"]
    ports:
      - "18080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: always

volumes:
  grafana-storage: