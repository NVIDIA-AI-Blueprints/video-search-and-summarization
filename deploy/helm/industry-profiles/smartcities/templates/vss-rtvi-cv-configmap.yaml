{{- $rtviRoot := index .Values "rtvi" | default dict }}
{{- $rtvi := index $rtviRoot "vss-rtvi-cv" | default dict }}
{{- if (index $rtvi "enabled") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vss.smc.rtviScriptsConfigMapName" . }}
  labels:
    app.kubernetes.io/name: vss-rtvi-cv
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- $ctxVals := merge (dict "global" (.Values.global | default dict)) $rtvi }}
{{- $ctx := dict "Values" $ctxVals "Release" .Release }}
data:
  ds-start.sh: |
{{ .Files.Get "configs/vss-rtvi-cv/smartcities/ds-start.sh" | indent 4 }}
  run_config-api-rtdetr-protobuf.txt: |
{{ tpl (.Files.Get "configs/vss-rtvi-cv/smartcities/run_config-api-rtdetr-protobuf.txt") $ctx | indent 4 }}
  rtdetr-960x544.txt: |
{{ .Files.Get "configs/vss-rtvi-cv/smartcities/rtdetr-960x544.txt" | indent 4 }}
  rtdetr-960x544-labels.txt: |
{{ .Files.Get "configs/vss-rtvi-cv/smartcities/rtdetr-960x544-labels.txt" | indent 4 }}
  config_triton_nvinferserver_gdino.txt: |
{{ .Files.Get "configs/vss-rtvi-cv/smartcities/config_triton_nvinferserver_gdino.txt" | indent 4 }}
  coco_classmap.txt: |
{{ .Files.Get "configs/vss-rtvi-cv/smartcities/coco_classmap.txt" | indent 4 }}
  cfg_kafka.txt: |
{{ .Files.Get "configs/vss-rtvi-cv/smartcities/cfg_kafka.txt" | indent 4 }}
{{- end }}
