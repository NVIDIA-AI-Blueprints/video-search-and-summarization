{{- $vssIngress := .Values.vssIngress | default dict }}
{{- $enabled := default false (index $vssIngress "enabled") }}
{{- $global := .Values.global | default dict }}
{{- $mainHost := coalesce (index $vssIngress "host") (index $global "externalHost") "" }}
{{- if and $enabled (ne $mainHost "") }}
{{- $kibanaHost := coalesce (index $vssIngress "kibanaHost") (printf "kibana.%s" $mainHost) }}
{{- $phoenixHost := (index $vssIngress "phoenixHost" | default "" | trim) }}
{{- $streamerHost := coalesce (index $vssIngress "streamerHost") (printf "streamer.%s" $mainHost) }}
{{- $analyticsUiHost := coalesce (index $vssIngress "analyticsUiHost") (printf "analytics-ui.%s" $mainHost) }}
{{- $infra := index .Values "infra" | default dict }}
{{- $kibanaVals := index $infra "kibana" | default dict }}
{{- $phoenixVals := index $infra "phoenix" | default dict }}
{{- $vios := index .Values "vios" | default dict }}
{{- $nvstreamerVals := index $vios "vss-vios-nvstreamer" | default dict }}
{{- $analytics := index .Values "analytics" | default dict }}
{{- $videoAnalyticsVals := index $analytics "vss-video-analytics-api" | default dict }}
{{- $alertBridgeVals := index .Values "vss-alert-bridge" | default dict }}
{{- $calibrationVals := index .Values "calibration-toolkit" | default dict }}
{{- $videoAnalyticsUiVals := index $analytics "video-analytics-ui" | default dict }}
{{- $kibanaEnabled := default false (index $kibanaVals "enabled") }}
{{- $phoenixEnabled := default false (index $phoenixVals "enabled") }}
{{- $streamerEnabled := default false (index $nvstreamerVals "enabled") }}
{{- $analyticsEnabled := default false (index $videoAnalyticsVals "enabled") }}
{{- $alertBridgeEnabled := default false (index $alertBridgeVals "enabled") }}
{{- $calibrationEnabled := default false (index $calibrationVals "enabled") }}
{{- $videoAnalyticsUiEnabled := default false (index $videoAnalyticsUiVals "enabled") }}
{{- $baVals := index $analytics "vss-behavior-analytics" | default dict }}
{{- $baEnabled := default false (index $baVals "enabled") }}
{{- $rtvi := index .Values "rtvi" | default dict }}
{{- $rtviSdrVals := index $rtvi "vss-rtvi-cv-sdr" | default dict }}
{{- $rtviSdrEnabled := default false (index $rtviSdrVals "enabled") }}
{{- $agent := index .Values "agent" | default dict }}
{{- $vaMcpVals := index $agent "vss-va-mcp" | default dict }}
{{- $vaMcpEnabled := default false (index $vaMcpVals "enabled") }}
{{- $hasRewrite := or $analyticsEnabled $alertBridgeEnabled $phoenixEnabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ printf "%s-vss-ingress" .Release.Name | trunc 63 | trimSuffix "-" }}
  labels:
    app.kubernetes.io/name: vss-ingress
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- if $hasRewrite }}
  annotations:
    haproxy.org/path-rewrite: |
{{- if $analyticsEnabled }}
      /video-analytics-api/(.*) /\1
{{- end }}
{{- if $alertBridgeEnabled }}
      /alert-bridge/(.*) /\1
{{- end }}
{{- if $phoenixEnabled }}
      /phoenix/(.*) /\1
      /phoenix /
{{- end }}
{{- end }}
spec:
  ingressClassName: {{ index $vssIngress "ingressClassName" | default "haproxy" }}
  rules:
    - host: {{ $mainHost }}
      http:
        paths:
          - path: /api/chat
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.smc.serviceShort" (dict "root" . "short" "vss-agent-ui") }}
                port:
                  number: {{ index $vssIngress "vssUiPort" | default 3000 }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.smc.serviceShort" (dict "root" . "short" "vss-agent") }}
                port:
                  number: {{ index $vssIngress "vssAgentPort" | default 8000 }}
          - path: /chat
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.smc.serviceShort" (dict "root" . "short" "vss-agent") }}
                port:
                  number: {{ index $vssIngress "vssAgentPort" | default 8000 }}
          - path: /websocket
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.smc.serviceShort" (dict "root" . "short" "vss-agent") }}
                port:
                  number: {{ index $vssIngress "vssAgentPort" | default 8000 }}
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.smc.serviceShort" (dict "root" . "short" "vss-agent") }}
                port:
                  number: {{ index $vssIngress "vssAgentPort" | default 8000 }}
          - path: /vst
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.smc.serviceShort" (dict "root" . "short" "vss-vios-ingress") }}
                port:
                  number: {{ index $vssIngress "vstIngressPort" | default 30888 }}
{{- if $analyticsEnabled }}
          - path: /video-analytics-api
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.smc.serviceShort" (dict "root" . "short" "vss-video-analytics-api") }}
                port:
                  number: {{ index $vssIngress "videoAnalyticsApiPort" | default 8081 }}
{{- end }}
{{- if $alertBridgeEnabled }}
          - path: /alert-bridge
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.smc.serviceShort" (dict "root" . "short" "vss-alert-bridge") }}
                port:
                  number: {{ index $vssIngress "alertBridgePort" | default 9080 }}
{{- end }}
{{- if $calibrationEnabled }}
          - path: /calibration
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.smc.serviceShort" (dict "root" . "short" "calibration-toolkit") }}
                port:
                  number: {{ index $vssIngress "calibrationPort" | default 8003 }}
{{- end }}
{{- if $phoenixEnabled }}
          - path: /phoenix
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.smc.serviceShort" (dict "root" . "short" "phoenix") }}
                port:
                  number: {{ index $vssIngress "phoenixPort" | default 6006 }}
{{- end }}
{{- if $baEnabled }}
          - path: /behavior-analytics
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.smc.serviceShort" (dict "root" . "short" "vss-behavior-analytics") }}
                port:
                  number: {{ index $vssIngress "behaviorAnalyticsPort" | default 8080 }}
{{- end }}
{{- if $rtviSdrEnabled }}
          - path: /perception-sdr
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.smc.serviceShort" (dict "root" . "short" "vss-rtvi-cv-sdr") }}
                port:
                  number: {{ index $vssIngress "perceptionSdrPort" | default 4001 }}
{{- end }}
{{- if $vaMcpEnabled }}
          - path: /va-mcp
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.smc.serviceShort" (dict "root" . "short" "vss-va-mcp") }}
                port:
                  number: {{ index $vssIngress "vaMcpPort" | default 9901 }}
{{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.smc.serviceShort" (dict "root" . "short" "vss-agent-ui") }}
                port:
                  number: {{ index $vssIngress "vssUiPort" | default 3000 }}
{{- if $kibanaEnabled }}
    - host: {{ $kibanaHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.smc.serviceShort" (dict "root" . "short" "kibana") }}
                port:
                  number: {{ index $vssIngress "kibanaPort" | default 5601 }}
{{- end }}
{{- if and $phoenixEnabled (ne $phoenixHost "") }}
    - host: {{ $phoenixHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.smc.serviceShort" (dict "root" . "short" "phoenix") }}
                port:
                  number: {{ index $vssIngress "phoenixPort" | default 6006 }}
{{- end }}
{{- if $streamerEnabled }}
    - host: {{ $streamerHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.smc.serviceShort" (dict "root" . "short" "vss-vios-nvstreamer") }}
                port:
                  number: {{ index $vssIngress "streamerPort" | default 31000 }}
{{- end }}
{{- if $videoAnalyticsUiEnabled }}
    - host: {{ $analyticsUiHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.smc.serviceShort" (dict "root" . "short" "video-analytics-ui") }}
                port:
                  number: {{ index $vssIngress "videoAnalyticsUiPort" | default 3002 }}
{{- end }}
{{- end }}
