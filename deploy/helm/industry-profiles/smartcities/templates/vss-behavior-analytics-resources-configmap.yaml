{{- $analyticsRoot := index .Values "analytics" | default dict }}
{{- $ba := index $analyticsRoot "vss-behavior-analytics" | default dict }}
{{- $rf := index $ba "resourceFiles" | default dict }}
{{- $cal := index $rf "calibration" | default dict }}
{{- $rn := index $rf "roadNetwork" | default dict }}
{{- if or (index $cal "enabled") (index $rn "enabled") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vss.subchartFullname" (dict "Values" .Values "Release" .Release "depKey" "vss-behavior-analytics" "chartName" "vss-behavior-analytics") }}-resources
  labels:
    app.kubernetes.io/name: vss-behavior-analytics
    app.kubernetes.io/instance: {{ .Release.Name }}
binaryData:
  {{- if (index $cal "enabled") }}
  calibration.json: {{ .Files.Get "configs/behavior-analytics/calibration.json" | b64enc }}
  {{- end }}
  {{- if (index $rn "enabled") }}
  road-network.json: {{ .Files.Get "configs/behavior-analytics/road-network.json" | b64enc }}
  {{- end }}
{{- end }}
