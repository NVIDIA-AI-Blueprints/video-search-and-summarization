{{- if and .Values.ngc.createSecrets .Values.ngc.apiKey }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.ngc.apiKeySecretName | default "ngc-api" }}
  labels:
    app.kubernetes.io/name: {{ include "vss.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  NGC_API_KEY: {{ .Values.ngc.apiKey | quote }}
  NGC_CLI_API_KEY: {{ .Values.ngc.apiKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.ngc.dockerSecretName | default "ngc-secret" }}
  labels:
    app.kubernetes.io/name: {{ include "vss.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ include "vss.ngcDockerConfigJson" . | b64enc }}
{{- end }}
