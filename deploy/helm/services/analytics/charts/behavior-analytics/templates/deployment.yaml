{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vss-behavior-analytics.fullname" . }}
  labels:
    {{- include "vss-behavior-analytics.labels" . | nindent 4 }}
    app.kubernetes.io/component: vss-behavior-analytics
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "vss-behavior-analytics.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: vss-behavior-analytics
  template:
    metadata:
      labels:
        {{- include "vss-behavior-analytics.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: vss-behavior-analytics
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $g := .Values.global | default dict }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- else if index $g "imagePullSecrets" }}
      imagePullSecrets:
        {{- toYaml (index $g "imagePullSecrets") | nindent 8 }}
      {{- end }}
      {{- if .Values.waitForDependencies.enabled }}
      {{- $pfx := default false (coalesce .Values.useReleaseNamePrefix (index $g "useReleaseNamePrefix")) }}
      {{- $kafkaDef := ternary (printf "%s-kafka-kafka" .Release.Name) "kafka-kafka" $pfx }}
      {{- $kafkaH := .Values.waitForDependencies.kafkaHost | default $kafkaDef }}
      initContainers:
        - name: wait-for-kafka
          image: {{ .Values.waitForDependencies.image.repository }}:{{ .Values.waitForDependencies.image.tag }}
          imagePullPolicy: {{ .Values.waitForDependencies.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka {{ $kafkaH }}:{{ .Values.waitForDependencies.kafkaPort }}"
              for i in $(seq 1 {{ .Values.waitForDependencies.maxRetries }}); do
                if nc -z {{ $kafkaH }} {{ .Values.waitForDependencies.kafkaPort }} 2>/dev/null; then
                  echo "Kafka is accepting connections"
                  exit 0
                fi
                echo "Attempt $i: waiting..."
                sleep {{ .Values.waitForDependencies.retryInterval }}
              done
              echo "Timeout waiting for Kafka"
              exit 1
      {{- end }}
      containers:
        - name: vss-behavior-analytics
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml (required "vss-behavior-analytics.command must be set when enabled" .Values.command) | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: vss-behavior-analytics-config
              mountPath: /resources/vss-behavior-analytics-config.json
              subPath: vss-behavior-analytics-config.json
              readOnly: true
      volumes:
        - name: vss-behavior-analytics-config
          configMap:
            name: {{ include "vss-behavior-analytics.fullname" . }}-config
{{- end }}
