{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vss-behavior-analytics.fullname" . }}
  labels:
    {{- include "vss-behavior-analytics.labels" . | nindent 4 }}
    app.kubernetes.io/component: vss-behavior-analytics
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "vss-behavior-analytics.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: vss-behavior-analytics
  template:
    metadata:
      labels:
        {{- include "vss-behavior-analytics.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: vss-behavior-analytics
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $g := .Values.global | default dict }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- else if index $g "imagePullSecrets" }}
      imagePullSecrets:
        {{- toYaml (index $g "imagePullSecrets") | nindent 8 }}
      {{- end }}
      containers:
        - name: vss-behavior-analytics
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml (required "vss-behavior-analytics.command must be set when enabled" .Values.command) | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: vss-behavior-analytics-config
              mountPath: /resources/vss-behavior-analytics-config.json
              subPath: vss-behavior-analytics-config.json
              readOnly: true
            {{- if .Values.resourceFiles.calibration.enabled }}
            - name: vss-behavior-analytics-resources
              mountPath: {{ .Values.resourceFiles.calibration.mountPath }}
              subPath: calibration.json
              readOnly: true
            {{- end }}
            {{- if .Values.resourceFiles.roadNetwork.enabled }}
            - name: vss-behavior-analytics-resources
              mountPath: {{ .Values.resourceFiles.roadNetwork.mountPath }}
              subPath: road-network.json
              readOnly: true
            {{- end }}
      volumes:
        - name: vss-behavior-analytics-config
          configMap:
            name: {{ include "vss-behavior-analytics.fullname" . }}-config
        {{- if or .Values.resourceFiles.calibration.enabled .Values.resourceFiles.roadNetwork.enabled }}
        - name: vss-behavior-analytics-resources
          configMap:
            name: {{ include "vss-behavior-analytics.fullname" . }}-resources
        {{- end }}
{{- end }}
