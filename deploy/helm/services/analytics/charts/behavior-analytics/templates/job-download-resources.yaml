{{- if and .Values.enabled .Values.downloadResourcesFromNgc }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vss-behavior-analytics.fullname" . }}-download-resources
  labels:
    {{- include "vss-behavior-analytics.labels" . | nindent 4 }}
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      {{- $g := .Values.global | default dict }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- else if index $g "imagePullSecrets" }}
      imagePullSecrets:
        {{- toYaml (index $g "imagePullSecrets") | nindent 8 }}
      {{- end }}
      containers:
        - name: download-resources
          image: {{ .Values.ngcDownload.image.repository }}:{{ .Values.ngcDownload.image.tag }}
          imagePullPolicy: {{ .Values.ngcDownload.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: NGC_CLI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ngcApiKeySecretName | default "ngc-api" }}
                  key: {{ .Values.ngcApiKeySecretKey | default "NGC_CLI_API_KEY" }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              export DEBIAN_FRONTEND=noninteractive
              echo "[INFO] Installing NGC CLI..."
              apt-get update -qq && apt-get install -y -qq wget unzip > /dev/null
              cd /tmp
              wget -q https://ngc.nvidia.com/downloads/ngccli_linux.zip -O ngccli_linux.zip
              unzip -q ngccli_linux.zip && chmod +x ngc-cli/ngc
              export PATH="/tmp/ngc-cli:$PATH"
              ngc --version
              echo "[INFO] Downloading resources from NGC..."
              DEST="/data/resources"
              {{- range .Values.ngcResourcesToDownload }}
              mkdir -p "${DEST}/$(dirname {{ .destPath | quote }})"
              ngc registry resource download-version {{ .resource | quote }} --org {{ $.Values.ngcOrg | default "nvidia" | quote }}
              mv {{ .sourcePath | quote }} "${DEST}/{{ .destPath }}"
              rm -rf $(dirname {{ .sourcePath | quote }})
              {{- end }}
              chmod -R a+r "${DEST}"
              echo "[INFO] Resources downloaded to ${DEST}"
          volumeMounts:
            - name: resources
              mountPath: /data/resources
      volumes:
        - name: resources
          persistentVolumeClaim:
            claimName: {{ include "vss-behavior-analytics.fullname" . }}-resources
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
