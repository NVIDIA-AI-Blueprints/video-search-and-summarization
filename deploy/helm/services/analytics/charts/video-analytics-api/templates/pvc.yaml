{{- if .Values.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "vss-video-analytics-api.fullname" . }}-files
  labels:
    app.kubernetes.io/name: vss-video-analytics-api
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.storage.size }}
  {{- if .Values.storage.storageClass }}
  storageClassName: {{ .Values.storage.storageClass }}
  {{- else if index .Values.global "storageClass" }}
  storageClassName: {{ index .Values.global "storageClass" }}
  {{- end }}
{{- end }}
