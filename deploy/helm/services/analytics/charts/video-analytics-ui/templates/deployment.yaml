{{- if .Values.enabled }}
{{- $g := .Values.global | default dict }}
{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix (index $g "useReleaseNamePrefix")) }}
{{- $eh := index $g "externalHost" | default "" | trim }}
{{- $es := index $g "externalScheme" | default "http" }}
{{- $vstIngress := ternary (printf "%s-vss-vios-ingress" .Release.Name) "vss-vios-ingress" $pfx }}
{{- $vaApi := ternary (printf "%s-vss-video-analytics-api" .Release.Name) "vss-video-analytics-api" $pfx }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "video-analytics-ui.fullname" . }}
  labels:
    {{- include "video-analytics-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "video-analytics-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "video-analytics-ui.selectorLabels" . | nindent 8 }}
    spec:
      {{- with ($g).imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: video-analytics-ui
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: APP_NAME
              value: {{ .Values.appName | quote }}
            - name: REACT_APP_OBTAIN_DYNAMIC_SERVICE_URLS
              value: "false"
            - name: REACT_APP_MEDIA_STREAMING_URL_BASE
              value: {{ ternary (printf "%s://%s/vst/api/v1" $es $eh) (printf "http://%s:30888/vst/api/v1" $vstIngress) (ne $eh "") | quote }}
            - name: REACT_APP_GOOGLE_MAPS_API_KEY
              value: {{ .Values.googleMapsApiKey | quote }}
            - name: REACT_APP_API_URL_BASE
              value: {{ ternary (printf "%s://%s/video-analytics-api" $es $eh) (printf "http://%s:8081" $vaApi) (ne $eh "") | quote }}
            - name: PORT
              value: {{ .Values.service.port | quote }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: ui-config
              mountPath: /config/{{ .Values.appName }}/default-ui-config.json
              subPath: default-ui-config.json
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: ui-config
          configMap:
            name: {{ include "video-analytics-ui.fullname" . }}-config
      restartPolicy: Always
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
