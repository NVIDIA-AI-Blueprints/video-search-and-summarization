{{- if and .Values.serviceAccount .Values.serviceAccount.create .Values.serviceAccount.rules }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "vss-summarization.serviceAccountName" . }}
  labels:
    {{- include "vss-summarization.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "vss-summarization.serviceAccountName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "vss-summarization.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
