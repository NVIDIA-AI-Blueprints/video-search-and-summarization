{{- if .Values.configMaps }}
{{- range $configMapName, $configMapData := .Values.configMaps }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vss-summarization.configMapName" (dict "root" $ "name" $configMapName) }}
  labels:
    app: {{ include "vss-summarization.fullname" $ }}
    chart: {{ include "vss-summarization.chart" $ }}
    release: {{ $.Release.Name }}
    heritage: {{ $.Release.Service }}
data:
{{- range $key, $value := $configMapData }}
  {{- if kindIs "string" $value }}
  {{ $key }}: |
{{ $value | indent 4 }}
  {{- else }}
  {{ $key }}: |
{{ $value | toYaml | indent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
