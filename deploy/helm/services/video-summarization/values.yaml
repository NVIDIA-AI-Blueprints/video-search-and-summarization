enabled: false
global: {}
image:
  repository: nvcr.io/nvstaging/vss-core/vss-video-summarization
  tag: 3.2.0-rc6-eec0a57
  pullPolicy: IfNotPresent
env:
  NVIDIA_API_KEY:
    value: ''
  OPENAI_API_KEY:
    value: ''
  HF_TOKEN:
    value: ''
  BACKEND_PORT:
    value: '38111'
  LVS_MCP_PORT:
    value: '38112'
  CA_RAG_CONFIG:
    value: /opt/nvidia/via/config/default_config.yaml
  DISABLE_CA_RAG:
    value: 'false'
  ENABLE_AUDIO:
    value: 'false'
  ENABLE_DENSE_CAPTION:
    value: ''
  LVS_ENABLE_MCP:
    value: 'true'
  VLM_SYSTEM_PROMPT:
    value: ''
  LVS_EMB_ENABLE:
    value: 'false'
  GRAPH_DB_USERNAME:
    value: neo4j
  GRAPH_DB_PASSWORD:
    value: passneo4j
  ARANGO_DB_USERNAME:
    value: root
  ARANGO_DB_PASSWORD:
    value: passroot
  VIA_ENABLE_OTEL:
    value: 'false'
  VIA_OTEL_ENDPOINT:
    value: http://otel-collector:4318
  VIA_OTEL_EXPORTER:
    value: console
  VIA_CTX_RAG_ENABLE_OTEL:
    value: 'false'
  VIA_CTX_RAG_EXPORTER:
    value: console
  VIA_CTX_RAG_OTEL_ENDPOINT:
    value: http://otel-collector:4318
  KAFKA_ENABLED:
    value: 'false'
  LVS_KAFKA_ENABLED:
    value: 'false'
  KAFKA_STRUCTURED_SUMMARY_TOPIC:
    value: structured-events-summary
  LVS_CAPTION_SOURCE:
    value: db
  LVS_DISABLE_DB_RESET_ON_REQUEST_DONE:
    value: 'true'
  VIA_DEV_API:
    value: 'true'
  VSS_LOG_LEVEL:
    value: DEBUG
  VSS_EXTRA_ARGS:
    value: ''
  RTVI_VLM_HOST:
    value: ''
  RTVI_VLM_PORT:
    value: ''
  RTVI_VLM_URL:
    value: ''
  LVS_LLM_HOST:
    value: ''
  LVS_LLM_PORT:
    value: ''
  LVS_LLM_BASE_URL:
    value: ''
  LVS_LLM_MODEL_NAME:
    value: ''
  KAFKA_BOOTSTRAP_SERVERS:
    value: ''
  EMBEDDING_NIM_HOST:
    value: ''
  EMBEDDING_NIM_PORT:
    value: ''
  LVS_EMB_BASE_URL:
    value: ''
  LVS_EMB_MODEL_NAME:
    value: ''
  ES_HOST:
    value: ''
  ES_PORT:
    value: ''
  LVS_DATABASE_BACKEND:
    value: ''
  MILVUS_DB_HOST:
    value: ''
  MILVUS_DB_GRPC_PORT:
    value: ''
  GRAPH_DB_HOST:
    value: ''
  GRAPH_DB_BOLT_PORT:
    value: ''
  ARANGO_DB_HOST:
    value: ''
  ARANGO_DB_PORT:
    value: ''
service:
  type: ClusterIP
  port: 38111
  ports:
  - port: 38111
    protocol: TCP
    name: backend
  - port: 38112
    protocol: TCP
    name: mcp
  name: vss-summarization
readinessProbe:
  httpGet:
    path: /v1/ready
    port: 38111
  periodSeconds: 10
  timeoutSeconds: 1
  successThreshold: 1
  failureThreshold: 100
sharedMemory:
  sizeLimit: ''
volumes:
- name: ca-rag-config
  configMap:
    name: ca-rag-config
    defaultMode: 420
    items:
    - key: config.yaml
      path: default_config.yaml
volumeMounts:
- name: ca-rag-config
  mountPath: /opt/nvidia/via/config
  readOnly: true
replicaCount: 1
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ''
  rules: []
  clusterRules: []
podAnnotations: {}
podLabels: {}
podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
securityContext: {}
ingress:
  enabled: false
  className: ''
  annotations: {}
  hosts: []
  tls: []
nodeSelector: {}
tolerations: []
affinity: {}
imagePullSecrets: []
statefulSet:
  enabled: false
configMaps:
  ca-rag-config:
    config.yaml: |
      ---
      # Environment configuration

      tools:
        vector_db:
          type: milvus
          params:
            host: !ENV ${MILVUS_DB_HOST}
            port: !ENV ${MILVUS_DB_GRPC_PORT}
          tools:
            embedding: nvidia_embedding

        elasticsearch_db:
          type: elasticsearch
          params:
            host: !ENV ${ES_HOST}
            port: !ENV ${ES_PORT}
            kafka_consumer_settle_secs: 5.0
          tools:
            embedding: nvidia_embedding

        graph_db_arango:
          type: arango
          params:
            host: !ENV ${ARANGO_DB_HOST}
            port: !ENV ${ARANGO_DB_PORT}
            username: !ENV ${ARANGO_DB_USERNAME}
            password: !ENV ${ARANGO_DB_PASSWORD}
          tools:
            embedding: nvidia_embedding

        graph_db:
          type: neo4j
          params:
            host: !ENV ${GRAPH_DB_HOST}
            port: !ENV ${GRAPH_DB_BOLT_PORT}
            username: !ENV ${GRAPH_DB_USERNAME}
            password: !ENV ${GRAPH_DB_PASSWORD}
          tools:
            embedding: nvidia_embedding

        summarization_llm:
          type: llm
          params:
            model: !ENV ${LVS_LLM_MODEL_NAME}
            base_url: !ENV ${LVS_LLM_BASE_URL}
            max_tokens: 10240
            temperature: 0.2
            top_p: 0.7
            api_key: !ENV ${NVIDIA_API_KEY}

        nvidia_embedding:
          type: embedding
          params:
            enable: !ENV ${LVS_EMB_ENABLE:false}
            model: !ENV ${LVS_EMB_MODEL_NAME}
            base_url: !ENV ${LVS_EMB_BASE_URL}
            api_key: !ENV ${NVIDIA_API_KEY}

      functions:
        summarization:
          type: vlm_structured_summarization_online
          params:
            time_overlap_threshold: 0.1
            max_events_per_batch: 50
            kafka_enabled: !ENV ${LVS_KAFKA_ENABLED:true}
          tools:
            db: !ENV ${LVS_DATABASE_BACKEND:elasticsearch_db}
            llm: summarization_llm

        summarization_online:
          type: vlm_structured_summarization_online
          params:
            time_overlap_threshold: 0.1
            max_events_per_batch: 50
            # Streaming RTVI -> Kafka -> Logstash -> ES path: raw_events are
            # written to ES by Logstash, so the online aggregator must read
            # them back from the database instead of expecting in-process
            # accumulation. Required for POST /aggregate_live_stream.
            kafka_enabled: !ENV ${LVS_KAFKA_ENABLED:true}
          tools:
            db: !ENV ${LVS_DATABASE_BACKEND:elasticsearch_db}
            llm: summarization_llm

      context_manager:
        functions:
          - summarization
          # Required for POST /aggregate_live_stream so the ctx-mgr subprocess
          # registers `summarization_online` as a dispatchable function. Without
          # this, ctx_mgr.call({"summarization_online": ...}) raises KeyError
          # via context_manager_handler._functions["summarization_online"].
          - summarization_online
