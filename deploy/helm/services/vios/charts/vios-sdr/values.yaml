enabled: false

image:
  repository: nvcr.io/nvidia/vss-core/sdr
  tag: "3.1.0"
  pullPolicy: IfNotPresent

replicas: 1

# clusterType: kubernetes (default) | docker. Use kubernetes so SDR uses K8s API; docker only if mounting host docker.sock.
clusterType: kubernetes

# Init containers: wait for Redis and vss-vios-streamprocessing before SDR starts (matches Compose depends_on). Set false to disable.
initContainers:
  enabled: true
  image: busybox:1.37.0

service:
  type: ClusterIP
  port: 4003

# For clusterType kubernetes: vss-vios-streamprocessing service port (WDM_TARGET_PORT_MAPPING, provisioning_address).
streamprocessingPort: "30001"

# K8s headless discovery (met-blueprints-3 sdr-envoy style). When set, SDR discovers workload via headless service DNS
# instead of StatefulSet API (avoids kubernetes.<namespace>.svc and "Unable to locate Statefulset" issues).
# Must match the headless service name from vss-vios-streamprocessing (statefulSetName). Empty = use StatefulSet API.
k8sHeadlessBaseDomain: "vss-vios-streamprocessing"
k8sHeadlessPodPort: "30001"

# Override when using external Redis or different release name.
redisServer: ""
redisPort: "6379"
wdmMsgKey: "vst.event"

# Namespace where SDR looks for StatefulSet "vss-vios-streamprocessing". Empty = use .Release.Namespace (e.g. vss-alert).
wdmNamespace: ""

# Kafka: bootstrap URL for logs and optional producer. Default: kafka-kafka:9092 (<release>-kafka-kafka:9092 if global.useReleaseNamePrefix). Leave empty to use default.
kafkaBootstrapUrl: ""
# Set true to enable Kafka producer (WDM_KFK_ENABLE). Default false so SDR runs without Kafka.
kafkaEnabled: false

# VST sensor endpoints (SDR talks to sensor for streams/status). Defaults use Release.Name.
vstStreamsEndpoint: ""
vstStatusEndpoint: ""

resources: {}
nodeSelector: {}
# K8s list; use [] not {} so parent merges (e.g. vios.*.tolerations: []) do not trigger Helm coalesce warnings.
tolerations: []
global: {}
