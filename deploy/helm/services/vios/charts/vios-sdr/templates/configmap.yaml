{{- if and .Values.enabled (not .Values.k8sHeadlessBaseDomain) }}
# Only needed when NOT using headless discovery (WDM_CLUSTER_CONFIG_FILE is set). With headless, SDR uses DNS only.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vss-vios-sdr.fullname" . }}-wdm-configs
  labels:
    app.kubernetes.io/name: vss-vios-sdr
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  {{- if eq .Values.clusterType "kubernetes" }}
  kubernetes_cluster_config.json: |
    {"vss-vios-streamprocessing-0":{"provisioning_address":"{{ include "vss-vios-sdr.peerShort" (dict "root" . "short" "vss-vios-streamprocessing") }}:{{ .Values.streamprocessingPort | default "30001" }}","process_type":"kubernetes"}}
  {{- else }}
  docker_cluster_config.json: |
    {{ .Files.Get "configs/docker_cluster_config.json" | indent 4 }}
  {{- end }}
{{- end }}
