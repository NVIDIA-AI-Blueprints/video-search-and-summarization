{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vss-vios-ingress.fullname" . }}
  labels:
    app.kubernetes.io/name: vss-vios-ingress
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: vss-vios-ingress
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vss-vios-ingress
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vss-vios-ingress
          image: {{ include "vss-vios-ingress.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          {{- $publicIp := .Values.externallyAccessibleIp | default (index (.Values.global | default dict) "externalHost" | default "" | trim) | default "127.0.0.1" }}
          {{- $hostIpEnv := .Values.hostIp }}
          {{- if not $hostIpEnv }}
          {{- if .Values.hostIpFollowsExternallyAccessibleIp }}
          {{- $hostIpEnv = $publicIp }}
          {{- else }}
          {{- $hostIpEnv = "127.0.0.1" }}
          {{- end }}
          {{- end }}
          env:
            - name: HOST_IP
              value: {{ $hostIpEnv | quote }}
            - name: EXTERNALLY_ACCESSIBLE_IP
              value: {{ $publicIp | quote }}
            - name: VST_INGRESS_HTTP_PORT
              value: {{ .Values.vstIngressHttpPort | default "30888" | quote }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-logs
              mountPath: /var/log/nginx
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "vss-vios-ingress.fullname" . }}-nginx
        - name: nginx-logs
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
