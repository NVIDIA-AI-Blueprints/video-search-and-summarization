{{- if .Values.enabled }}
{{- if and (index .Values "persistence") .Values.persistence.vstData.enabled .Values.persistence.vstData.create (not .Values.persistence.vstData.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "vss-vios-streamprocessing.sharedVstClaimVstData" . }}
  labels:
    app.kubernetes.io/name: vss-vios-streamprocessing
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes:
    - {{ .Values.persistence.vstData.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.persistence.vstData.size }}
  {{- $sc := .Values.persistence.vstData.storageClass | default (index .Values.global "storageClass") }}
  {{- if $sc }}
  storageClassName: {{ $sc }}
  {{- end }}
---
{{- end }}
{{- if and (index .Values "persistence") .Values.persistence.vstVideo.enabled .Values.persistence.vstVideo.create (not .Values.persistence.vstVideo.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "vss-vios-streamprocessing.sharedVstClaimVstVideo" . }}
  labels:
    app.kubernetes.io/name: vss-vios-streamprocessing
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes:
    - {{ .Values.persistence.vstVideo.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.persistence.vstVideo.size }}
  {{- $sc := .Values.persistence.vstVideo.storageClass | default (index .Values.global "storageClass") }}
  {{- if $sc }}
  storageClassName: {{ $sc }}
  {{- end }}
---
{{- end }}
{{- if and (index .Values "persistence") .Values.persistence.streamerVideos.enabled .Values.persistence.streamerVideos.create (not .Values.persistence.streamerVideos.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "vss-vios-streamprocessing.sharedVstClaimStreamerVideos" . }}
  labels:
    app.kubernetes.io/name: vss-vios-streamprocessing
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes:
    - {{ .Values.persistence.streamerVideos.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.persistence.streamerVideos.size }}
  {{- $sc := .Values.persistence.streamerVideos.storageClass | default (index .Values.global "storageClass") }}
  {{- if $sc }}
  storageClassName: {{ $sc }}
  {{- end }}
{{- end }}
{{- end }}
