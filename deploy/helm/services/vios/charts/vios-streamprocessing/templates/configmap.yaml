{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vss-vios-streamprocessing.fullname" . }}-configs
  labels:
    app.kubernetes.io/name: vss-vios-streamprocessing
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  vst_config.json: |
{{- $g := .Values.global | default dict }}
{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix (index $g "useReleaseNamePrefix")) }}
{{- $redisH := ternary (printf "%s-redis" .Release.Name) "redis" $pfx }}
{{- $kafkaH := ternary (printf "%s-kafka-kafka" .Release.Name) "kafka-kafka" $pfx }}
{{- $esH := ternary (printf "%s-elasticsearch" .Release.Name) "elasticsearch" $pfx }}
{{- $redisAddr := .Values.redisServerAddress | default (printf "%s:6379" $redisH) }}
{{- $kafkaAddr := .Values.kafkaServerAddress | default (printf "%s:9092" $kafkaH) }}
{{- $videoMeta := .Values.videoMetadataServerUrl | default (printf "http://%s:9200/mdx-raw*" $esH) }}
{{- $cloudStorage := .Values.cloudStorageEndpoint | default "http://127.0.0.1:9000" }}
{{- $mqttAddr := .Values.mqttBrokerAddress | default "tcp://172.17.0.1:1883" }}
{{ .Files.Get "configs/vst_config.json" | replace "__REDIS_ADDRESS__" $redisAddr | replace "__KAFKA_ADDRESS__" $kafkaAddr | replace "__VIDEO_METADATA_SERVER__" $videoMeta | replace "__CLOUD_STORAGE_ENDPOINT__" $cloudStorage | replace "__MQTT_BROKER_ADDRESS__" $mqttAddr | indent 4 }}
  adaptor_config.json: |
{{ .Files.Get "configs/adaptor_config.json" | indent 4 }}
  vst_storage.json: |
{{ .Files.Get "configs/vst_storage.json" | indent 4 }}
  rtsp_streams.json: |
{{ .Files.Get "configs/rtsp_streams.json" | indent 4 }}
{{- end }}
