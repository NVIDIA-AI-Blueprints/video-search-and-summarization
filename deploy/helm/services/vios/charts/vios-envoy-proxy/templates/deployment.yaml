{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vss-vios-envoy-proxy.fullname" . }}
  labels:
    app.kubernetes.io/name: vss-vios-envoy-proxy
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: vss-vios-envoy-proxy
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vss-vios-envoy-proxy
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- $g := .Values.global | default dict }}
      {{- $pfx := default false (coalesce .Values.useReleaseNamePrefix (index $g "useReleaseNamePrefix")) }}
      {{- $redisH := ternary (printf "%s-redis" .Release.Name) "redis" $pfx }}
      {{- $kafkaH := ternary (printf "%s-kafka-kafka" .Release.Name) "kafka-kafka" $pfx }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.initContainers (ne false .Values.initContainers.enabled) }}
      initContainers:
        - name: wait-redis
          image: {{ .Values.initContainers.image | default "busybox:1.37.0" }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z -w 2 {{ .Values.redisServer | default $redisH }} {{ .Values.redisPort | default "6379" }}; do echo "Waiting for Redis..."; sleep 2; done
      {{- end }}
      containers:
        - name: vss-vios-envoy-proxy
          image: {{ include "vss-vios-envoy-proxy.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            {{- toYaml .Values.env | nindent 12 }}
            - name: WDM_WL_REDIS_SERVER
              value: {{ .Values.redisServer | default $redisH | quote }}
            - name: WDM_WL_REDIS_PORT
              value: {{ .Values.redisPort | default "6379" | quote }}
            - name: WDM_KFK_BOOTSTRAP_URL
              value: {{ .Values.kafkaBootstrapUrl | default (printf "%s:9092" $kafkaH) | quote }}
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
              readOnly: true
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: envoy-config
          configMap:
            name: {{ include "vss-vios-envoy-proxy.fullname" . }}-envoy
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
