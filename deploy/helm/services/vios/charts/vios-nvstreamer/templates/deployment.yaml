{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vss-vios-nvstreamer.fullname" . }}
  labels:
    app.kubernetes.io/name: vss-vios-nvstreamer
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: vss-vios-nvstreamer
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vss-vios-nvstreamer
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vss-vios-nvstreamer
          image: {{ include "vss-vios-nvstreamer.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/bash", "-c", "if [ \"$$NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES\" = \"true\" ]; then /home/vst/vst_release/tools/user_additional_install.sh; fi && exec /home/vst/vst_release/launch_vst"]
          env:
            - name: ADAPTOR
              value: {{ .Values.env.ADAPTOR | quote }}
            - name: HTTP_PORT
              value: {{ .Values.env.HTTP_PORT | quote }}
            - name: NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES
              value: {{ .Values.env.NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          volumeMounts:
            - name: config
              mountPath: /home/vst/vst_release/configs/vst_config.json
              subPath: vst_config.json
            - name: config
              mountPath: /home/vst/vst_release/configs/vst_storage.json
              subPath: vst_storage.json
            - name: streamer-videos
              mountPath: /home/vst/vst_release/streamer_videos
            - name: vst-data
              mountPath: /home/vst/vst_release/vst_data
            - name: user-install-script
              mountPath: /home/vst/vst_release/tools/user_additional_install.sh
              subPath: user_additional_install.sh
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "vss-vios-nvstreamer.fullname" . }}-config
        - name: user-install-script
          configMap:
            name: {{ include "vss-vios-nvstreamer.fullname" . }}-user-install-script
            defaultMode: 493
        - name: streamer-videos
          emptyDir: {}
        - name: vst-data
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
