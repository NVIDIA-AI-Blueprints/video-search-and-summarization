{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vss-vios-nvstreamer.fullname" . }}-config
  labels:
    app.kubernetes.io/name: vss-vios-nvstreamer
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  vst_config.json: |
{{- $g := .Values.global | default dict }}
{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix (index $g "useReleaseNamePrefix")) }}
{{- $kafkaAddr := .Values.kafkaServerAddress | default (ternary (printf "%s-kafka-kafka:9092" .Release.Name) "kafka-kafka:9092" $pfx) }}
{{- $redisAddr := .Values.redisServerAddress | default (ternary (printf "%s-redis:6379" .Release.Name) "redis:6379" $pfx) }}
{{- $videoMeta := .Values.videoMetadataServerUrl | default (ternary (printf "http://%s-elasticsearch:9200/mdx-raw*" .Release.Name) "http://elasticsearch:9200/mdx-raw*" $pfx) }}
{{ .Files.Get "configs/vst-config.json" | replace "__KAFKA_ADDRESS__" $kafkaAddr | replace "__REDIS_ADDRESS__" $redisAddr | replace "__VIDEO_METADATA_SERVER__" $videoMeta | indent 4 }}
  vst_storage.json: |
{{ .Files.Get "configs/vst-storage.json" | indent 4 }}
{{- end }}
