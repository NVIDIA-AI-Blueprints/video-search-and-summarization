{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vss-rtvi-vlm.fullname" . }}
  labels:
    app.kubernetes.io/name: vss-rtvi-vlm
    app.kubernetes.io/instance: {{ .Release.Name }}
  {{- if .Values.ingress.enabled }}
  # Per-Service haproxy.org annotations apply only to this backend. Pin
  # each x-stream-id to a single vss-rtvi-vlm replica; UUID-fallback for
  # missing-header requests so non-streaming traffic scatters.
  annotations:
    haproxy.org/load-balance: {{ printf "hdr(%s)" .Values.ingress.hashHeader | quote }}
    haproxy.org/hash-type: "consistent"
    haproxy.org/backend-config-snippet: |
      http-request set-header {{ .Values.ingress.hashHeader }} %[uuid()] if !{ req.hdr({{ .Values.ingress.hashHeader }}) -m found }
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: vss-rtvi-vlm
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
