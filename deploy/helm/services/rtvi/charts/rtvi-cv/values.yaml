enabled: false
profileMode: alerts

global: {}
imagePullSecrets:
  - name: ngc-docker-reg-secret
scripts:
  create: false
  existingConfigMap: ""
  data: {}

image:
  repository: nvcr.io/nvstaging/vss-core/vss-rt-cv
  tag: "3.2.0-26.04.2"
  pullPolicy: IfNotPresent

replicas: 1
statefulSetName: "vss-rtvi-cv"
workingDir: /opt/nvidia/deepstream/deepstream/sources/apps/sample_apps/metropolis_perception_app
runtimeClassName: ""

service:
  port: 9010
  type: ClusterIP
httpPort: 9000

# Optional HAProxy Ingress with consistent-hash routing on x-stream-id.
# When enabled, every request carrying the same x-stream-id header value
# is routed to the same vss-rtvi-cv pod, which is required for the
# DeepStream pipeline state to stay coherent across the stream lifecycle.
# Requires the HAProxy Technologies kubernetes-ingress controller (the
# same controller the dev-profile-* umbrellas already assume).
ingress:
  enabled: false
  className: haproxy
  hashHeader: x-stream-id
  # hosts: optional list of host/path rules. Defaults to a single
  # path-based rule on / with no host (matches any host).
  # Example:
  #   hosts:
  #     - host: rtvi-cv.example.com
  #       paths:
  #         - path: /
  #           pathType: Prefix
  hosts: []
  # Extra annotations merged into the Ingress (e.g. timeouts, TLS).
  annotations: {}

streamType: "kafka"
modelType: "cnn"
otelSdkDisabled: "true"
otelServiceName: "rtvi-cv"
deepstreamEnableSensorIdExtraction: "1"
gstEnableCustomParserModifications: "1"
hfHubOffline: "0"
transformersOffline: "0"

env:
  MODEL_NAME_2D: "GDINO"
  MODEL_TYPE: "cnn"
  NUM_SENSORS: "1"
  STREAM_TYPE: "kafka"

kafka:
  bootstrapServers: ""
kafkaBrokerConnStr: ""

# Rare: set true so PVC size comes only from values (may trigger resize). Default false = match existing claim when present.
forceModelsStorageFromValues: false

modelsVolume: {}
downloadModelsFromNgc: true
downloadModelsFromNgcWaitSeconds: 900
ngcApiKeySecretName: "ngc-api"
ngcApiKeySecretKey: "NGC_CLI_API_KEY"
ngcOrg: "nvidia"
ngcDownload:
  image:
    repository: docker.io/library/ubuntu
    tag: "22.04"
    pullPolicy: IfNotPresent
ngcModelsToDownload:
  []

modelsPvc:
  create: false
  size: 50Gi
  storageClass: ""
# Per-model metadata (onnx filenames, infer dims, etc.) is profile-specific and
# should be defined in each profile values/template (e.g. dev-profile-search).

persistence:
  storageClass: ""
  models:
    size: 50Gi

resources:
  limits:
    nvidia.com/gpu: 1
  requests:
    nvidia.com/gpu: 1

nodeSelector: {}
tolerations: []
