enabled: false
profileMode: alerts

global: {}
imagePullSecrets:
  - name: ngc-docker-reg-secret
scripts:
  create: false
  existingConfigMap: ""
  data: {}

image:
  repository: nvcr.io/nvstaging/vss-core/vss-rt-cv
  tag: "3.2.0-26.04.2"
  pullPolicy: IfNotPresent

replicas: 1
statefulSetName: "vss-rtvi-cv"
workingDir: /opt/nvidia/deepstream/deepstream/sources/apps/sample_apps/metropolis_perception_app
runtimeClassName: ""

service:
  port: 9010
  type: ClusterIP
httpPort: 9000

# Opt-in stream-affinity routing for vss-rtvi-cv via HAProxy
# consistent-hash on x-stream-id. When enabled, the developer-profile
# umbrella ingress (dev-profile-search, dev-profile-lvs, …) renders a
# /rtvi-cv path rule, and this Service carries haproxy.org annotations
# scoped to its own backend (load-balance, hash-type, UUID fallback).
# Same x-stream-id deterministically routes to the same vss-rtvi-cv pod
# so DeepStream pipeline state stays coherent for the stream lifetime.
# Requires the HAProxy Technologies kubernetes-ingress controller (the
# same controller the dev-profile-* umbrellas already assume).
ingress:
  enabled: false
  hashHeader: x-stream-id

streamType: "kafka"
modelType: "cnn"
otelSdkDisabled: "true"
otelServiceName: "rtvi-cv"
deepstreamEnableSensorIdExtraction: "1"
gstEnableCustomParserModifications: "1"
hfHubOffline: "0"
transformersOffline: "0"

env:
  MODEL_NAME_2D: "GDINO"
  MODEL_TYPE: "cnn"
  NUM_SENSORS: "1"
  STREAM_TYPE: "kafka"

kafka:
  bootstrapServers: ""
kafkaBrokerConnStr: ""

# Rare: set true so PVC size comes only from values (may trigger resize). Default false = match existing claim when present.
forceModelsStorageFromValues: false

modelsVolume: {}
downloadModelsFromNgc: true
downloadModelsFromNgcWaitSeconds: 900
ngcApiKeySecretName: "ngc-api"
ngcApiKeySecretKey: "NGC_CLI_API_KEY"
ngcOrg: "nvidia"
ngcDownload:
  image:
    repository: docker.io/library/ubuntu
    tag: "22.04"
    pullPolicy: IfNotPresent
ngcModelsToDownload:
  []

modelsPvc:
  create: false
  size: 50Gi
  storageClass: ""
# Per-model metadata (onnx filenames, infer dims, etc.) is profile-specific and
# should be defined in each profile values/template (e.g. dev-profile-search).

persistence:
  storageClass: ""
  models:
    size: 50Gi

resources:
  limits:
    nvidia.com/gpu: 1
  requests:
    nvidia.com/gpu: 1

nodeSelector: {}
tolerations: []
