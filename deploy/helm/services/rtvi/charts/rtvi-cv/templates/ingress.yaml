# Optional Ingress that fronts vss-rtvi-cv with HAProxy consistent-hash
# routing on the x-stream-id header. Enables horizontal scaling of CV
# workers while keeping each stream pinned to one pod for the lifetime
# of the stream (DeepStream pipeline state lives in a single replica).
#
# Annotations are for the HAProxy Technologies kubernetes-ingress
# controller (haproxy.org/* — already used by the developer-profile
# umbrella ingresses).
{{- if and .Values.enabled .Values.ingress.enabled }}
{{- $svcPort := ternary .Values.service.port .Values.httpPort (eq .Values.profileMode "alerts") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "vss-rtvi-cv.fullname" . }}
  labels:
    app.kubernetes.io/name: vss-rtvi-cv
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    # Hash backend selection by the named request header so the same
    # x-stream-id deterministically routes to the same vss-rtvi-cv pod.
    haproxy.org/load-balance: "hdr({{ .Values.ingress.hashHeader }})"
    # Karger consistent hashing — only ~1/N stream-ids remap when a pod
    # joins/leaves the ring.
    haproxy.org/hash-type: "consistent"
    # Fallback for callers that did not set the header (health checks,
    # admin endpoints, etc): inject a per-request UUID so those requests
    # scatter across the pool instead of all collapsing onto one pod
    # (consistent-hash on empty string is deterministic, not random).
    haproxy.org/backend-config-snippet: |
      http-request set-header {{ .Values.ingress.hashHeader }} %[uuid()] if !{ req.hdr({{ .Values.ingress.hashHeader }}) -m found }
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ default "haproxy" .Values.ingress.className | quote }}
  rules:
    {{- $hosts := .Values.ingress.hosts | default (list (dict "host" "" "paths" (list (dict "path" "/" "pathType" "Prefix")))) }}
    {{- range $hosts }}
    - {{- with .host }}
      host: {{ . | quote }}
      {{- end }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path | default "/" }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "vss-rtvi-cv.fullname" $ }}
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
{{- end }}
