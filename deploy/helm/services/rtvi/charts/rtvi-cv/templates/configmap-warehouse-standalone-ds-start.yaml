{{- if and .Values.enabled (or (eq .Values.profileMode "standalone-2d") (eq .Values.profileMode "standalone-3d")) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vss-rtvi-cv.fullname" . }}-warehouse-standalone-ds-start
  labels:
    {{- include "vss-rtvi-cv.labels" . | nindent 4 }}
data:
  ds-start.sh: |
{{ .Files.Get "files/warehouse-standalone-ds-start.sh" | nindent 4 }}
{{- end }}
