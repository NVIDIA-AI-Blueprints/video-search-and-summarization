{{- if and .Values.enabled (eq .Values.profileMode "alerts") (or .Values.modelsPvc.create .Values.downloadModelsFromNgc) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "vss-rtvi-cv.fullname" . }}-models
  labels:
    app.kubernetes.io/name: vss-rtvi-cv
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ include "vss-rtvi-cv.effectiveAlertsModelsStorage" . }}
  {{- $sc := .Values.modelsPvc.storageClass | default (index .Values.global "storageClass") }}
  {{- with $sc }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
{{- if and .Values.enabled (eq .Values.profileMode "search") }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "vss-rtvi-cv.fullname" . }}-models
  labels:
    {{- include "vss-rtvi-cv.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ include "vss-rtvi-cv.effectiveSearchModelsStorage" . }}
{{- end }}
