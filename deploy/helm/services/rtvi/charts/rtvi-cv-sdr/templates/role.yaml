{{- if and .Values.enabled .Values.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "vss-rtvi-cv-sdr.fullname" . }}
  labels:
    app.kubernetes.io/name: vss-rtvi-cv-sdr
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  # SDR Kubernetes provisioner needs to list/get pods to manage vss-rtvi-cv workload
  - apiGroups: [""]
    resources: ["pods", "pods/status"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # App lists StatefulSets and patches scale (patch_namespaced_stateful_set_scale)
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["statefulsets/scale"]
    verbs: ["get", "patch", "update"]
{{- end }}
