{{- if and .Values.enabled (not .Values.k8sHeadlessBaseDomain) }}
# Only needed when NOT using headless discovery (WDM_CLUSTER_CONFIG_FILE is set). With headless, SDR uses DNS only.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vss-rtvi-cv-sdr.fullname" . }}-config
  labels:
    app.kubernetes.io/name: vss-rtvi-cv-sdr
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  {{- if eq .Values.clusterType "kubernetes" }}
  {{- $g := .Values.global | default dict }}
  {{- $pfx := default false (coalesce .Values.useReleaseNamePrefix (index $g "useReleaseNamePrefix")) }}
  {{- $addr := .Values.perceptionProvisioningAddress | default (ternary (printf "%s-vss-rtvi-cv:9010" .Release.Name) "vss-rtvi-cv:9010" $pfx) }}
  kubernetes_cluster_config.json: |
    {"vss-rtvi-cv-0":{"provisioning_address":{{ $addr | quote }},"process_type":"kubernetes"}}
  {{- else }}
  docker_cluster_config.json: |
{{ tpl (.Files.Get "configs/docker_cluster_config.json") . | indent 4 }}
  {{- end }}
{{- end }}
