{{- if and .Values.enabled .Values.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "vss-rtvi-cv-sdr.fullname" . }}
  labels:
    app.kubernetes.io/name: vss-rtvi-cv-sdr
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "vss-rtvi-cv-sdr.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name | default (include "vss-rtvi-cv-sdr.fullname" .) }}
    namespace: {{ .Release.Namespace }}
{{- end }}
