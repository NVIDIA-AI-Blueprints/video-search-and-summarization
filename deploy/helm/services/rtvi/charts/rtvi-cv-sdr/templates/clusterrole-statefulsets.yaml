{{- if and .Values.enabled .Values.serviceAccount.create }}
# ClusterRole so the app can list/watch StatefulSets in any namespace; namespaced Role covers pods in release namespace (use NAMESPACE so app watches release ns).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "vss-rtvi-cv-sdr.fullname" . }}-statefulsets
  labels:
    app.kubernetes.io/name: vss-rtvi-cv-sdr
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets", "statefulsets/scale"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "vss-rtvi-cv-sdr.fullname" . }}-statefulsets
  labels:
    app.kubernetes.io/name: vss-rtvi-cv-sdr
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "vss-rtvi-cv-sdr.fullname" . }}-statefulsets
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name | default (include "vss-rtvi-cv-sdr.fullname" .) }}
    namespace: {{ .Release.Namespace }}
{{- end }}
