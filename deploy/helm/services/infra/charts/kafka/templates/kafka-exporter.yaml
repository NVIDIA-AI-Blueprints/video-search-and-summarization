{{ if .Values.exporter.enabled }}
# Prometheus Kafka exporter – scraped by Prometheus via pod annotations.
# Source: other-manifests/kafka-exporter.yml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kafka.exporterIdent" . }}
  labels:
    app: {{ include "kafka.exporterIdent" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "kafka.exporterIdent" . }}
  template:
    metadata:
      labels:
        app: {{ include "kafka.exporterIdent" . }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.exporter.port | quote }}
        prometheus.io/path: "/metrics"
    spec:
      {{- with .Values.exporter.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: kafka-exporter
          image: {{ .Values.exporter.image }}
          ports:
            - containerPort: {{ .Values.exporter.port }}
          args:
            - "--kafka.server={{ include "kafka.brokerServiceHost" . }}:{{ .Values.service.port }}"
          {{- with .Values.exporter.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kafka.exporterIdent" . }}-svc
  labels:
    app: {{ include "kafka.exporterIdent" . }}
spec:
  selector:
    app: {{ include "kafka.exporterIdent" . }}
  ports:
    - port: {{ .Values.exporter.port }}
      targetPort: {{ .Values.exporter.port }}
  type: ClusterIP
{{- end }}
