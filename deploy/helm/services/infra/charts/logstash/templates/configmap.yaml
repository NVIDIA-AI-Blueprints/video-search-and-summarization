apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "logstash.fullname" . }}-logstash-config
  labels:
    {{- include "logstash.labels" . | nindent 4 }}
data:
  logstash.yml: |
    pipeline.workers: 1
    pipeline.ordered: true
    pipeline.ecs_compatibility: disabled
    api.http.host: "0.0.0.0"
  pipelines.yml: |
    - pipeline.id: mdx-kafka
      path.config: "/usr/share/logstash/pipeline/mdx-kafka-logstash.conf"

    {{- if and (eq .Values.streamType "kafka") .Values.lvs.enabled }}
    - pipeline.id: mdx-kafka-lvs
      path.config: "/usr/share/logstash/pipeline/mdx-kafka-lvs-logstash.conf"
    {{- end }}
  mdx-kafka-logstash.conf: |
    input {
      kafka {
        type => "mdx-raw"
        consumer_threads => 4
        topics => ["mdx-raw"]
        decorate_events => true
        auto_offset_reset => "latest"
        group_id => "logstash"
        key_deserializer_class => "org.apache.kafka.common.serialization.StringDeserializer"
        value_deserializer_class => "org.apache.kafka.common.serialization.ByteArrayDeserializer"
        codec => protobuf {
          class_name => "nv.Frame"
          class_file => "/opt/logstash-data-libs/logstash/pb_definitions/schema_pb.rb"
          protobuf_root_directory => "/opt/logstash-data-libs/logstash/pb_definitions/"
          protobuf_version => 3
        }
        bootstrap_servers => "{{ include "logstash.kafkaBootstrap" . }}"
      }
      kafka {
        type => "mdx-bev"
        consumer_threads => 4
        topics_pattern => "^mdx-bev.*"
        decorate_events => true
        auto_offset_reset => "latest"
        group_id => "logstash"
        key_deserializer_class => "org.apache.kafka.common.serialization.StringDeserializer"
        value_deserializer_class => "org.apache.kafka.common.serialization.ByteArrayDeserializer"
        codec => protobuf {
          class_name => "nv.Frame"
          class_file => "/opt/logstash-data-libs/logstash/pb_definitions/schema_pb.rb"
          protobuf_root_directory => "/opt/logstash-data-libs/logstash/pb_definitions/"
          protobuf_version => 3
        }
        bootstrap_servers => "{{ include "logstash.kafkaBootstrap" . }}"
      }
      kafka {
        type => "mdx-behavior"
        consumer_threads => 4
        topics => ["mdx-behavior", "mdx-behavior-plus"]
        decorate_events => true
        auto_offset_reset => "latest"
        group_id => "logstash"
        key_deserializer_class => "org.apache.kafka.common.serialization.StringDeserializer"
        value_deserializer_class => "org.apache.kafka.common.serialization.ByteArrayDeserializer"
        codec => protobuf {
          class_name => "nv.Behavior"
          class_file => "/opt/logstash-data-libs/logstash/pb_definitions/ext_pb.rb"
          protobuf_root_directory => "/opt/logstash-data-libs/logstash/pb_definitions/"
          protobuf_version => 3
        }
        bootstrap_servers => "{{ include "logstash.kafkaBootstrap" . }}"
      }
      kafka {
        type => "mdx-alerts"
        consumer_threads => 4
        topics => ["mdx-alerts"]
        auto_offset_reset => "latest"
        decorate_events => true
        group_id => "logstash"
        key_deserializer_class => "org.apache.kafka.common.serialization.StringDeserializer"
        value_deserializer_class => "org.apache.kafka.common.serialization.ByteArrayDeserializer"
        codec => protobuf {
          class_name => "nv.Behavior"
          class_file => "/opt/logstash-data-libs/logstash/pb_definitions/ext_pb.rb"
          protobuf_root_directory => "/opt/logstash-data-libs/logstash/pb_definitions/"
          protobuf_version => 3
        }
        bootstrap_servers => "{{ include "logstash.kafkaBootstrap" . }}"
      }
      kafka {
        type => "mdx-events"
        consumer_threads => 4
        topics => ["mdx-events"]
        decorate_events => true
        auto_offset_reset => "latest"
        group_id => "logstash"
        key_deserializer_class => "org.apache.kafka.common.serialization.StringDeserializer"
        value_deserializer_class => "org.apache.kafka.common.serialization.ByteArrayDeserializer"
        codec => protobuf {
          class_name => "nv.Behavior"
          class_file => "/opt/logstash-data-libs/logstash/pb_definitions/ext_pb.rb"
          protobuf_root_directory => "/opt/logstash-data-libs/logstash/pb_definitions/"
          protobuf_version => 3
        }
        bootstrap_servers => "{{ include "logstash.kafkaBootstrap" . }}"
      }
      kafka {
        type => "mdx-incidents"
        consumer_threads => 4
        topics => ["mdx-incidents"]
        decorate_events => true
        auto_offset_reset => "latest"
        group_id => "logstash"
        key_deserializer_class => "org.apache.kafka.common.serialization.StringDeserializer"
        value_deserializer_class => "org.apache.kafka.common.serialization.ByteArrayDeserializer"
        codec => protobuf {
          class_name => "nv.Incident"
          class_file => "/opt/logstash-data-libs/logstash/pb_definitions/ext_pb.rb"
          protobuf_root_directory => "/opt/logstash-data-libs/logstash/pb_definitions/"
          protobuf_version => 3
        }
        bootstrap_servers => "{{ include "logstash.kafkaBootstrap" . }}"
      }
      kafka {
        type => "mdx-vlm-incidents"
        consumer_threads => 4
        topics => ["mdx-vlm-incidents"]
        decorate_events => true
        auto_offset_reset => "latest"
        group_id => "logstash"
        key_deserializer_class => "org.apache.kafka.common.serialization.StringDeserializer"
        value_deserializer_class => "org.apache.kafka.common.serialization.ByteArrayDeserializer"
        codec => protobuf {
          class_name => "nv.Incident"
          class_file => "/opt/logstash-data-libs/logstash/pb_definitions/ext_pb.rb"
          protobuf_root_directory => "/opt/logstash-data-libs/logstash/pb_definitions/"
          protobuf_version => 3
        }
        bootstrap_servers => "{{ include "logstash.kafkaBootstrap" . }}"
      }
      kafka {
        type => "mdx-frames"
        consumer_threads => 4
        topics => ["mdx-frames"]
        decorate_events => true
        auto_offset_reset => "latest"
        group_id => "logstash"
        key_deserializer_class => "org.apache.kafka.common.serialization.StringDeserializer"
        value_deserializer_class => "org.apache.kafka.common.serialization.ByteArrayDeserializer"
        codec => protobuf {
          class_name => "nv.Frame"
          class_file => "/opt/logstash-data-libs/logstash/pb_definitions/schema_pb.rb"
          protobuf_root_directory => "/opt/logstash-data-libs/logstash/pb_definitions/"
          protobuf_version => 3
        }
        bootstrap_servers => "{{ include "logstash.kafkaBootstrap" . }}"
      }
      kafka {
        type => "mdx-mtmc"
        consumer_threads => 4
        topics => ["mdx-mtmc"]
        decorate_events => true
        auto_offset_reset => "latest"
        group_id => "logstash"
        codec => "plain"
        key_deserializer_class => "org.apache.kafka.common.serialization.StringDeserializer"
        bootstrap_servers => "{{ include "logstash.kafkaBootstrap" . }}"
      }
      kafka {
        type => "mdx-rtls"
        consumer_threads => 4
        topics_pattern => "^mdx-rtls.*"
        decorate_events => true
        auto_offset_reset => "latest"
        group_id => "logstash"
        key_deserializer_class => "org.apache.kafka.common.serialization.StringDeserializer"
        value_deserializer_class => "org.apache.kafka.common.serialization.ByteArrayDeserializer"
        codec => protobuf {
          class_name => "nv.Frame"
          class_file => "/opt/logstash-data-libs/logstash/pb_definitions/schema_pb.rb"
          protobuf_root_directory => "/opt/logstash-data-libs/logstash/pb_definitions/"
          protobuf_version => 3
        }
        bootstrap_servers => "{{ include "logstash.kafkaBootstrap" . }}"
      }
      kafka {
        type => "mdx-space-utilization"
        consumer_threads => 4
        topics => ["mdx-space-utilization"]
        decorate_events => true
        auto_offset_reset => "latest"
        group_id => "logstash"
        key_deserializer_class => "org.apache.kafka.common.serialization.StringDeserializer"
        value_deserializer_class => "org.apache.kafka.common.serialization.ByteArrayDeserializer"
        codec => protobuf {
          class_name => "nv.SpaceUtilization"
          class_file => "/opt/logstash-data-libs/logstash/pb_definitions/ext_pb.rb"
          protobuf_root_directory => "/opt/logstash-data-libs/logstash/pb_definitions/"
          protobuf_version => 3
        }
        bootstrap_servers => "{{ include "logstash.kafkaBootstrap" . }}"
      }
      kafka {
        type => "mdx-amr"
        consumer_threads => 4
        topics => ["mdx-amr"]
        decorate_events => "extended"
        auto_offset_reset => "latest"
        group_id => "logstash"
        codec => "plain"
        key_deserializer_class => "org.apache.kafka.common.serialization.StringDeserializer"
        bootstrap_servers => "{{ include "logstash.kafkaBootstrap" . }}"
      }
      kafka {
        type => "mdx-vlm-alerts"
        consumer_threads => 4
        topics => ["mdx-vlm-alerts"]
        auto_offset_reset => "latest"
        decorate_events => true
        group_id => "logstash"
        key_deserializer_class => "org.apache.kafka.common.serialization.StringDeserializer"
        value_deserializer_class => "org.apache.kafka.common.serialization.ByteArrayDeserializer"
        codec => protobuf {
          class_name => "nv.Behavior"
          class_file => "/opt/logstash-data-libs/logstash/pb_definitions/ext_pb.rb"
          protobuf_root_directory => "/opt/logstash-data-libs/logstash/pb_definitions/"
          protobuf_version => 3
        }
        bootstrap_servers => "{{ include "logstash.kafkaBootstrap" . }}"
      }
      kafka {
        type => "mdx-embed-filtered"
        consumer_threads => 4
        topics => ["mdx-embed-filtered"]
        auto_offset_reset => "latest"
        decorate_events => true
        group_id => "logstash"
        key_deserializer_class => "org.apache.kafka.common.serialization.StringDeserializer"
        value_deserializer_class => "org.apache.kafka.common.serialization.ByteArrayDeserializer"
        codec => protobuf {
          class_name => "nv.VisionLLM"
          class_file => "/opt/logstash-data-libs/logstash/pb_definitions/schema_pb.rb"
          protobuf_root_directory => "/opt/logstash-data-libs/logstash/pb_definitions/"
          protobuf_version => 3
        }
        bootstrap_servers => "{{ include "logstash.kafkaBootstrap" . }}"
      }
    }
    filter {
      json { source => "message" }
      ruby {
        code => "event.set('timestamp',(((event.get('[timestamp][seconds]').to_f)*1000) +((event.get('[timestamp][nanos]').to_f) * (10 ** -6)).floor()))"
      }
      date {
        match => [ "timestamp","UNIX_MS" ]
        target => "timestamp"
        timezone => "UTC"
      }
      if [type] == "mdx-behavior" or [type] == "mdx-events" or [type] == "mdx-alerts" or [type] == "mdx-vlm-alerts" or [type] == "mdx-incidents" or [type] == "mdx-vlm-incidents" or [type] == "mdx-embed-filtered" {
        ruby {
          code => "event.set('end',(((event.get('[end][seconds]').to_f)*1000) +((event.get('[end][nanos]').to_f) * (10 ** -6)).floor()))"
        }
        date {
          match => [ "end","UNIX_MS" ]
          target => "end"
          timezone => "UTC"
        }
        if "[object][bbox3d]" {
          mutate {
            remove_field => ["[object][bbox3d][embeddings]"]
          }
        }
        if [type] != "mdx-incidents" and [type] != "mdx-vlm-incidents" {
          ruby {
            code => '
              locations = []
              currentLocations=event.get("locations")
              if currentLocations
                for location in currentLocations["coordinates"] do
                  locations.append(location["point"])
                end
                event.set("[locations][coordinates]",locations)
              end
              smoothLocations = []
              currentSmoothLocations=event.get("smoothLocations")
              if currentSmoothLocations
                for smoothLocation in currentSmoothLocations["coordinates"] do
                  smoothLocations.append(smoothLocation["point"])
                end
                event.set("[smoothLocations][coordinates]",smoothLocations)
              end

              # Remove invalid single-point linestrings (geo_shape requires >= 2 points)
              locs = event.get("[locations][coordinates]")
              if locs and locs.length < 2
                event.remove("locations")
              end
              slocs = event.get("[smoothLocations][coordinates]")
              if slocs and slocs.length < 2
                event.remove("smoothLocations")
              end
            '
          }
        }
      }
      if [type] == "mdx-behavior" {
        fingerprint {
          method => "SHA1"
          key => "HMAC"
          source => [ "timestamp", "[place][name]", "[sensor][id]", "[object][id]"]
          concatenate_sources => true
          target => "Id"
        }
      }
      else if [type] == "mdx-alerts" or [type] == "mdx-vlm-alerts" or [type] == "mdx-events" {
        fingerprint {
          method => "SHA1"
          key => "HMAC"
          source => [ "timestamp", "[place][name]", "[sensor][id]", "[object][id]", "[analyticsModule][id]"]
          concatenate_sources => true
          target => "Id"
        }
      }
      else if [type] == "mdx-mtmc" {
        fingerprint {
          method => "SHA1"
          key => "HMAC"
          source => [ "globalId", "timestamp"]
          concatenate_sources => true
          target => "Id"
        }
      }
      else if [type] == "mdx-space-utilization" {
        fingerprint {
          method => "SHA1"
          key => "HMAC"
          source => [ "timestamp", "id" ]
          concatenate_sources => true
          target => "Id"
        }
      }
      else if [type] == "mdx-incidents" or [type] == "mdx-vlm-incidents" {
        if [info] and [info][primaryObjectId] {
          fingerprint {
            method => "SHA1"
            key => "HMAC"
            source => [ "timestamp", "category", "sensorId", "[info][primaryObjectId]" ]
            concatenate_sources => true
            target => "Id"
          }
        }
        else {
          fingerprint {
            method => "SHA1"
            key => "HMAC"
            source => [ "timestamp", "category", "sensorId" ]
            concatenate_sources => true
            target => "Id"
          }
        }
      }
      else if [type] == "mdx-embed-filtered" {
        fingerprint {
          method => "SHA1"
          key => "HMAC"
          source => [ "timestamp", "end", "[sensor][id]" ]
          concatenate_sources => true
          target => "Id"
        }
      }
      if [type] == "mdx-amr" {
        mutate {
          update => { "type" => "%{[@metadata][kafka][headers][type]}" }
        }
      }
      grok {
        match => ["timestamp", "%{YEAR:[@metadata][year]}-%{MONTHNUM:[@metadata][month]}-%{MONTHDAY:[@metadata][day]}T%{GREEDYDATA}"]
      }
      mutate {
        remove_field => ["kafka", "message", "@timestamp", "@version"]
      }
    }
    output {
      if [type] == "mdx-behavior" or [type] == "mdx-events" or [type] == "mdx-alerts" or [type] == "mdx-mtmc" or [type] == "mdx-space-utilization" or [type] == "mdx-vlm-alerts" or [type] == "mdx-incidents" or [type] == "mdx-vlm-incidents" or [type] == "mdx-embed-filtered" {
        elasticsearch {
          hosts => "{{ include "logstash.elasticsearchUrl" . }}"
          index => "%{type}-%{[@metadata][year]}-%{[@metadata][month]}-%{[@metadata][day]}"
          document_type => "logs"
          retry_max_interval => 10
          action => "index"
          document_id => "%{Id}"
          timeout => 60
        }
      }
      else {
        elasticsearch {
          hosts => "{{ include "logstash.elasticsearchUrl" . }}"
          index => "%{type}-%{[@metadata][year]}-%{[@metadata][month]}-%{[@metadata][day]}"
          document_type => "logs"
          retry_max_interval => 10
          action => "index"
          timeout => 60
        }
      }
    }
  {{- if and (eq .Values.streamType "kafka") .Values.lvs.enabled }}
  mdx-kafka-lvs-logstash.conf: |
    # SPDX-FileCopyrightText: Copyright (c) 2026 NVIDIA CORPORATION & AFFILIATES. All rights reserved.
    # SPDX-License-Identifier: LicenseRef-NvidiaProprietary
    #
    # Streaming RTVI-VLM Kafka -> Elasticsearch pipeline.
    #
    # Decodes nv.VisionLLM protobuf messages from two topics
    # (mdx-vlm-captions and mdx-structured-events-summary) and writes
    # documents into Elasticsearch in the EXACT shape that
    # via-ctx-rag's ElasticsearchDBTool.add_summary produces.

    input {
      kafka {
        bootstrap_servers        => "{{ include "logstash.kafkaBootstrap" . }}"
        topics                   => ["mdx-vlm-captions", "mdx-structured-events-summary"]
        group_id                 => "${KAFKA_CONSUMER_GROUP:logstash-vlm-es-writer}"
        client_id                => "logstash-visionllm-1"
        auto_offset_reset        => "earliest"
        enable_auto_commit       => true
        decorate_events          => "basic"
        key_deserializer_class   => "org.apache.kafka.common.serialization.StringDeserializer"
        value_deserializer_class => "org.apache.kafka.common.serialization.ByteArrayDeserializer"

        codec => protobuf {
          class_name              => "nv.VisionLLM"
          class_file              => "/opt/logstash-data-libs/logstash/pb_definitions/schema_pb.rb"
          protobuf_root_directory => "/opt/logstash-data-libs/logstash/pb_definitions"
          protobuf_version        => 3
          stop_on_error           => false
        }
      }
    }

    filter {
      if [llm][queries] {
        mutate {
          add_field => { "text" => "%{[llm][queries][0][response]}" }
        }
      }

      ruby {
        init => '
          require "digest"

          def null_embedding(text, dim, seed)
            digest_hex = Digest::SHA256.hexdigest(text.to_s)
            text_seed  = digest_hex[0, 16].to_i(16)
            rng        = Random.new(seed + text_seed)
            Array.new(dim) { rng.rand }
          end
        '
        code => '
          info = event.get("info") || {}
          cm   = info.dup

          raw_sid = (cm["streamId"] || "unknown").to_s
          safe_sid = raw_sid.gsub(/[-\/\\ ]/, "_")
          coll = cm.delete("collection_name") || "default_#{safe_sid}"

          cm["doc_type"] ||= "raw_events"
          q = (event.get("[llm][queries]") || [])[0]
          q_id = (q && q["id"]).to_s
          cm["doc_i"] ||= (q_id =~ /\A\d+\z/ ? q_id : cm["chunkIdx"] || "")

          cm["uuid"] ||= raw_sid

          ts = event.get("timestamp")
          if ts && !cm["start_ntp_float"]
            cm["start_ntp_float"] = ts["seconds"].to_f + (ts["nanos"] || 0).to_f / 1_000_000_000.0
          end
          end_ts = event.get("end")
          if end_ts && !cm["end_ntp_float"]
            cm["end_ntp_float"] = end_ts["seconds"].to_f + (end_ts["nanos"] || 0).to_f / 1_000_000_000.0
          end

          source = cm.delete("source") || cm["file"] || "N/A"

          cm.each_pair do |k, v|
            cm[k] = nil if v == ""
          end

          event.set("[metadata][source]", source)
          event.set("[metadata][content_metadata]", cm)
          event.set("[@metadata][collection]", coll)
          event.set("[@metadata][es_id]",
            "#{coll}:#{cm["uuid"] || ""}:#{cm["doc_type"]}:" \
            "#{cm["chunkIdx"] || cm["batch_i"] || cm["doc_i"] || ""}")

          dim   = ENV.fetch("LVS_EMB_DIMENSIONS", "1024").to_i
          seed  = ENV.fetch("LVS_EMB_SEED", "42").to_i
          event.set("vector", null_embedding(event.get("text"), dim, seed))
        '
      }

      mutate {
        convert => {
          "[metadata][content_metadata][doc_i]"           => "integer"
          "[metadata][content_metadata][chunkIdx]"        => "integer"
          "[metadata][content_metadata][batch_i]"         => "integer"
          "[metadata][content_metadata][event_count]"     => "integer"
          "[metadata][content_metadata][total_events]"    => "integer"
          "[metadata][content_metadata][pts_offset_ns]"   => "integer"
          "[metadata][content_metadata][start_pts]"       => "integer"
          "[metadata][content_metadata][end_pts]"         => "integer"
          "[metadata][content_metadata][start_ntp_float]" => "float"
          "[metadata][content_metadata][end_ntp_float]"   => "float"
          "[metadata][content_metadata][is_first]"        => "boolean"
          "[metadata][content_metadata][is_last]"         => "boolean"
        }
      }

      mutate {
        remove_field => ["info", "llm", "@version", "event"]
      }
    }

    output {
      elasticsearch {
        hosts           => "{{ include "logstash.elasticsearchUrl" . }}"
        index           => "%{[@metadata][collection]}"
        document_id     => "%{[@metadata][es_id]}"
        action          => "index"
        manage_template => false
      }
    }
  {{- end }}
