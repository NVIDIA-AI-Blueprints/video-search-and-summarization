replicas: 1
image:
  repository: docker.elastic.co/logstash/logstash
  tag: "9.3.3"
  pullPolicy: IfNotPresent
javaOpts: "-Xmx1536m -Xms512m"
streamType: "kafka"
kafka:
  bootstrapServers: ""
elasticsearch:
  host: ""
service:
  port: 5044
persistence:
  storageClass: ""
  libs:
    size: 5Gi
resources:
  requests:
    memory: "2Gi"
    cpu: "1"
  limits:
    memory: "4Gi"
    cpu: "2"
nodeSelector: {}
tolerations: []

# Prometheus logstash-exporter sidecar deployment
exporter:
  enabled: false
  image: ghcr.io/kuskoman/logstash-exporter:master
  port: 9198
  # Logstash API endpoint (HTTPS when TLS is enabled on the logstash service)
  logstashUrl: ""  # Auto-resolved: http://<release>-logstash:9600
  # Optional: TLS secret name for logstash CA cert (mdx-logstash-ls-http-certs-public)
  tlsSecretName: ""
  nodeSelector: {}
  resources: {}
