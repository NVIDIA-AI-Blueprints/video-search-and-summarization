{{- if .Values.enabled }}
{{- $controller := .Values.service.controller | default dict }}
{{- $controllerType := include "sdrc.serviceType" (dict "path" "service.controller" "type" (get $controller "type")) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sdrc.controllerServiceName" . }}
  labels:
    {{- include "sdrc.labels" . | nindent 4 }}
  {{- with (get $controller "annotations") }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ $controllerType }}
  ports:
    - name: controller
      port: {{ required "service.controller.port is required" (get $controller "port") | int }}
      targetPort: controller
      protocol: TCP
      {{- if (get $controller "nodePort") }}
      {{- include "sdrc.serviceNodePort" (dict "path" "service.controller" "type" $controllerType "nodePort" (get $controller "nodePort")) | nindent 6 }}
      {{- end }}
  selector:
    {{- include "sdrc.selectorLabels" . | nindent 4 }}
---
{{- $direct := .Values.service.sdrcDirectListener | default dict }}
{{- $directType := include "sdrc.serviceType" (dict "path" "service.sdrcDirectListener" "type" (get $direct "type")) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sdrc.sdrcDirectListenerServiceName" . }}
  labels:
    {{- include "sdrc.labels" . | nindent 4 }}
  {{- with (get $direct "annotations") }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ $directType }}
  ports:
    - name: sdrc-direct
      port: {{ required "service.sdrcDirectListener.port is required" (get $direct "port") | int }}
      targetPort: sdrc-direct
      protocol: TCP
      {{- if (get $direct "nodePort") }}
      {{- include "sdrc.serviceNodePort" (dict "path" "service.sdrcDirectListener" "type" $directType "nodePort" (get $direct "nodePort")) | nindent 6 }}
      {{- end }}
  selector:
    {{- include "sdrc.selectorLabels" . | nindent 4 }}
---
{{- $admin := .Values.service.envoyAdmin | default dict }}
{{- $adminType := include "sdrc.serviceType" (dict "path" "service.envoyAdmin" "type" (get $admin "type")) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sdrc.envoyAdminServiceName" . }}
  labels:
    {{- include "sdrc.labels" . | nindent 4 }}
  {{- with (get $admin "annotations") }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ $adminType }}
  ports:
    - name: admin
      port: {{ required "service.envoyAdmin.port is required" (get $admin "port") | int }}
      targetPort: admin
      protocol: TCP
      {{- if (get $admin "nodePort") }}
      {{- include "sdrc.serviceNodePort" (dict "path" "service.envoyAdmin" "type" $adminType "nodePort" (get $admin "nodePort")) | nindent 6 }}
      {{- end }}
  selector:
    {{- include "sdrc.selectorLabels" . | nindent 4 }}
{{- end }}
