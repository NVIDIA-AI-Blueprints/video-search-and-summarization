{{- if and .Values.enabled .Values.init.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "elasticsearch.initScriptsConfigMapName" . }}
  labels:
    {{- include "elasticsearch.labels" . | nindent 4 }}
    app.kubernetes.io/component: elasticsearch-init
data:
  elasticsearch-ilm-policy-creation.sh: |
{{ .Files.Get "configs/elasticsearch-ilm-policy-creation.sh" | indent 4 }}
  elasticsearch-template-creation.sh: |
{{ .Files.Get "configs/elasticsearch-template-creation.sh" | indent 4 }}
  elasticsearch-ingest-pipeline-creation.sh: |
{{ .Files.Get "configs/elasticsearch-ingest-pipeline-creation.sh" | indent 4 }}
{{- end }}
