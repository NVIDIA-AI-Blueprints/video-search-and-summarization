# Parent developer-profile charts set `agent.enabled` to install this umbrella.
enabled: true

# Subcharts use `condition: vss-*.enabled` in Chart.yaml. vss-va-mcp defaults off so
# profiles that only need vss-agent (base, LVS, search) do not pull MCP unless enabled.
vss-agent:
  enabled: true

vss-va-mcp:
  enabled: false
