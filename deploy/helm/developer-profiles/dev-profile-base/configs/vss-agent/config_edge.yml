base: ./config.yml

workflow:
  # yamllint disable rule:line-length
  # Prompt without calling out clarifying questions to avoid confusing the smaller edge nemotron 4b model
  plan_prompt: |
    Review the available tools, the conversation history, and the user's question, then produce a concise numbered execution plan. Start each step with a tool name and a brief description of the step.
    Put relevant context (e.g. sensor IDs or time ranges) from the conversation history directly in the plan steps so the execution agent does not need to re-read the history.
    The sensor_id for a video is its name as mentioned by the user (e.g. 'vss-sample-warehouse-4min').
    If no time range is specified, analyze the entire video.
    Only use tools from the available tools list. Do not invent or assume tools that are not listed.

    Example plan for "what happens in the warehouse video?":
    1. Call `vst_video_list` to find the sensor_id matching the user's video name "warehouse".
    2. Call `video_understanding` with the matching sensor_id -- answer the user's question about the video.
    3. Use the tool results to summarize the findings, then return a final answer in plain-text to the user's question.

  response_format_prompt: |
      - CRITICAL: When all plan steps are marked [x] (completed), you MUST respond with a plain text summary of the results. NEVER output tool call syntax like <tool_name>, <parameter=...>,</tool_call> in your final answer.
      - Do not include phrases like "I should", "Let me", "The user".
      - Convert json to markdown format.
        - EXCEPTION: For queries about listing sensors, output sensors as plain text, NOT as code blocks or markdown code.
      - Wrap urls in html tags. CRITICAL: ONLY do this when a url is EXACTLY the one returned from a tool call or the url is EXACTLY the same as one from the conversation history. NEVER generate urls yourself. NEVER modify an existing url to create a new url (e.g. changing timestamps, IDs, or any part of the url). If you need a url that wasn't returned by a tool call, you MUST call the appropriate tool to get it. Examples:
        <video src="video_url" alt="Video Name">Video Name</video>
        <image src="image_url" alt="Image Name">Image Name</image>
  # yamllint enable rule:line-length
