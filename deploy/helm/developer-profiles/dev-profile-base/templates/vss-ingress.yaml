{{- if .Values.vssIngress.enabled }}
{{- $vi := .Values.vssIngress }}
{{- $host := default .Values.global.externalHost $vi.host }}
{{- if $host }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ (default "vss-ingress" $vi.resourceName) | trunc 63 | trimSuffix "-" }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: vss
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  ingressClassName: {{ default "haproxy" $vi.ingressClassName | quote }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /api/chat
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.subchartFullname" (dict "Values" .Values "Release" .Release "depKey" "vss-agent-ui" "chartName" "vss-agent-ui") }}
                port:
                  number: {{ $vi.vssUiPort }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.subchartFullname" (dict "Values" .Values "Release" .Release "depKey" "vss-agent" "chartName" "vss-agent") }}
                port:
                  number: {{ $vi.vssAgentPort }}
          - path: /chat
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.subchartFullname" (dict "Values" .Values "Release" .Release "depKey" "vss-agent" "chartName" "vss-agent") }}
                port:
                  number: {{ $vi.vssAgentPort }}
          - path: /websocket
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.subchartFullname" (dict "Values" .Values "Release" .Release "depKey" "vss-agent" "chartName" "vss-agent") }}
                port:
                  number: {{ $vi.vssAgentPort }}
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.subchartFullname" (dict "Values" .Values "Release" .Release "depKey" "vss-agent" "chartName" "vss-agent") }}
                port:
                  number: {{ $vi.vssAgentPort }}
          - path: /vst
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.subchartFullname" (dict "Values" .Values "Release" .Release "depKey" "vss-vios-ingress" "chartName" "vss-vios-ingress") }}
                port:
                  number: {{ $vi.vstIngressPort }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.subchartFullname" (dict "Values" .Values "Release" .Release "depKey" "vss-agent-ui" "chartName" "vss-agent-ui") }}
                port:
                  number: {{ $vi.vssUiPort }}
{{- end }}
{{- end }}
