{{- /* vss-agent values live under agent.vss-agent when using services/agent umbrella; keep top-level vss-agent for legacy. */}}
{{- $agent := index .Values "agent" | default dict }}
{{- $vss := index $agent "vss-agent" | default (index .Values "vss-agent") | default dict }}
{{- $agentEnabled := index $agent "enabled" | default true }}
{{- if and $agentEnabled $vss.enabled }}
{{- $cm := include "vss.subchartFullname" (dict "Values" .Values "Release" .Release "depKey" "vss-agent" "chartName" "vss-agent" "subchartValues" $vss) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $cm }}-config
  labels:
    app.kubernetes.io/name: vss-agent
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  config.yml: |
{{ .Files.Get "configs/vss-agent/config.yml" | nindent 4 }}
{{- if .Files.Glob "configs/vss-agent/config_edge.yml" }}
  config_edge.yml: |
{{ (.Files.Get "configs/vss-agent/config_edge.yml") | nindent 4 }}
{{- end }}
{{- if .Files.Glob "configs/vss-agent/config_rag.yml" }}
  config_rag.yml: |
{{ (.Files.Get "configs/vss-agent/config_rag.yml") | nindent 4 }}
{{- end }}
{{- end }}
