{{ if .Values.ingress.enabled }}
{{/*
  Ingress for dev-profile-search.
  Modeled after dev-profile-alerts/vss-ingress-example.yaml.
  Routes HTTP traffic to ClusterIP services; RTSP (NVStreamer) is
  not routed through this HTTP ingress.

  Host auto-wiring: when a host value is empty, it is constructed
  from global.externalHost as <prefix>.<IP>.nip.io.
  If global.externalHost is already vss-search.<IP>.nip.io, that same host is used
  and <IP> is derived for kibana/streamer subdomains.
  Public vss-agent URL env (agent.vss-agent) uses the same default main
  host; if you set ingress.hosts.main, set agent.vss-agent.vstPublicIngressHost to match.
*/}}
{{- $ipRaw := .Values.global.externalHost | default "127.0.0.1" | toString | trim }}
{{- $ip := $ipRaw }}
{{- if and (hasPrefix "vss-search." $ipRaw) (hasSuffix "nip.io" $ipRaw) }}
{{- $ip = $ipRaw | trimPrefix "vss-search." | trimSuffix ".nip.io" }}
{{- end }}
{{- $mainHost := .Values.ingress.hosts.main | default (printf "vss-search.%s.nip.io" $ip) }}
{{- $streamerHost := .Values.ingress.hosts.streamer | default (printf "streamer.%s.nip.io" $ip) }}
{{- $kibanaHost := .Values.ingress.hosts.kibana | default (printf "kibana.%s.nip.io" $ip) }}
{{- $phoenixHost := .Values.ingress.hosts.phoenix | default "" | trim }}
{{- $vios := index .Values "vios" | default dict }}
{{- $agent := index .Values "agent" | default dict }}
{{- $vssAgent := index $agent "vss-agent" | default (index .Values "vss-agent") | default dict }}
{{- $agentEnabled := index $agent "enabled" | default true }}
{{- $analytics := index .Values "analytics" | default dict }}
{{- $videoAnalyticsVals := index $analytics "vss-video-analytics-api" | default dict }}
{{- $videoAnalyticsEnabled := default false (index $videoAnalyticsVals "enabled") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dev-profile-search.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dev-profile-search.labels" . | nindent 4 }}
  annotations:
    haproxy.org/path-rewrite: |
{{- if $videoAnalyticsEnabled }}
      /video-analytics-api/(.*) /\1
{{- end }}
      /phoenix/(.*) /\1
      /phoenix /
    haproxy.org/timeout-server: "3600s"
    haproxy.org/timeout-client: "3600s"
    haproxy.org/timeout-tunnel: "3600s"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    # ── Main host: VSS UI + Agent + VST Ingress ──────────────────────
    - host: {{ $mainHost }}
      http:
        paths:
          {{- $ing := .Values.ingress }}
          {{- if (index .Values "vss-agent-ui").enabled }}
          - path: /api/chat
            pathType: Prefix
            backend:
              service:
                name: {{ include "dev-profile-search.serviceShort" (dict "root" . "short" "vss-agent-ui") }}
                port:
                  number: {{ $ing.vssUiPort | default 3000 }}
          {{- end }}
          {{- if and $agentEnabled $vssAgent.enabled }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "dev-profile-search.serviceShort" (dict "root" . "short" "vss-agent") }}
                port:
                  number: {{ $ing.vssAgentPort | default 8000 }}
          - path: /chat
            pathType: Prefix
            backend:
              service:
                name: {{ include "dev-profile-search.serviceShort" (dict "root" . "short" "vss-agent") }}
                port:
                  number: {{ $ing.vssAgentPort | default 8000 }}
          - path: /websocket
            pathType: Prefix
            backend:
              service:
                name: {{ include "dev-profile-search.serviceShort" (dict "root" . "short" "vss-agent") }}
                port:
                  number: {{ $ing.vssAgentPort | default 8000 }}
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: {{ include "dev-profile-search.serviceShort" (dict "root" . "short" "vss-agent") }}
                port:
                  number: {{ $ing.vssAgentPort | default 8000 }}
          {{- end }}
          {{- $vioIng := index $vios "vss-vios-ingress" | default dict }}
          {{- if $vioIng.enabled }}
          - path: /vst
            pathType: Prefix
            backend:
              service:
                name: {{ include "dev-profile-search.serviceShort" (dict "root" . "short" "vss-vios-ingress") }}
                port:
                  {{- $vioIngSvc := index $vioIng "service" | default dict }}
                  number: {{ coalesce $vioIng.port $vioIngSvc.port 30888 }}
          {{- end }}
          {{- $fp := index (.Values.infra | default dict) "phoenix" | default dict }}
          {{- if and $fp (default true $fp.enabled) }}
          - path: /phoenix
            pathType: Prefix
            backend:
              service:
                name: {{ include "dev-profile-search.serviceShort" (dict "root" . "short" "phoenix") }}
                port:
                  number: {{ $fp.port | default 6006 }}
          {{- end }}
          {{- if $videoAnalyticsEnabled }}
          - path: /video-analytics-api
            pathType: Prefix
            backend:
              service:
                name: {{ include "dev-profile-search.serviceShort" (dict "root" . "short" "vss-video-analytics-api") }}
                port:
                  number: {{ $ing.videoAnalyticsApiPort | default 8081 }}
          {{- end }}
          {{- if (index .Values "vss-agent-ui").enabled }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "dev-profile-search.serviceShort" (dict "root" . "short" "vss-agent-ui") }}
                port:
                  number: {{ $ing.vssUiPort | default 3000 }}
          {{- end }}
    {{- if (index $vios "vss-vios-nvstreamer").enabled }}
    # ── Streamer host: NVStreamer HTTP API ─────────────────────────────
    - host: {{ $streamerHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "dev-profile-search.serviceShort" (dict "root" . "short" "vss-vios-nvstreamer") }}
                port:
                  number: {{ (index $vios "vss-vios-nvstreamer").service.port }}
    {{- end }}
    {{- if (index (.Values.infra | default dict) "kibana" | default dict).enabled }}
    # ── Kibana host: dashboards ───────────────────────────────────────
    - host: {{ $kibanaHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "dev-profile-search.serviceShort" (dict "root" . "short" "kibana") }}
                port:
                  number: {{ (index (.Values.infra | default dict) "kibana" | default dict).service.port | default 5601 }}
    {{- end }}
    {{- $fp := index (.Values.infra | default dict) "phoenix" | default dict }}
    {{- if and $fp (default true $fp.enabled) (ne $phoenixHost "") }}
    # ── Phoenix host: tracing UI ──────────────────────────────────────
    - host: {{ $phoenixHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "dev-profile-search.serviceShort" (dict "root" . "short" "phoenix") }}
                port:
                  number: {{ $fp.port | default 6006 }}
    {{- end }}
{{- end }}
