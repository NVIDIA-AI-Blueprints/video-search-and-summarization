# values-nodeport.yaml
# Override file for exposing services via NodePort instead of Ingress.
# No Ingress controller is required.
#
# Usage (with Local NIMs):
#   helm upgrade --install vss-search ./dev-profile-search \
#     -f dev-profile-search/values-nodeport.yaml \
#     -n default \
#     --set global.externalHost=vss-search.$NODE_EXTERNAL_IP.nip.io \
#     --set global.ngcApiKey=$NGC_CLI_API_KEY \
#     --set nims.global.ngcApiKey=$NGC_CLI_API_KEY \
#     --set nims.gpuType=$GPU_NAME \
#     --wait=false
#
# Usage (with NVIDIA Build Endpoint):
#   helm upgrade --install vss-search ./dev-profile-search \
#     -f dev-profile-search/values-build-endpoint.yaml \
#     -f dev-profile-search/values-nodeport.yaml \
#     -n default \
#     --set global.externalHost=vss-search.$NODE_EXTERNAL_IP.nip.io \
#     --set global.ngcApiKey=$NGC_CLI_API_KEY \
#     --set nims.global.ngcApiKey=$NGC_CLI_API_KEY \
#     --wait=false

global:
  ingress:
    enabled: false

ingress:
  enabled: false

agent:
  vss-agent:
    service:
      type: NodePort
      nodePort: 30800

vss-agent-ui:
  service:
    type: NodePort
    nodePort: 32300

# VIOS umbrella (../../services/vios): parent Chart.yaml uses condition: vios.enabled — keep true unless intentionally omitting the entire VST stack.
vios:
  enabled: true
  vss-vios-ingress:
    service:
      type: NodePort
      nodePort: 30888

  vss-vios-nvstreamer:
    service:
      type: NodePort
      nodePort: 30900

infra:
  kibana:
    service:
      type: NodePort
      nodePort: 31560
  phoenix:
    service:
      type: NodePort
      nodePort: 30606
