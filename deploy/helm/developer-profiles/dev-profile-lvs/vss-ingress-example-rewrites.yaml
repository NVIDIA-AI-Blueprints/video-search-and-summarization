apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    haproxy.org/path-rewrite: |
      /video-analytics-api/(.*) /\1
      /alert-bridge/(.*) /\1
  name: <RELEASE_NAME>-vss-ingress-rewrites
  namespace: <NAMESPACE>
spec:
  ingressClassName: haproxy
  rules:
  - host: vss.<EXTERNAL_HOST>.nip.io # e.g. vss.10.57.209.221.nip.io, Value of global.externalHost in values-lvs.yaml
    http:
      paths:
      - backend:
          service:
            name: <RELEASE_NAME>-vss-video-analytics-api-alerts
            port:
              number: 8081
        path: /video-analytics-api
        pathType: Prefix
      - backend:
          service:
            name: <RELEASE_NAME>-alert-bridge
            port:
              number: 9080
        path: /alert-bridge
        pathType: Prefix
