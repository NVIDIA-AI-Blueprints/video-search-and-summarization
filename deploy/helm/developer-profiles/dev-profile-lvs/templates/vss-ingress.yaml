{{- if .Values.vssIngress.enabled }}
{{- $vi := .Values.vssIngress }}
{{- $host := default .Values.global.externalHost $vi.host }}
{{- $kibanaHost := default (printf "kibana.%s" $host) $vi.kibanaHost }}
{{- $phoenixHost := $vi.phoenixHost | default "" | trim }}
{{- $fk := index (.Values.infra | default dict) "kibana" | default dict }}
{{- $kibanaStackEnabled := and $fk (default true $fk.enabled) }}
{{- $fp := index (.Values.infra | default dict) "phoenix" | default dict }}
{{- $phoenixStackEnabled := and $fp (default true $fp.enabled) }}
{{- /* RTVI sub-charts: opt-in stream-affinity ingress per service.
       Hash policy is set on each Service (haproxy.org/load-balance,
       hash-type, backend-config-snippet) so it's scoped to that backend
       only and doesn't disturb the other paths in this Ingress. */}}
{{- $rtvi := index .Values "rtvi" | default dict }}
{{- $rtviCv := index $rtvi "vss-rtvi-cv" | default dict }}
{{- $rtviVlm := index $rtvi "vss-rtvi-vlm" | default dict }}
{{- $rtviEmbed := index $rtvi "vss-rtvi-embed" | default dict }}
{{- $rtviCvIng := and (default false (index $rtviCv "enabled")) (default false (index ($rtviCv.ingress | default dict) "enabled")) }}
{{- $rtviVlmIng := and (default false (index $rtviVlm "enabled")) (default false (index ($rtviVlm.ingress | default dict) "enabled")) }}
{{- $rtviEmbedIng := and (default false (index $rtviEmbed "enabled")) (default false (index ($rtviEmbed.ingress | default dict) "enabled")) }}
{{- $anyRtviIng := or $rtviCvIng (or $rtviVlmIng $rtviEmbedIng) }}
{{- $rtviCvPort := default 9010 (index ($rtviCv.service | default dict) "port") }}
{{- $rtviVlmPort := default 8000 (index ($rtviVlm.service | default dict) "port") }}
{{- $rtviEmbedPort := default 8000 (index $rtviEmbed "port") }}
{{- if $host }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ printf "%s-vss-ingress" .Release.Name | trunc 63 | trimSuffix "-" }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: vss
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- if or $phoenixStackEnabled $anyRtviIng }}
  annotations:
    haproxy.org/path-rewrite: |
      {{- if $phoenixStackEnabled }}
      /phoenix/(.*) /\1
      /phoenix /
      {{- end }}
      {{- if $rtviCvIng }}
      /rtvi-cv/(.*) /\1
      /rtvi-cv /
      {{- end }}
      {{- if $rtviVlmIng }}
      /rtvi-vlm/(.*) /\1
      /rtvi-vlm /
      {{- end }}
      {{- if $rtviEmbedIng }}
      /rtvi-embed/(.*) /\1
      /rtvi-embed /
      {{- end }}
  {{- end }}
spec:
  ingressClassName: {{ default "haproxy" $vi.ingressClassName | quote }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /api/chat
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.lvs.serviceShort" (dict "root" . "short" "vss-agent-ui") }}
                port:
                  number: {{ $vi.vssUiPort }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.lvs.serviceShort" (dict "root" . "short" "vss-agent") }}
                port:
                  number: {{ $vi.vssAgentPort }}
          - path: /chat
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.lvs.serviceShort" (dict "root" . "short" "vss-agent") }}
                port:
                  number: {{ $vi.vssAgentPort }}
          - path: /websocket
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.lvs.serviceShort" (dict "root" . "short" "vss-agent") }}
                port:
                  number: {{ $vi.vssAgentPort }}
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.lvs.serviceShort" (dict "root" . "short" "vss-agent") }}
                port:
                  number: {{ $vi.vssAgentPort }}
          - path: /vst
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.lvs.serviceShort" (dict "root" . "short" "vss-vios-ingress") }}
                port:
                  number: {{ $vi.vstIngressPort }}
{{- if $phoenixStackEnabled }}
          - path: /phoenix
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.lvs.serviceShort" (dict "root" . "short" "phoenix") }}
                port:
                  number: {{ $vi.phoenixPort | default 6006 }}
{{- end }}
{{- if $rtviCvIng }}
          - path: /rtvi-cv
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.lvs.serviceShort" (dict "root" . "short" "vss-rtvi-cv") }}
                port:
                  number: {{ $rtviCvPort }}
{{- end }}
{{- if $rtviVlmIng }}
          - path: /rtvi-vlm
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.lvs.serviceShort" (dict "root" . "short" "vss-rtvi-vlm") }}
                port:
                  number: {{ $rtviVlmPort }}
{{- end }}
{{- if $rtviEmbedIng }}
          - path: /rtvi-embed
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.lvs.serviceShort" (dict "root" . "short" "vss-rtvi-embed") }}
                port:
                  number: {{ $rtviEmbedPort }}
{{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.lvs.serviceShort" (dict "root" . "short" "vss-agent-ui") }}
                port:
                  number: {{ $vi.vssUiPort }}
{{- if and $kibanaStackEnabled $kibanaHost }}
    - host: {{ $kibanaHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.lvs.serviceShort" (dict "root" . "short" "kibana") }}
                port:
                  number: {{ $vi.kibanaPort | default 5601 }}
{{- end }}
{{- if and $phoenixStackEnabled (ne $phoenixHost "") }}
    - host: {{ $phoenixHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "vss.lvs.serviceShort" (dict "root" . "short" "phoenix") }}
                port:
                  number: {{ $vi.phoenixPort | default 6006 }}
{{- end }}
{{- end }}
{{- end }}
