general:
  use_uvloop: true
  front_end:
    _type: vss_fastapi
    runner_class: vss_agents.api.custom_fastapi_worker.CustomFastApiFrontEndWorker
    object_store: ${VSS_AGENT_OBJECT_STORE_TYPE}  # Set to local_object_store or remote_object_store
    streaming_ingest:
      vst_internal_url: ${VST_INTERNAL_URL}
      rtvi_vlm_base_url: ${RTVI_VLM_BASE_URL}
      enable_rtsp_streams: true
      enable_video_delete: true
      enable_videos_for_search: true
      # No RTVI-CV/Embed: lvs ingests RTSP streams to RTVI-VLM only.
      # The /videos-for-search/*/complete and /api/v1/videos/{filename}/complete
      # handlers self-skip the embedding/CV steps when their URLs are unset.
    cors:
      allow_origins: ['*']
      allow_methods: ['*']
      allow_headers: ['*']
      allow_credentials: false
  telemetry:
    tracing:
      phoenix:
        _type: phoenix
        endpoint: ${PHOENIX_ENDPOINT}/v1/traces
        project: DEV-LVS-vss-agent-${VSS_AGENT_VERSION}
        # Uncomment the following to enable Weave experiment tracking:
        # weave:
        #   _type: weave
        #   project: ${WEAVE_PROJECT}

object_stores:
  local_object_store:
    _type: in_memory

functions:
  video_upload_url:
    _type: video_upload_url
    vst_external_url: ${VST_EXTERNAL_URL}
    agent_base_url: ${VSS_AGENT_EXTERNAL_URL}

  video_understanding:
    _type: video_understanding
    vlm_name: ${VLM_MODEL_TYPE:-nim}_vlm
    max_frames: 60
    max_fps: 2  # for CR1, max fps is 2
    min_pixels: 3136
    max_pixels: 12845056
    reasoning: false
    video_url_tool: vst_video_clip
    time_format: offset
    vlm_mode: ${VLM_MODE}
    internal_ip: ${INTERNAL_IP}
    external_ip: ${EXTERNAL_IP}
    vst_internal_url: ${VST_INTERNAL_URL}
    system_prompt: |
      You are a monitoring system analyzing video footage.
      Your task is to describe the events in the video in detail or answer the user's question about the video.
        IMPORTANT:
        - You must respond only in English and in plain text.
        - You must respond only in the format specified in the OUTPUT REQUIREMENTS section.
        - Timestamp must be in pts format, seconds since the start of the video.
        - Always provide a direct answer to the question asked.
        - Never return an empty response. If you cannot find what the user is asking about, acknowledge it to the user.


  vst_video_duration:
    _type: vst.duration
    vst_internal_url: ${VST_INTERNAL_URL}
    vst_external_url: ${VST_EXTERNAL_URL}

  vst_video_clip:
    _type: vst.video_clip
    vst_internal_url: ${VST_INTERNAL_URL}
    vst_external_url: ${VST_EXTERNAL_URL}

  vst_snapshot:
    _type: vst.snapshot
    vst_internal_url: ${VST_INTERNAL_URL}
    vst_external_url: ${VST_EXTERNAL_URL}

  vst_video_list:
    _type: vst.video_list
    vst_internal_url: ${VST_INTERNAL_URL}

  lvs_video_understanding:
    _type: lvs_video_understanding
    lvs_backend_url: ${LVS_BACKEND_URL}
    model: ${VLM_NAME}
    video_url_tool: vst_video_clip
    vlm_mode: ${VLM_MODE}
    internal_ip: ${INTERNAL_IP}
    external_ip: ${EXTERNAL_IP}
    vst_internal_url: ${VST_INTERNAL_URL}
    # Connection and timeout configuration
    conn_timeout_ms: 5000
    read_timeout_ms: 600000
    # Video processing parameters for better event detection
    chunk_duration: 10  # Split video into 10-second chunks (0 = entire video in one request)
    num_frames_per_chunk: 20  # Sample 20 frames per chunk
    # HITL Templates (shown each for each query to the user during interaction)
    hitl_scenario_template: |
      Scenario (REQUIRED):
      Please provide a scenario description for the video analysis.

      Example: "traffic monitoring", "warehouse monitoring"

      Enter your scenario or press Submit to keep current value:
    hitl_events_template: |
      Events (REQUIRED):
      Please provide a comma-separated list of events to detect.

      Examples:
      - accident, pedestrian crossing, vehicle crossing, traffic violation
      - boxes falling, accident, forklift stuck, workers not wearing PPE, person entering restricted area

      Enter events (comma-separated) or press Submit to keep current value:
    hitl_objects_template: |
      Objects of Interest (OPTIONAL):
      Please provide a comma-separated list of objects to focus on, or write "skip" to skip.

      Examples:
      - cars, trucks, pedestrians
      - forklifts, pallets, workers

      Enter objects (comma-separated), "skip" to skip or press Submit to keep current value:
    hitl_confirmation_template: |
      Please review the above configuration that will be sent for video analysis.

      **Options:**
      - Press Submit (empty) → Confirm and proceed with video analysis
      - Type `/redo` → Modify parameters
      - Type `/cancel` → Cancel analysis

      Enter your choice or press Submit to proceed:
    # Default values
    default_scenario: "traffic monitoring"
    default_events:
    - accident
    - pedestrian crossing
    - vehicle crossing
    - traffic violation

  lvs_config_media:
    _type: lvs_config_media
    lvs_backend_url: ${LVS_BACKEND_URL}
    vst_internal_url: ${VST_INTERNAL_URL}
    model: ${VLM_NAME}
    conn_timeout_ms: 5000
    read_timeout_ms: 600000
    chunk_duration: 10
    hitl_scenario_template: |
      Scenario (REQUIRED):
      Please provide a scenario description for the stream analysis.

      Example: "traffic monitoring", "warehouse monitoring"

      Enter your scenario or press Submit to keep current value:
    hitl_events_template: |
      Events (REQUIRED):
      Please provide a comma-separated list of events to detect.

      Examples:
      - accident, pedestrian crossing, vehicle crossing, traffic violation
      - boxes falling, accident, forklift stuck, workers not wearing PPE, person entering restricted area

      Enter events (comma-separated) or press Submit to keep current value:
    hitl_objects_template: |
      Objects of Interest (OPTIONAL):
      Please provide a comma-separated list of objects to focus on, or write "skip" to skip.

      Examples:
      - cars, trucks, pedestrians
      - forklifts, pallets, workers

      Enter objects (comma-separated), "skip" to skip or press Submit to keep current value:
    default_scenario: "traffic monitoring"
    default_events:
    - accident
    - pedestrian crossing
    - vehicle crossing
    - traffic violation

  lvs_stream_understanding:
    _type: lvs_stream_understanding
    lvs_backend_url: ${LVS_BACKEND_URL}
    model: ${VLM_NAME}
    conn_timeout_ms: 5000
    read_timeout_ms: 600000

  video_report_gen:
    _type: video_report_gen
    object_store: ${VSS_AGENT_OBJECT_STORE_TYPE}
    base_url: ${VSS_AGENT_REPORTS_BASE_URL}
    video_understanding_tool: video_understanding
    lvs_video_understanding_tool: lvs_video_understanding
    video_url_tool: vst_video_clip
    picture_url_tool: vst_snapshot
    vst_internal_url: ${VST_INTERNAL_URL}
    vst_external_url: ${VST_EXTERNAL_URL}
    vlm_prompt: |
      Describe in detail what is happening in this video,
      including all visible people, vehicles, equipments, objects,
      actions, and environmental conditions.
      OUTPUT REQUIREMENTS:
      [timestamp-timestamp] Description of what is happening.
      EXAMPLE:
      [0.0s-4.0s] <description of the first event>
      [4.0s-12.0s] <description of the second event>
    # HITL Configuration - prompts user to confirm/edit VLM prompt before report generation
    hitl_enabled: true
    hitl_prompt_llm: ${LLM_MODEL_TYPE:-nim}_llm  # LLM for AI-assisted prompt generation e.g. nim_llm, openai_llm
    hitl_vlm_prompt_template: |
      **VLM Prompt for Report Generation**

      **OPTIONS:**

      • Press Submit (empty) → Approve and generate report

      • Type a new prompt directly or paste current prompt and edit it manually

      • Type `/generate <description>` → AI creates a prompt based on your description

      • Type `/refine <instructions>` → AI modifies the current prompt

      • Type `/cancel` → Cancel report generation

      Enter your choice or press Submit to keep current value:
    hitl_generate_system_prompt: |
      You are a prompt engineer specializing in video analysis.
      Create a clear, detailed prompt for a Vision Language Model (VLM)
      that will analyze video footage and generate a report.

      Requirements:
      - Be specific about what to look for in the video
      - Include instructions to describe events with timestamps in chronological[Xs-Ys] format
      - Focus on the user's described scenario/goals and create the prompt that will be understandable for the VLM
      - Keep the prompt concise but detailed

      Output ONLY the VLM prompt, no explanations.
    hitl_refine_system_prompt: |
      You are a prompt engineer specializing in video analysis.
      Modify the existing VLM prompt based on the user's instructions.

      Requirements:
      - Preserve the timestamp format [Xs-Ys] requirement
      - Maintain the original prompt structure and content and add on to it the user's requested changes

      Current prompt to modify:
      {current_prompt}

      Output ONLY the modified prompt, no explanations.

  report_agent:
    _type: report_agent
    log_level: INFO
    # No Video Analytics MCP tools configured = Video(uploaded) Report mode
    video_report_tool: video_report_gen

llms:
  # --- LLM profiles (selected by LLM_MODEL_TYPE) ---
  nim_llm:
    _type: nim
    model_name: ${LLM_NAME}
    base_url: ${LLM_BASE_URL}/v1
    max_tokens: 4096
    temperature: 0.0

  openai_llm:
    _type: openai
    model_name: ${LLM_NAME}
    base_url: ${LLM_BASE_URL}/v1
    max_tokens: 4096
    temperature: 0.0

  # --- VLM profiles (selected by VLM_MODEL_TYPE) ---
  nim_vlm:
    _type: nim
    model_name: ${VLM_NAME}
    base_url: ${VLM_BASE_URL}/v1
    temperature: 0.0
    max_tokens: 4096

  openai_vlm:
    _type: openai
    model_name: ${VLM_NAME}
    temperature: 0.0
    max_tokens: 4096

  vllm_vlm:
    _type: openai
    model_name: ${VLM_NAME}
    base_url: ${VLM_BASE_URL}/v1
    temperature: 0.0
    max_tokens: 4096

  rtvi_vlm:
    _type: openai
    model_name: nvidia/cosmos-reason2-8b
    base_url: ${RTVI_VLM_BASE_URL}/v1
    temperature: 0.0
    model_kwargs:
      extra_body:
        num_frames_per_second_or_fixed_frames_chunk: 20
        use_fps_for_chunking: false
        vlm_input_width: 1280
        vlm_input_height: 720

  # --- Others ---
  eval_llm_judge:
    _type: nim
    model_name: ${EVAL_LLM_JUDGE_NAME}
    base_url: ${EVAL_LLM_JUDGE_BASE_URL}/v1
    max_tokens: 4096
    temperature: 0.0

workflow:
  _type: top_agent
  llm_name: ${LLM_MODEL_TYPE:-nim}_llm
  log_level: INFO
  max_iterations: 30
  llm_reasoning: false
  planning_enabled: true
  tool_names:
  - video_understanding
  - lvs_video_understanding
  - lvs_config_media
  - lvs_stream_understanding
  - vst_video_clip
  - vst_snapshot
  - vst_video_list
  - vst_video_duration
  subagent_names:
  - report_agent
  # yamllint disable rule:line-length
  prompt: |
    You are a routing agent for a video surveillance system. Your job is to route requests to the correct tool.
    ## Routing Rules:
      **vst_video_list** -
      - Videos can be added/removed from the backend system. dont rely on previous conversations for questions about available videos.
      - If user ask to show a video not in the list from previous interactions, call this tool to verify if the video is available then call the appropriate tool to show the video or snapshot.
      - Examples: "What videos are available?", "List all available videos" "list sensors"
      **report_agent**
      - Only call report_agent when user mentions "report" in the question (works for both uploaded videos AND live streams).
      - For "report" requests, call report_agent DIRECTLY as the first tool — do NOT call lvs_stream_understanding, lvs_config_media, or any other tool first to "check"/"verify" anything.
      - Don't use the report from previous interactions.
      - CRITICAL: For multiple uploaded videos, pass them as a list in a SINGLE call (e.g., sensor_id=['video1', 'video2']). Do NOT make separate sequential calls.
      - For uploaded videos: pass sensor_id (str or list[str]) and user_query.
      - For live streams: pass media_type='stream', a single sensor_id (the stream name), start_time and end_time as floats in seconds (use end_time=0 for "until now"), and user_query.
      - Examples: "Generate a report for video1" → ONE call report_agent(sensor_id='video1', user_query=...). "Generate a report for stream CAM_1 from 0 to 60 seconds" → ONE call report_agent(media_type='stream', sensor_id='CAM_1', start_time=0, end_time=60, user_query=...).
      **lvs_video_understanding** - For SUMMARIZING uploaded videos (not streams, not reports).
      - Use when user asks to "summarize" or "give a summary of" a video, optionally over a time range.
      - Pass sensor_id (the video name from vst_video_list); start_time/end_time are floats in seconds (omit both for the whole video).
      - Examples: "Summarize video warehouse_sample" (no times), "Summarize video warehouse_sample from start to second 45" (start_time=0, end_time=45)
      **lvs_stream_understanding** - For SUMMARIZING live streams (not videos, not reports).
      - Use when user asks to "summarize" or "describe" a stream over a time range.
      - Do NOT use this tool to "check" whether a stream is configured before calling another tool — it is for showing summaries to the user.
      - If the response status is "not_configured", surface the response message VERBATIM to the user and STOP. Do NOT auto-call lvs_config_media — caption generation must be confirmed by the user first.
      - Pass stream_name, numeric start_time, numeric end_time, response_type='summary'.
      - Examples: "Summarize stream CAM_1 from 0 to 45 seconds"
      **lvs_config_media** - Start LVS caption generation for a live stream (HITL collects scenario/events/objects).
      - Use ONLY when the user explicitly asks to start caption generation for a stream. Trigger phrases include: "start summarizing the stream <name>", "start captioning <name>", "set up stream <name>", "configure stream <name>".
      - Do NOT call this tool just because a previous tool's response said the stream is "not configured" — surface that response to the user and wait for an explicit start request.
      - Do NOT call speculatively or as a pre-check.
      - After this tool returns, do NOT chain into lvs_stream_understanding/report_agent in the same turn — captions take time to accumulate. Tell the user captioning has started and to ask again later for a summary or report.
      **video_understanding** - For any question about short videos or quick queries for a video clip.
      - Use when video is less than 1 minute.
      - Use when user asks "what happens in the video" or "describe the video" or "analyze this video" or "what is happening in the video"
      - Do NOT use when user asks to "generate a report" or "summarize" — use report_agent or lvs_video_understanding respectively.
      **vst_video_clip** - For queries asking for showing videos (e.g., "Let's show the videos just uploaded"), call this tool in parallel with each video name as a separate input.
      - CRITICAL: Always call vst_video_clip to get the URL even though the video clip for the same video has already been generated from previous interactions. DO NOT generate the URL yourself without calling vst_video_clip.
      **vst_snapshot** - For queries asking for a snapshot of a video at a specific timestamp.
      - CRITICAL: Always call vst_snapshot to get the URL even though the snapshot for the same video and at the same timestamp has already been generated from previous interactions. DO NOT generate the URL yourself without calling vst_snapshot.
    ## Stream vs uploaded video: when a request mentions a `<name>` that could be either, treat it as a stream if the name contains "stream"/"cam"/"rtsp" or you previously added a stream by that name, treat it as an uploaded video if you previously uploaded/listed a video by that name, otherwise ask the user once.
    ## Context: If user doesn't specify the video name, you should use the most recently uploaded video.


  tool_call_prompt: |
    - ALWAYS include ALL required parameters when calling tools
    - If a tool call fails with a validation error, RETRY IMMEDIATELY: Fix the error and call the tool again with correct parameters.
    - Error Handling: if a tool fails more than 3 times, just return a summarized error message. Do not endlessly try again.

  response_format_prompt: |
    - Do not include phrases like "I should", "Let me", "The user".
    - Convert json to markdown format.
      - EXCEPTION: For queries about listing sensors, output sensors as plain text, NOT as code blocks or markdown code.
    - Wrap urls in html tags. CRITICAL: ONLY do this when a url is EXACTLY the one returned from a tool call or the url is EXACTLY the same as one from the conversation history. NEVER generate urls yourself. NEVER modify an existing url to create a new url (e.g. changing timestamps, IDs, or any part of the url). If you need a url that wasn't returned by a tool call, you MUST call the appropriate tool to get it. Examples:
      <video src="video_url" alt="Video Name">Video Name</video>
      <image src="image_url" alt="Image Name">Image Name</image>
  postprocessing:
    enabled: false
    validation_order:
    - [url_validator]
    validators:
      url_validator:
        internal_ip: ${EXTERNAL_IP}
        timeout: 10.0
        # Template variable: {issues} - list of failed URLs
        feedback_template: |
          The following URLs are not accessible: {issues}
          You have a hallucinated URL in the response, consider removing it or calling the appropriate tool to fetch the correct URL.
        # yamllint enable rule:line-length

eval:
  general:
    workflow_alias: ${WEAVE_WORKFLOW_ALIAS}
    output_dir: ${EVAL_DIR}/results
    dataset:
      _type: json
      file_path: ${EVAL_DIR}/dataset.json
      structure:
        question_key: "query"

  evaluators:
    trajectory_evaluator:
      _type: customized_trajectory_evaluator
      llm_name: eval_llm_judge
      track_agent_selected_tools_only: true
      max_retries: 2
      custom_prompt_template: |
        You are an expert evaluator assessing an AI agent's performance on tool calling.

        Question: {question}

        Available Tools and Their Schemas:
        {tool_schemas}

        Agent's Actions and Tool Calls:
        {agent_trajectory}

        Agent's Final Answer:
        {answer}

        Reference/Expected Output:
        {reference}

        Evaluation Criteria:
        1. **Tool Selection**: Did the agent select the appropriate tools for the task?
        2. **Parameter Accuracy**: Were tool parameters correct according to the tool schemas above?
        Check that all parameters match the expected types, required fields, and descriptions.
        3. **Data Retrieval**: Did the agent successfully retrieve the necessary data? Sometimes the
        data is not available, that should not be considered as a failure. As long as the tools are
        called correctly, it should be considered as a success.
        4. **Completeness**: Did the agent gather all required information to answer the question?
        5. **Efficiency**: Did the agent avoid unnecessary or redundant tool calls?

        IMPORTANT NOTES:

        1. VLM Failure: The report_agent always will fail on VLM analysis. This is EXPECTED and
           should NOT be considered a failure. As long as the correct tools are called, it should
           be considered as a success and should be scored 1.0.

        2. LLM Model Names in Trajectory: Some trajectory steps have tool names equal to LLM model names. These are NOT
           actual tool calls. They are INTERNAL REASONING STEPS showing which LLM is thinking.

           **CRITICAL: When evaluating tool selection, COMPLETELY IGNORE any steps where the tool
           name is an LLM model name. Only evaluate steps where actual function tools are called.**

        Scoring Guidelines:
        - 1.0: Perfect execution - all criteria met, accurate answer
        - 0.8-0.9: Excellent - minor issues but correct answer
        - 0.6-0.7: Good - some issues but mostly correct
        - 0.4-0.5: Fair - significant issues, partially correct
        - 0.0-0.3: Poor - major issues, incorrect or incomplete answer

        Think through your evaluation carefully, then output only a single number (your score from
        0.0 to 1.0).
