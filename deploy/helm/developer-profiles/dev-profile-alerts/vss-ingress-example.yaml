apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    haproxy.org/path-rewrite: |
      /storage/(.*) /vst/storage/\1
      /storage /vst/storage
  name: <RELEASE_NAME>    # e.g. vss-alerts
  namespace: <NAMESPACE>    # e.g. vss-alerts
spec:
  ingressClassName: haproxy
  rules:
  - host: vss.<EXTERNAL_HOST>.nip.io    # e.g. vss.10.57.209.221.nip.io Value of global.externalHost in values-realtime.yaml
    http:
      paths:
      - backend:
          service:
            name: <RELEASE_NAME>-vss-agent-ui    # e.g. vss-alerts-vss-agent-ui
            port:
              number: 3000
        path: /api/chat
        pathType: Prefix
      - backend:
          service:
            name: <RELEASE_NAME>-vss-agent    # e.g. vss-alerts-vss-agent
            port:
              number: 8000
        path: /api
        pathType: Prefix
      - backend:
          service:
            name: <RELEASE_NAME>-vss-agent    # e.g. vss-alerts-vss-agent
            port:
              number: 8000
        path: /chat
        pathType: Prefix
      - backend:
          service:
            name: <RELEASE_NAME>-vss-agent    # e.g. vss-alerts-vss-agent
            port:
              number: 8000
        path: /websocket
        pathType: Prefix
      - backend:
          service:
            name: <RELEASE_NAME>-vss-agent    # e.g. vss-alerts-vss-agent
            port:
              number: 8000
        path: /static
        pathType: Prefix
      - backend:
          service:
            name: <RELEASE_NAME>-vss-vios-ingress    # e.g. vss-alerts-vss-vios-ingress
            port:
              number: 30888
        path: /vst
        pathType: Prefix
      # Compat alias: /storage/* is rewritten to /vst/storage/* via a
      # haproxy.org/path-rewrite annotation (see vss-ingress-example-rewrites.yaml),
      # then proxied to the VST ingress. Mirrors the bk_vst_storage_compat
      # backend in deploy/docker/services/infra/haproxy/haproxy.cfg.template.
      - backend:
          service:
            name: <RELEASE_NAME>-vss-vios-ingress    # e.g. vss-alerts-vss-vios-ingress
            port:
              number: 30888
        path: /storage
        pathType: Prefix
      - backend:
          service:
            name: <RELEASE_NAME>-vss-agent-ui    # e.g. vss-alerts-vss-agent-ui
            port:
              number: 3000
        path: /
        pathType: Prefix
      - backend:
          service:
            name: <RELEASE_NAME>-vss-behavior-analytics    # e.g. vss-alerts-vss-behavior-analytics
            port:
              number: 8080
        path: /behavior-analytics
        pathType: Prefix
      - backend:
          service:
            name: <RELEASE_NAME>-vss-rtvi-cv-sdr    # e.g. vss-alerts-vss-rtvi-cv-sdr
            port:
              number: 4001
        path: /perception-sdr
        pathType: Prefix
      - backend:
          service:
            name: <RELEASE_NAME>-vss-va-mcp    # e.g. vss-alerts-vss-va-mcp
            port:
              number: 9901
        path: /va-mcp
        pathType: Prefix
  - host: streamer.<EXTERNAL_HOST>.nip.io    # e.g. streamer.10.57.209.221.nip.io
    http:
      paths:
      - backend:
          service:
            name: <RELEASE_NAME>-vss-vios-nvstreamer    # e.g. vss-alerts-vss-vios-nvstreamer
            port:
              number: 31000
        path: /
        pathType: Prefix
  - host: kibana.<EXTERNAL_HOST>.nip.io    # e.g. kibana.10.57.209.221.nip.io
    http:
      paths:
      - backend:
          service:
            name: <RELEASE_NAME>-kibana    # e.g. vss-alerts-kibana
            port:
              number: 5601
        path: /
        pathType: Prefix
